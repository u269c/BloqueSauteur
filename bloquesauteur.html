      break;
    case 3:  // oblique lines
      c.fillStyle = col; for (let k = -ih; k < iw; k += 3) for (let t = 0; t < ih; t++) c.fillRect(ix + k + t, iy + t, 1.4, 1);
      break;
    case 4:  // tic-tac-toe grid
      c.fillStyle = col; c.fillRect(ix + iw / 3, iy, 1, ih); c.fillRect(ix + 2 * iw / 3, iy, 1, ih); c.fillRect(ix, iy + ih / 3, iw, 1); c.fillRect(ix, iy + 2 * ih / 3, iw, 1);
      break;
    case 5:  // camo
      c.fillStyle = col; c.fillRect(ix, iy, iw, ih);
      for (let gy = 0; gy < ih; gy += 2) for (let gx = 0; gx < iw; gx += 2) { const v = hash(gx, gy); if (v > 0.62) { c.fillStyle = dark; c.fillRect(ix + gx, iy + gy, 2.4, 2.4); } else if (v < 0.24) { c.fillStyle = cream; c.fillRect(ix + gx, iy + gy, 2.4, 2.4); } }
      break;
    case 6:  // bullseye
      for (let r = Math.max(iw, ih) / 2; r > 0; r -= 1.6) { c.fillStyle = (((r / 1.6) | 0) & 1) ? col : cream; c.beginPath(); c.arc(cx, cy, r, 0, 7); c.fill(); }
      break;
    case 7:  // spirals (pinwheel of arms)
      c.fillStyle = col; c.strokeStyle = col; c.lineWidth = 1;
      for (let a = 0; a < 6.28; a += 0.5) { const r = a / 6.28 * (iw / 2 + 1); c.fillRect(cx + Math.cos(a) * r - 0.7, cy + Math.sin(a) * r - 0.7, 1.4, 1.4); }
      break;
    case 8:  // checkers
      for (let gy = 0; gy < ih; gy += 2) for (let gx = 0; gx < iw; gx += 2) { c.fillStyle = ((((gx / 2) | 0) + ((gy / 2) | 0)) & 1) ? col : cream; c.fillRect(ix + gx, iy + gy, 2, 2); }
      break;
    case 9:  // dot grid (inverse polka — colour base, cream dots)
      c.fillStyle = col; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = cream; for (let gy = 0; gy < ih; gy += 3) for (let gx = (((gy / 3) | 0) & 1) ? 1.5 : 0; gx < iw; gx += 3) c.fillRect(ix + gx, iy + gy, 1.4, 1.4);
      break;
    case 10: // diagonal camo (three-shade diagonal bands)
      for (let k = -ih; k < iw + ih; k += 3) { const band = ((k / 3) | 0) % 3; c.fillStyle = band === 0 ? col : band === 1 ? dark : cream; for (let t = 0; t < ih; t++) c.fillRect(ix + k - t, iy + t, 3, 1); }
      break;
    case 11: // target spiral (rings + a spiral overlay + centre)
      for (let r = Math.max(iw, ih) / 2; r > 0; r -= 2) { c.fillStyle = (((r / 2) | 0) & 1) ? col : cream; c.beginPath(); c.arc(cx, cy, r, 0, 7); c.fill(); }
      c.fillStyle = dark; for (let a = 0; a < 9.4; a += 0.4) { const r = a / 9.4 * (iw / 2); c.fillRect(cx + Math.cos(a) * r - 0.5, cy + Math.sin(a) * r - 0.5, 1, 1); }
      break;
    case 12: // confetti (dark base, multicolour flecks)
      c.fillStyle = dark; c.fillRect(ix, iy, iw, ih);
      for (let gy = 0; gy < ih; gy += 2) for (let gx = 0; gx < iw; gx += 2) { c.fillStyle = CONFETTI_COLS[(hash(gx, gy) * CONFETTI_COLS.length) | 0]; c.fillRect(ix + gx + hash(gy, gx), iy + gy, 1.4, 1.4); }
      break;
    case 13: // Canada — red kit, white centre band + a maple-leaf hint
      c.fillStyle = '#d52b1e'; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = '#fff'; c.fillRect(cx - iw * 0.19, iy, iw * 0.38, ih);
      c.fillStyle = '#d52b1e'; c.fillRect(cx - 2, cy, 4, 1); c.fillRect(cx - 1, cy - 2, 2, 5);
      break;
    case 14: // Switzerland — red kit, white cross
      c.fillStyle = '#d52b1e'; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = '#fff'; c.fillRect(cx - 1, cy - ih * 0.28, 2, ih * 0.56); c.fillRect(cx - iw * 0.3, cy - 1, iw * 0.6, 2);
      break;
    case 15: // Norway — red kit, white/blue chest band
      c.fillStyle = '#ba0c2f'; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = '#fff'; c.fillRect(ix, cy - 2, iw, 4);
      c.fillStyle = '#00205b'; c.fillRect(ix, cy - 1, iw, 2);
      break;
    case 16: // Japan — Samurai blue, red rising-sun disc
      c.fillStyle = '#0a1e5e'; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = '#e60026'; c.beginPath(); c.arc(cx, cy, Math.min(iw, ih) * 0.28, 0, 7); c.fill();
      break;
    case 17: // Bandana — red paisley-ish print (earned at the pickleball hall)
      c.fillStyle = '#b3122a'; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = '#f2e9d0'; for (let gy = 0; gy < ih; gy += 3) for (let gx = (((gy / 3) | 0) & 1) ? 1.5 : 0; gx < iw; gx += 3) { c.fillRect(ix + gx, iy + gy, 1, 1); c.fillRect(ix + gx + 0.5, iy + gy + 0.5, 1.4, 1.4); }
      break;
    case 18: // Brazil — yellow with a green collar
      c.fillStyle = '#f7d417'; c.fillRect(ix, iy, iw, ih);
      c.fillStyle = '#1c8a3b'; c.fillRect(ix, iy, iw, 2); c.fillStyle = '#0a3d91'; c.fillRect(cx - 1, iy + 2, 2, 2);
      break;
    case 19: // France — blue / white / red vertical bands
      c.fillStyle = '#0a3d91'; c.fillRect(ix, iy, iw / 3, ih); c.fillStyle = '#fff'; c.fillRect(ix + iw / 3, iy, iw / 3, ih); c.fillStyle = '#e0392f'; c.fillRect(ix + 2 * iw / 3, iy, iw / 3, ih);
      break;
    case 20: // Argentina — sky-blue and white vertical stripes
      for (let sx = 0; sx < iw; sx += 3) { c.fillStyle = (((sx / 1.5) | 0) & 1) ? '#75aadb' : '#fff'; c.fillRect(ix + sx, iy, 2, ih); }
      break;
    case 21: // Germany — black chest band on white
      c.fillStyle = '#eee8d5'; c.fillRect(ix, iy, iw, ih); c.fillStyle = '#111'; c.fillRect(ix, cy - 2, iw, 4); c.fillStyle = '#e0392f'; c.fillRect(ix, cy + 2, iw, 1);
      break;
    case 22: // Mexico — green with white + red trim
      c.fillStyle = '#1c8a3b'; c.fillRect(ix, iy, iw, ih); c.fillStyle = '#fff'; c.fillRect(ix, cy - 1, iw, 2); c.fillStyle = '#e0392f'; c.fillRect(ix, iy + ih - 2, iw, 2);
      break;
    default: // fallback: plain colour block
      c.fillStyle = col; c.fillRect(ix, iy, iw, ih);
  }
  c.restore();
}

function drawHero() {
  const h = Game.hero, C = CONFIG;
  const tremble = h.frozen > 0 ? Math.round((Math.random() * 2 - 1) * 1.5) : 0;   // scream-freeze shiver
  const x = Math.round(h.x - h.w / 2) + tremble, y = Math.round(h.y - h.h);
  let alpha = 1;
  if (h.ghost > 0) alpha = 0.35 + 0.3 * (0.5 + 0.5 * Math.sin(Game.t * 34));   // ghostly respawn
  else if (h.hurt > 0 && ((Game.t * 20) | 0) & 1) alpha = 0.35;                // i-frame flicker

  ctx.save();
  // dodge: spin the sprite in place (ninja)
  if (h.dodgeT > 0) { const cxc = h.x, cyc = h.y - h.h / 2; ctx.translate(cxc, cyc); ctx.rotate(Game.t * 26); ctx.translate(-cxc, -cyc); }
  ctx.globalAlpha = alpha;

  // legs (little walk cycle on the ground)
  ctx.fillStyle = '#0a0a0a';
  const moving = h.onGround && Math.abs(h.vx) > 6;
  const step = moving ? (Math.sin(Game.t * 20) > 0 ? 1 : 0) : 0;
  ctx.fillRect(x + 1, h.y - 3, 3, 3 + step);
  ctx.fillRect(x + h.w - 4, h.y - 3, 3, 4 - step);

  // body frame
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(x, y, h.w, h.h - 2);
  const col = heroColor(h);
  if (h.costumeIdx >= 0) {                                      // equipped costume pattern
    drawCostume(ctx, x, y, h.w, h.h, h.costumeIdx, col);
  } else {                                                     // interior "T" from the concept art
    ctx.fillStyle = col;
    ctx.fillRect(x + 2, y + 2, h.w - 4, 3);                     // top bar
    ctx.fillRect(x + (h.w >> 1) - 1, y + 2, 3, h.h - 8);        // stem
  }
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(x + 2, y + 2, h.w - 4, 1);
  ctx.fillStyle = '#fff'; ctx.fillRect(x + (h.face > 0 ? h.w - 4 : 2), y + 6, 2, 2);   // eye
  // per-mode arms + knives (normal: one; RAGE: two)
  const my = y + (h.h >> 1);
  if (Game.mode === 'normal' || Game.mode === 'rage') drawArmKnife(ctx, x + h.w, my, 1);
  if (Game.mode === 'rage') drawArmKnife(ctx, x, my + 2, -1);
  // gray outline so the hero reads on dark backgrounds
  ctx.fillStyle = 'rgba(150,156,166,0.9)';
  ctx.fillRect(x - 1, y - 1, h.w + 2, 1); ctx.fillRect(x - 1, y + h.h - 2, h.w + 2, 1);
  ctx.fillRect(x - 1, y - 1, 1, h.h); ctx.fillRect(x + h.w, y - 1, 1, h.h);
  ctx.restore();

  // spiked shield in front of the facing side (not rotated)
  if (h.shieldT > 0) {
    const sxp = h.face > 0 ? x + h.w + 1 : x - 4;
    ctx.fillStyle = '#c9d0da'; ctx.fillRect(sxp, y + 1, 3, h.h - 3);
    ctx.fillStyle = '#e6ecf3'; for (let sy = y + 1; sy < y + h.h - 2; sy += 3) { const tip = sxp + (h.face > 0 ? 5 : -2); ctx.beginPath(); ctx.moveTo(tip, sy + 1); ctx.lineTo(sxp + (h.face > 0 ? 3 : 0), sy); ctx.lineTo(sxp + (h.face > 0 ? 3 : 0), sy + 2); ctx.fill(); }
  }
  // shield cooldown ring above the hero (until ready again)
  if (Game.owned.shield && h.shieldCd > 0) {
    const rcx = h.x, rcy = y - 6, frac = 1 - h.shieldCd / C.SHIELD_CD;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(rcx, rcy, 3, 0, 7); ctx.stroke();
    ctx.strokeStyle = '#8fd0ff'; ctx.beginPath(); ctx.arc(rcx, rcy, 3, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2); ctx.stroke();
  }
  // dodge fuel bar above the hero (a bit higher than the shield ring, no overlap)
  if (h.dodgeT > 0) {
    const bw = 16, bx = Math.round(h.x - bw / 2), by = y - 12;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx - 1, by - 1, bw + 2, 4);
    ctx.fillStyle = '#b58ce0'; ctx.fillRect(bx, by, Math.round(bw * (h.dodgeT / C.DODGE_TIME)), 2);
  }
  ctx.globalAlpha = 1;
}

const ENEMY_COL = { clear: '#dfe6e9', red: '#e0392f', yellow: '#f4d03f', rainbow: '#fff', volcano: '#c1121f', blue: '#2a7fd0' };

function drawDonut(cx, cy, r, type, spikes, gaze, alpha, phase) {
  const col = ENEMY_COL[type] || '#fff';
  ctx.globalAlpha = alpha;
  // spikes (triangles pointing outward)
  ctx.fillStyle = type === 'clear' ? 'rgba(220,228,230,0.9)' : col;
  for (let i = 0; i < spikes; i++) {
    const a = phase + (i / spikes) * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const tx = cx + Math.cos(a) * (r + 4), ty = cy + Math.sin(a) * (r + 4);
    const px = -Math.sin(a) * 2.4, py = Math.cos(a) * 2.4;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx + px, sy + py); ctx.lineTo(sx - px, sy - py); ctx.closePath(); ctx.fill();
  }
  // donut ring
  if (type === 'clear') { ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
  else { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); }
  // eye socket + tracking pupil
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx + gaze * r * 0.22, cy, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawEnemies() {
  const phase = Game.t * 6;
  for (const e of Game.enemies) {
    // fading motion trail
    for (let i = 0; i < e.trail.length; i++) {
      const tp = e.trail[i], a = 0.06 + 0.12 * (i / e.trail.length);
      drawDonut(tp.x, tp.y - e.r, e.r * 0.85, e.type, e.spikes, e.gaze, a, phase);
    }
    drawDonut(e.x, e.y - e.r, e.r, e.type, e.spikes, e.gaze, 1, phase);
  }
}

function drawBoss() {
  const b = Game.boss; if (!b) return;
  const trembleX = b.state === 'shriek' ? (Math.random() * 2 - 1) * 2.5 : 0;   // shake as a scream warning
  const cx = b.x + trembleX, cy = b.y - b.r, r = b.r;
  const phase2 = b.enraged || b.hits >= Math.ceil(b.maxHits * 2 / 3);   // enraged in the last third (or revived)
  let col = ENEMY_COL[b.type] || '#fff';
  if (b.type === 'rainbow') col = `hsl(${(Game.t * 120) % 360} 90% 60%)`;
  else if (b.type === 'volcano') col = b.enraged ? '#8a0f16' : '#c1121f';
  // hit flash
  const flash = b.iframe > 0 && ((Game.t * 24) | 0) & 1;

  // telegraph/feint wind-up cue (lean + glow)
  if (b.state === 'telegraph' || b.state === 'feint') {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(cx, cy, r + 5 + Math.sin(Game.t * 20) * 2, 0, Math.PI * 2); ctx.fill();
  }
  // shriek wind-up: pulsing red aura (warning to flee)
  if (b.state === 'shriek') {
    const pulse = 0.5 + 0.5 * Math.sin(Game.t * 30);
    ctx.strokeStyle = `rgba(255,60,40,${0.3 + 0.45 * pulse})`; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, cy, r + 4 + pulse * 4, 0, Math.PI * 2); ctx.stroke();
  }
  // scream: sound-wave rings expanding out to the impact radius (the danger zone)
  if (b.state === 'scream') {
    const prog = 1 - b.stateT / BOSS.screamDur, R = BOSS.screamRadius;
    for (let i = 0; i < 3; i++) { const rr = ((prog + i / 3) % 1) * R; ctx.strokeStyle = `rgba(255,90,50,${0.5 * (1 - rr / R)})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, r + rr, 0, Math.PI * 2); ctx.stroke(); }
  }
  ctx.save();
  if (flash) ctx.globalAlpha = 0.5;
  // spikes
  const phase = Game.t * (phase2 ? 5 : 3);
  ctx.fillStyle = b.type === 'clear' ? 'rgba(223,230,233,0.9)' : col;
  for (let i = 0; i < b.spikes; i++) {
    const a = phase + (i / b.spikes) * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const tx = cx + Math.cos(a) * (r + (phase2 ? 8 : 6)), ty = cy + Math.sin(a) * (r + (phase2 ? 8 : 6));
    const px = -Math.sin(a) * 3.5, py = Math.cos(a) * 3.5;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx + px, sy + py); ctx.lineTo(sx - px, sy - py); ctx.closePath(); ctx.fill();
  }
  // body
  if (b.type === 'clear') { ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
  else { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); }
  // cracks when enraged
  if (phase2) {
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx - r * 0.5, cy - r * 0.3); ctx.lineTo(cx - r * 0.1, cy + r * 0.2); ctx.lineTo(cx - r * 0.3, cy + r * 0.6); ctx.stroke();
  }
  // eye (angrier + bloodshot in phase 2), tracking pupil
  ctx.fillStyle = phase2 ? '#ffdede' : '#fff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = phase2 ? '#c1121f' : '#111'; ctx.beginPath(); ctx.arc(cx + b.gaze * r * 0.2, cy, r * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // HP: pips for small counts, a bar for big ones (RAGE goes up to 12)
  const remain = b.maxHits - b.hits, bw = 30, bx = cx - bw / 2, by = cy - r - 11;
  if (b.maxHits <= 6) {
    const pw = Math.min(6, (bw + 2) / b.maxHits - 2);
    for (let i = 0; i < b.maxHits; i++) { ctx.fillStyle = i < remain ? (phase2 ? '#e0392f' : '#f4d03f') : 'rgba(255,255,255,0.2)'; ctx.fillRect(bx + i * (pw + 2), by, pw, 4); }
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(bx, by, bw, 4);
    ctx.fillStyle = phase2 ? '#e0392f' : '#f4d03f'; ctx.fillRect(bx, by, bw * (remain / b.maxHits), 4);
  }
}

function drawParticles() {
  for (const p of Game.particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.r, p.r);
  }
  ctx.globalAlpha = 1;
  // rising combo / points floaters
  ctx.textAlign = 'center'; ctx.font = '7px monospace';
  for (const f of Game.floaters) {
    ctx.globalAlpha = Math.max(0, 1 - f.t / f.life);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, Math.round(f.x), Math.round(f.y));
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// fill in [0,1] — draws an empty heart then clips a left-anchored fraction in red.
// fill in [0,1] — empty heart, then a clockwise PIE wedge of red from 12 o'clock.
function drawHeart(x, y, fill) {
  const px = () => { ctx.fillRect(x + 1, y, 2, 1); ctx.fillRect(x + 5, y, 2, 1); ctx.fillRect(x, y + 1, 8, 3); ctx.fillRect(x + 1, y + 4, 6, 1); ctx.fillRect(x + 2, y + 5, 4, 1); ctx.fillRect(x + 3, y + 6, 2, 1); };
  ctx.fillStyle = 'rgba(255,255,255,0.18)'; px();                 // empty base
  fill = Math.max(0, Math.min(1, fill));
  if (fill >= 1) { ctx.fillStyle = '#e0392f'; px(); return; }
  if (fill > 0) {
    const cx = x + 4, cy = y + 3.5, r = 7, a0 = -Math.PI / 2;      // start at top, sweep clockwise
    ctx.save(); ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, a0, a0 + fill * Math.PI * 2); ctx.closePath(); ctx.clip();
    ctx.fillStyle = '#e0392f'; px(); ctx.restore();
  }
}

function drawHUD() {
  const C = CONFIG;
  ctx.textBaseline = 'top'; ctx.font = '8px monospace';
  // readability backdrop so hearts/text stay legible over any world
  const slotsN = Math.min(9, Math.max(3, Math.ceil(maxHearts())));
  ctx.fillStyle = 'rgba(6,8,14,0.45)';
  ctx.fillRect(0, 0, Math.max(150, 12 + slotsN * 11), 40);
  if (Game.scene === 'PLAY') ctx.fillRect(C.W / 2 - 26, 0, 52, 20);
  // health as (fractional) hearts; one slot per max heart, capped for display.
  const slots = slotsN;
  const a = Game.heartAnim, p = a ? Math.min(1, a.t / a.dur) : 1;   // new heart slides in from the left
  for (let i = 0; i < slots; i++) {
    let hx = 6 + i * 11;
    if (a) hx = (i === 0) ? 6 - (1 - p) * 14 : 6 + (i - 1 + p) * 11;   // insert on the left, push the rest right
    drawHeart(hx, 7, Math.max(0, Math.min(1, Game.hp - i)));
  }
  ctx.fillStyle = '#eee8d5';
  if (maxHearts() > 9) ctx.fillText('+' + (maxHearts() - 9), 6 + 9 * 11 + 1, 7);
  // level name + score (top-left, second row; kept clear of the top-right buttons)
  ctx.fillStyle = '#93a1a1'; ctx.fillText('LV' + Game.level + ' ' + (LEVEL_NAMES[Game.level] || ''), 6, 18);
  ctx.fillStyle = '#8a9ba0'; ctx.fillText('POINTS ' + Game.points, 6, 28);
  // boss flag / level-progress bar (centre)
  if (Game.scene === 'PLAY') {
    if (Game.phase === 'boss') { ctx.textAlign = 'center'; ctx.fillStyle = '#e0392f'; ctx.font = '10px monospace'; ctx.fillText('◆ BOSS ◆', C.W / 2, 7); ctx.textAlign = 'left'; }
    else if (Game.levelData) {
      const bw = 90, bx = (C.W - bw) / 2, by = 5, frac = Math.max(0, Math.min(1, Game.hero.x / Game.levelData.exitX));
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(bx - 1, by - 1, bw + 2, 6);
      ctx.fillStyle = '#7cb342'; ctx.fillRect(bx, by, Math.round(bw * frac), 4);
      ctx.fillStyle = '#e0392f'; ctx.fillRect(bx + bw - 2, by - 1, 3, 6);   // the boss waits at the end
    }
  }
}

function centerText(lines) {
  const C = CONFIG;
  ctx.fillStyle = 'rgba(6,8,18,0.55)'; ctx.fillRect(0, 0, C.W, C.H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let y = C.H / 2 - (lines.length - 1) * 12;
  for (const ln of lines) {
    ctx.font = (ln.big ? 'bold 22px' : '10px') + ' monospace';
    ctx.fillStyle = ln.color || '#eee8d5';
    ctx.fillText(ln.t, C.W / 2, y); y += ln.big ? 26 : 15;
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
}

function drawSpawner(x) {
  const bob = Math.sin(Game.t * 2.2) * 3, sy = CONFIG.SPAWN_Y + bob;
  ctx.fillStyle = '#0c0c10'; ctx.fillRect(x - 13, sy - 13, 26, 26);
  ctx.fillStyle = '#23252e'; ctx.fillRect(x - 13, sy - 13, 26, 3);
  const mawGlow = 0.5 + 0.5 * Math.sin(Game.t * 5);
  ctx.fillStyle = `rgba(230,57,47,${0.5 + 0.4 * mawGlow})`;

}

// Treasure chest sitting on the ground (closed → sparkling; opened → empty lid up).
function drawChest(ch) {
  const w = 14, h = 12, bx = ch.x - w / 2, by = ch.top - h;

  ctx.fillStyle = '#e0a92e'; ctx.fillRect(bx, by + 7, w, 2); ctx.fillRect(ch.x - 1, by + 4, 2, h - 4);   // gold bands

    ctx.fillStyle = '#8a5a30'; ctx.fillRect(bx, by, w, 1);
    ctx.fillStyle = '#e0a92e'; ctx.fillRect(ch.x - 1, by + 3, 2, 3);             // lock

}
const SHROOM_COL = { poison: '#a24bd6', highjump: '#57c04a', teleport: '#38b6d6', heal: '#e0392f', money: '#e0a92e', swarm: '#d6552e' };

function render() {
  const C = CONFIG;

  ctx.save();
  // screen shake
  if (Game.shakeMag > 0) {
    const m = Game.shakeMag * (Game.shakeT / 0.25);
    ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
  }

  // Background stays screen-fixed (parallax 0): themed sky → backdrop → hazard band.
  drawSky(Game.theme.sky);
  drawWorldBackdrop(Game.theme.world);
  drawHazard(Game.theme.world);

  // Foreground scrolls with the camera (world space).
  ctx.save();
  ctx.translate(-Math.round(Game.cam.x), 0);
  drawTerrain();
  if (Game.phase === 'traverse' && Game.levelData && Game.levelData.chests) for (const ch of Game.levelData.chests) drawChest(ch);
  // Spawn box(es) — only during the boss duel; count per level (+RAGE side).
  if (Game.phase === 'boss' && Game.bossActive) {
    const boxes = arenaBoxes();
    if (boxes >= 1) drawSpawner(C.SPAWN_X);
    if (boxes >= 2) drawSpawner(C.SPAWN_X_L);
  }
  if (Game.phase === 'traverse' && Game.levelData && Game.levelData.challenger) drawChallenger(Game.levelData.challenger);
  const live = Game.scene === 'PLAY' || Game.scene === 'INTRO' || Game.scene === 'CLEAR' || Game.scene === 'SHOP';
  if (live) { drawEnemies(); drawBoss(); drawHero(); }
  for (const pk of Game.pickups) drawPickup(pk);
  if (Game.scene === 'SHOP') drawMerchant();
  drawParticles();
  ctx.restore();

  if (live) drawHUD();

  // Scene overlays (canvas-drawn transient screens)
  if (Game.scene === 'INTRO') centerText([{ t: 'LEVEL ' + Game.level, big: true, color: '#f4d03f' }, { t: (WORLDS[Game.theme.world] || {}).name + ' · ' + (SKY_NAMES[Game.theme.sky] || ''), color: '#eee8d5' }, { t: 'run to the end, then fight the boss', color: '#93a1a1' }]);
  else if (Game.scene === 'CLEAR') centerText([{ t: 'LEVEL CLEAR', big: true, color: '#7cb342' }].concat(Game.gainedLife ? [{ t: '★ no-hit bonus: +1 heart! ★', color: '#f4d03f' }] : [{ t: 'points ' + Game.points, color: '#93a1a1' }]));
  else if (Game.scene === 'GAMEOVER') centerText([{ t: 'GAME OVER', big: true, color: '#e0392f' }, { t: 'reached level ' + Game.level, color: '#eee8d5' }, { t: 'tap to return to title', color: '#93a1a1' }]);
  else if (Game.scene === 'VICTORY') centerText([{ t: 'VICTORY!', big: true, color: '#f4d03f' }, { t: 'you conquered the tower', color: '#eee8d5' }, { t: MODES[Game.mode].name, color: '#93a1a1' }, { t: 'tap to return to title', color: '#93a1a1' }]);

  ctx.restore();
  if (Game.hero.dizzy > 0) applyWave();   // poison mushroom: ripple the whole composited frame
  if (Game.transition) applySpiral();      // spiral into/out of the pickleball match

}
// Post-process ripple for the poison-mushroom wobble: snapshot the frame, then re-blit it
// in thin horizontal strips shifted by a travelling sine wave.
const waveBuf = document.createElement('canvas');
function applyWave() {
  const W = CONFIG.W, H = CONFIG.H;
  if (waveBuf.width !== W) { waveBuf.width = W; waveBuf.height = H; }
  const wc = waveBuf.getContext('2d');
  wc.clearRect(0, 0, W, H); wc.drawImage(canvas, 0, 0, W, H);
  ctx.clearRect(0, 0, W, H);
  const amp = 7, t = Game.t * 7;
  for (let y = 0; y < H; y += 2) { const dx = Math.sin(y * 0.22 + t) * amp; ctx.drawImage(waveBuf, 0, y, W, 2, dx, y, W, 2); }
}
// Spiral transition: snapshot the frame and re-draw it rotating + scaling toward the centre
// (shrinking to a point on the way in, growing back on the way out), fading through black.
const spiralBuf = document.createElement('canvas');
function applySpiral() {
  const W = CONFIG.W, H = CONFIG.H, tr = Game.transition;
  if (spiralBuf.width !== W) { spiralBuf.width = W; spiralBuf.height = H; }
  const sc = spiralBuf.getContext('2d');
  sc.clearRect(0, 0, W, H); sc.drawImage(canvas, 0, 0, W, H);
  const half = tr.dur / 2, k = tr.t < half ? tr.t / half : (tr.dur - tr.t) / half;   // 1→0→1 (0 at midpoint)
  const scale = Math.max(0.001, k), rot = (1 - k) * Math.PI * 4;
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.save();
  ctx.globalAlpha = k;
  ctx.translate(W / 2, H / 2); ctx.rotate(rot); ctx.scale(scale, scale); ctx.translate(-W / 2, -H / 2);
  ctx.drawImage(spiralBuf, 0, 0, W, H);
  ctx.restore();
}
// The Challenger NPC standing in the L4 level (speech bubble when the hero is near).
function drawChallenger(ch) {
  const x = ch.x, y = ch.top;
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(x - 5, y - 16, 10, 16);            // body
  ctx.fillStyle = '#b3122a'; ctx.fillRect(x - 5, y - 12, 10, 3);            // bandana/sash
  ctx.fillStyle = '#e8c58a'; ctx.fillRect(x - 3, y - 20, 6, 5);            // head

    const b = Math.sin(Game.t * 6) * 1.5;
    ctx.fillStyle = '#f4d03f'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
    ctx.fillText('🏓', x, y - 26 + b); ctx.textAlign = 'left';

}
// The whole pickleball minigame scene (own court; camera not used).
const PB_CROWD = ['#e0392f', '#f4d03f', '#39a0ed', '#7cb342', '#e0348b', '#e8731e', '#eee8d5', '#b58ce0'];
const pbHash = (a, b) => { const s = Math.sin(a * 12.9898 + b * 4.1414) * 43758.5453; return s - Math.floor(s); };
// A fancy sports-hall backdrop: raked crowd stands, spotlights + beams, bunting, a jumbotron.
function drawPickleHall() {
  const W = CONFIG.W, t = Game.t, cy = PB.courtY;
  const g = ctx.createLinearGradient(0, 0, 0, cy); g.addColorStop(0, '#171d38'); g.addColorStop(1, '#3a4670');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, cy);
  // raked crowd stands with shimmering spectators
  const standTop = 42, standBot = 150;
  ctx.fillStyle = '#262b46'; ctx.fillRect(0, standTop, W, standBot - standTop);
  for (let row = 0; row < 8; row++) {
    const ry = standTop + row * (standBot - standTop) / 8;
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fillRect(0, ry + 4, W, 1);
    for (let cx = 3; cx < W; cx += 7) {
      const hv = pbHash(cx, row * 3);
      ctx.globalAlpha = 0.65 + 0.35 * Math.sin(t * 3 + hv * 30);
      ctx.fillStyle = PB_CROWD[(hv * PB_CROWD.length) | 0];
      ctx.fillRect(cx + ((hv * 2) | 0), ry + 1, 3, 3);
    }
  }
  ctx.globalAlpha = 1;
  ctx.fillStyle = '#454f78'; ctx.fillRect(0, standBot, W, 7); ctx.fillStyle = '#5a659a'; ctx.fillRect(0, standBot, W, 1);   // barrier
  // ceiling + trusses
  ctx.fillStyle = '#10152a'; ctx.fillRect(0, 0, W, 12);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 24) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x + 12, 12); ctx.stroke(); }
  // spotlights + soft beams
  for (let i = 0; i < 4; i++) {
    const sx = 70 + i * 116;
    ctx.fillStyle = '#fff7cc'; ctx.fillRect(sx - 3, 9, 6, 3);
    const bg = ctx.createLinearGradient(sx, 12, sx, standBot); bg.addColorStop(0, 'rgba(255,247,204,0.16)'); bg.addColorStop(1, 'rgba(255,247,204,0)');
    ctx.fillStyle = bg; ctx.beginPath(); ctx.moveTo(sx - 2, 12); ctx.lineTo(sx + 2, 12); ctx.lineTo(sx + 20, standBot); ctx.lineTo(sx - 20, standBot); ctx.closePath(); ctx.fill();
  }
  // bunting pennants under the ceiling
  for (let i = 0; i < W / 16; i++) { ctx.fillStyle = PB_CROWD[i % 4]; const bx = i * 16; ctx.beginPath(); ctx.moveTo(bx, 13); ctx.lineTo(bx + 16, 13); ctx.lineTo(bx + 8, 21); ctx.closePath(); ctx.fill(); }
  // central jumbotron (frames the score, drawn on top later)
  ctx.fillStyle = '#0c1024'; ctx.fillRect(W / 2 - 60, 16, 120, 40);
  ctx.strokeStyle = '#5a659a'; ctx.lineWidth = 1; ctx.strokeRect(W / 2 - 60, 16, 120, 40);
  ctx.fillStyle = '#c9d0da'; ctx.font = '6px monospace'; ctx.textAlign = 'center'; ctx.fillText('★ CHAMPIONSHIP ★', W / 2, 23); ctx.textAlign = 'left';
}
function drawPickle() {
  const p = Game.pickle, W = CONFIG.W, H = CONFIG.H;

  }
  ctx.textAlign = 'left';
}

// ══════════════════════════════════════════════════════════════════
//  LOOP — fixed timestep with accumulator; render every frame
// ══════════════════════════════════════════════════════════════════
let acc = 0, last = null, testFreeze = false;
function tick(now) {
  if (last === null) last = now;
  let el = (now - last) / 1000; last = now;
  if (el > 0.25) el = 0.25;                 // clamp huge gaps (tab was hidden)
  if (testFreeze) { /* physics driven manually by BS.stepFixed in tests */ }
  else if (Game.scene === 'PLAY' && !Game.paused) {
    acc += el;
    let guard = 0;
    while (acc >= CONFIG.DT && guard++ < 600) { update(CONFIG.DT); acc -= CONFIG.DT; }
  } else {
    update(el);                             // transient scenes (INTRO/CLEAR/…) advance in real time
  }
  render();
  requestAnimationFrame(tick);
}

function resize() {
  const vw = innerWidth, vh = innerHeight;
  const scale = Math.min(vw / CONFIG.W, vh / CONFIG.H);
  canvas.style.width = Math.floor(CONFIG.W * scale) + 'px';
  canvas.style.height = Math.floor(CONFIG.H * scale) + 'px';
  const portrait = vh > vw;
  document.getElementById('rotate').classList.toggle('show', portrait);
  updateControlsVisibility();
}
// Touch controls only make sense on touch devices — hide them on desktop (keyboard).
function isTouchDevice() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) ||
         (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
}
function updateControlsVisibility() {
  const el = document.getElementById('controls');
  if (el) el.style.display = isTouchDevice() ? '' : 'none';
}
function updateShieldButton() {
  const el = document.getElementById('btn-shield'); if (!el) return;
  const show = isTouchDevice() && Game.owned && Game.owned.shield && Game.scene === 'PLAY';

}

  // The Challenger / pickleball
  challenger: () => Game.levelData && Game.levelData.challenger,
  climbables: () => Game.levelData && Game.levelData.climbables,
  hazards: () => Game.levelData && Game.levelData.hazards,
  hazardBox,
  startPickle, setupPickle, endPickle, resumePickle,
  pickle: () => Game.pickle,
  pickleWins: () => Game.pickleWins,
  transition: () => Game.transition,
  pause: togglePause,
  isPaused: () => Game.paused,
  buildSwatches,
  // Deterministic stepping (bypasses rAF) for physics tests.
  freeze: (on) => { testFreeze = !!on; },
  step: (dt) => update(dt),
  stepFixed: (n) => { for (let i = 0; i < (n | 0); i++) update(CONFIG.DT); },
};

})();
</script>
</body>
</html>

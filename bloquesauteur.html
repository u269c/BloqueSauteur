    const g = this.ctx.createGain(); g.gain.setValueAtTime(gain, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    s.connect(f); f.connect(g); g.connect(this.musicGain); s.start(t); s.stop(t + dur + 0.02); s.__end = t + dur + 0.02; this.music.oscs.push(s);
  },
  _snare(t) { this._noiseHit(t, 1400, 0.5, 0.14); },
  _hat(t) { this._noiseHit(t, 7000, 0.22, 0.035); },
  applyGain() { if (this.master) this.master.gain.value = (this.muted || Game.paused) ? 0 : 0.55; },
  // ── music layer (looping tracks + one-shot jingles) ──
  playMusic(key) {
    this.ensure(); if (!this.ctx) return;
    if (this.music.key === key && this.music.playing) return;
    this.stopMusic();
    const track = MUSIC[key]; if (!track) return;
    // Gameplay tracks (levels + boss) get the mode's frenetic tempo/timbre.
    const gameplay = (typeof key === 'number') || key === 'boss';
    const m = MODES[Game.mode] || MODES.normal;
    this.music.key = key; this.music.playing = true;
    this.music.rate = gameplay ? (m.musicRate || 1) : 1;
    this.music.wave = gameplay ? m.musicWave : null;
    this.applyGain();                    // restore volume (pause/quit could have left it at 0)
    this._loop(track, this.ctx.currentTime + 0.06);
  },
  _loop(track, t0) {
    const beat = 60 / (track.bpm * (this.music.rate || 1));
    // prune finished oscillators so the ref list stays bounded
    this.music.oscs = this.music.oscs.filter((o) => o.__end > this.ctx.currentTime);
    // A track is either a single melodic line (`notes`, used by jingles) or a set of
    // parallel voices (`layers`: melodic {wave,gain,notes} + percussion {drum:true,notes}).
    const layers = track.layers || [{ wave: this.music.wave || track.wave, gain: track.gain, notes: track.notes }];
    let loopDur = 0;
    for (const L of layers) {
      let t = t0;
      if (L.drum) {
        for (const [hit, beats] of L.notes) {
          if (hit === 'K') this._kick(t); else if (hit === 'S') this._snare(t); else if (hit === 'H') this._hat(t);
          t += beats * beat;
        }
      } else {
        const wave = L.wave || this.music.wave || 'square', gain = L.gain != null ? L.gain : (track.gain || 0.2), sus = L.sus != null ? L.sus : 0.9;
        for (const [note, beats] of L.notes) {
          const dur = beats * beat;
          if (note && note !== 'R') { const o = this._note(this.noteToFreq(note), dur * sus, wave, gain, t, this.musicGain); if (o) this.music.oscs.push(o); }
          t += dur;
        }
      }
      loopDur = Math.max(loopDur, t - t0);
    }
    const tEnd = t0 + loopDur, ms = (tEnd - this.ctx.currentTime) * 1000;
    this.music.timer = setTimeout(() => {
      if (!this.music.playing) return;
      if (track.loop !== false) this._loop(track, tEnd); else this.music.playing = false;
    }, Math.max(20, ms - 100));
  },
  // Hard-stop: cancel the next iteration AND stop every already-scheduled music
  // oscillator, so a new track can't overlap the tail of the old one.
  stopMusic() {
    this.music.playing = false;
    if (this.music.timer) { clearTimeout(this.music.timer); this.music.timer = null; }
    for (const o of this.music.oscs) { try { o.stop(); } catch (e) { /* already stopped */ } }
    this.music.oscs = []; this.music.key = null;
  },
  _note(freq, dur, wave, gain, when, dest) {
    if (!this.ctx || !freq) return null;
    const t = when != null ? when : this.ctx.currentTime;
    const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = wave || 'square'; osc.frequency.value = freq;
    osc.connect(g); g.connect(dest || this.sfxGain);
    g.gain.setValueAtTime(gain != null ? gain : 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
    osc.start(t); osc.stop(t + dur + 0.03);
    osc.__end = t + dur + 0.03;
    return osc;
  },
  noteToFreq(name) {
    const m = String(name).match(/^([A-G])(#|b)?(\d)$/); if (!m) return 0;
    const semi = SEMITONE[m[1]] + (m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0);
    return 440 * 2 ** ((+m[3] * 12 + semi - 57) / 12);
  },
  blip(freq, dur, wave, gain, when) { this._note(freq, dur, wave, gain, when, this.sfxGain); },
  sfx(name) {
    this.ensure(); if (!this.ctx) return;
    const n = this.noteToFreq.bind(this), t0 = this.ctx.currentTime;
    switch (name) {
      case 'start': this.blip(n('C5'), .09, 'square', .4, t0); this.blip(n('G5'), .12, 'square', .4, t0 + .1); break;
      case 'jump':  this.blip(n('E5'), .08, 'square', .32, t0); this.blip(n('B5'), .06, 'square', .28, t0 + .05); break;
      case 'hurt':  this.blip(n('A3'), .16, 'sawtooth', .4, t0); this.blip(n('E3'), .18, 'sawtooth', .35, t0 + .04); break;
      case 'die':   this.blip(n('G4'), .12, 'square', .4, t0); this.blip(n('D4'), .12, 'square', .4, t0 + .1); this.blip(n('G3'), .3, 'square', .4, t0 + .2); break;
      case 'land':  this.blip(n('C4'), .04, 'square', .18, t0); break;
      case 'stomp': this.blip(n('C6'), .05, 'square', .38, t0); this.blip(n('G5'), .07, 'square', .32, t0 + .04); this.blip(n('C5'), .09, 'square', .28, t0 + .09); break;
      case 'spawn': this.blip(n('E4'), .05, 'triangle', .18, t0); break;
      case 'bossSpawn': this.blip(n('C3'), .18, 'sawtooth', .45, t0); this.blip(n('G3'), .18, 'sawtooth', .4, t0 + .12); this.blip(n('C4'), .24, 'square', .4, t0 + .24); break;
      case 'bossHit':   this.blip(n('E5'), .06, 'square', .42, t0); this.blip(n('A4'), .12, 'sawtooth', .35, t0 + .05); break;
      case 'bossDie':   this.blip(n('C4'), .1, 'square', .45, t0); this.blip(n('E4'), .1, 'square', .45, t0 + .1); this.blip(n('G4'), .1, 'square', .45, t0 + .2); this.blip(n('C5'), .4, 'square', .45, t0 + .3); break;
      case 'buzz':      this.blip(n('A3'), .07, 'square', .25, t0); this.blip(n('C4'), .07, 'square', .22, t0 + .06); break;
      case 'buy':       this.blip(n('E5'), .06, 'square', .4, t0); this.blip(n('A5'), .1, 'square', .35, t0 + .06); break;
      case 'buzzThanks':this.blip(n('C5'), .07, 'square', .3, t0); this.blip(n('E5'), .07, 'square', .3, t0 + .08); this.blip(n('G5'), .1, 'square', .3, t0 + .16); break;
      case 'buzzGrumpy':this.blip(n('E3'), .18, 'sawtooth', .4, t0); this.blip(n('C3'), .26, 'sawtooth', .4, t0 + .1); break;
      case 'lifeUp':    this.blip(n('C5'), .09, 'square', .4, t0); this.blip(n('E5'), .09, 'square', .4, t0 + .09); this.blip(n('G5'), .09, 'square', .4, t0 + .18); this.blip(n('C6'), .22, 'square', .42, t0 + .27); break;
      // Boss scream: a descending detuned sawtooth screech (mid-pitched, not shrill).
      case 'scream':    for (let i = 0; i < 5; i++) { const f = n('A4') * Math.pow(0.9, i); this.blip(f, .22, 'sawtooth', .4, t0 + i * .12); this.blip(f * 1.02, .22, 'sawtooth', .3, t0 + i * .12); } break;
      default:      this.blip(n('A4'), .06, 'square', .3, t0);
    }
  },
  toggleMute() { this.muted = !this.muted; this.applyGain(); Save.save(); updateHudButtons(); },
};

// ══════════════════════════════════════════════════════════════════
//  FLOW — scene transitions
// ══════════════════════════════════════════════════════════════════
// Scenes: TITLE → INTRO → PLAY → (boss) → CLEAR → INTRO/… → VICTORY;  PLAY→GAMEOVER on 0 lives.
function firstGesture() { Audio.ensure(); }   // unlock audio on the very first gesture

function maxHearts() { return CONFIG.LIVES_START + (Game.heartsBought | 0) + (Game.levelHearts | 0); }
function startGame() {                         // TITLE → level 1 (points/hearts reset per game)
  // Safety: ensure a slot is active without clobbering current Game choices (mode/colour).
  if (Save.data.activeSlot == null) { Save.data.activeSlot = 0; if (!Save.data.slots[0]) Save.data.slots[0] = freshSlot(); Save.save(); }
  // Per-game reset: points to 0, hearts re-buyable, bought/earned hearts cleared.
  Game.points = 0; Game.heartsBought = 0; Game.levelHearts = 0; Game.owned.heart = false; Game.owned.twoHearts = false; Game.owned.halfHeart = false; Game.heartAnim = null; Game.combo = 0; Game.floaters = [];
  Game.level = 1; Game.hp = maxHearts();
  reseed(pickSeed());
  hideOverlay('start');
  Audio.sfx('start');
  gotoIntro();
}
function gotoIntro() {
  Game.scene = 'INTRO'; Game.sceneT = 0; Game.paused = false;
  buildLevel(); Game.hero.face = 1;
  if (Game.level >= 4 && !Game.rainbowUnlocked) { Game.rainbowUnlocked = true; Save.save(); buildSwatches(); }
  Game.best = Math.max(Game.best, Game.level); Save.save();
  Audio.playMusic(Game.level);
}
function gotoPlay() { Game.scene = 'PLAY'; Game.t = 0; }

// Fast entry straight into PLAY — used by the deterministic test harness.
function startPlay() {
  Game.level = 1; Game.hp = CONFIG.LIVES_START; Game.points = 0;
  reseed(pickSeed());
  Game.scene = 'PLAY'; Game.t = 0; Game.sceneT = 0; Game.paused = false; Game.hero.face = 1;
  hideOverlay('start');
}

function onBossDefeated() {
  Game.bossActive = false;
  Game.points += 5;                             // bosses are worth 5 points
  // Easy/Normal grant a heart after every boss (the gauge grows by one).
  Game.gainedLife = !!MODES[Game.mode].levelHeart;
  if (Game.gainedLife) { Game.levelHearts = (Game.levelHearts | 0) + 1; Game.hp = Math.min(maxHearts(), Game.hp + 1); Game.heartAnim = { t: 0, dur: 0.9 }; Audio.sfx('lifeUp'); }
  Game.scene = 'CLEAR'; Game.sceneT = 0;
  Audio.sfx('bossDie'); Audio.playMusic('clear');
}
function afterClear() { gotoShop(); }              // merchant visits after every level

function gotoShop() {
  Game.scene = 'SHOP'; Game.sceneT = 0; Game.paused = false;
  Game.merchant = {
    x: 40 + Math.random() * (CONFIG.W - 80), y: -34,
    landX: Math.max(60, Math.min(CONFIG.W - 60, Game.hero.x + 40)),
    state: 'descend', bought: false, t0: 0,
  };
  Audio.playMusic('merchant');
}
function updateMerchant(dt) {
  const m = Game.merchant; if (!m) return;
  if (m.state === 'descend') {
    m.y += MERCHANT.descendV * dt;
    m.x += (m.landX - m.x) * Math.min(1, dt * 1.5) + Math.sin(Game.sceneT * 4) * MERCHANT.hoverAmp * dt;
    if (m.y >= MERCHANT.landY - 4) { m.y = MERCHANT.landY - 4; m.state = 'shop'; Audio.sfx('buzz'); showOverlay('shop'); buildShop(); }
  } else if (m.state === 'ascend') {
    m.y -= MERCHANT.riseV * dt;
    if (m.y < -40) { Game.merchant = null; afterShop(); }
  }
}
function closeShop() {
  hideOverlay('shop');
  const m = Game.merchant; if (m) m.state = 'ascend';
  Audio.sfx(m && m.bought ? 'buzzThanks' : 'buzzGrumpy');
}
function afterShop() {
  if (Game.level >= LAST_LEVEL) { Game.points = 0; Game.scene = 'VICTORY'; Game.sceneT = 0; Audio.stopMusic(); Audio.playMusic('victory'); return; }  // points reset after the final merchant
  Game.level++;
  gotoIntro();
}
function onGameOver() { Game.scene = 'GAMEOVER'; Game.sceneT = 0; Audio.stopMusic(); Audio.playMusic('gameover'); }
function gotoTitle() {
  Game.scene = 'TITLE'; Game.paused = false; Game.points = 0; Audio.stopMusic(); Audio.playMusic('title');   // quitting resets points
  showOverlay('start'); hideOverlay('pause'); showTitlePanel();
}

// Tap / key on a transient screen advances it.
function tapAdvance() {
  if (Game.scene === 'INTRO') gotoPlay();
  else if (Game.scene === 'CLEAR') afterClear();
  else if ((Game.scene === 'GAMEOVER' || Game.scene === 'VICTORY') && Game.sceneT > 0.5) gotoTitle();
}
function togglePause(force) {
  if (Game.scene !== 'PLAY') return;
  Game.paused = (force != null) ? !!force : !Game.paused;
  Audio.applyGain();
  if (Game.paused) { showOverlay('pause'); buildSwatches(); } else hideOverlay('pause');
}
function quitToTitle() { hideOverlay('pause'); gotoTitle(); }

function showOverlay(id) { document.getElementById(id).classList.remove('hidden'); }
function hideOverlay(id) { document.getElementById(id).classList.add('hidden'); }

// ══════════════════════════════════════════════════════════════════
//  UPDATE — fixed-timestep simulation (dt is constant = CONFIG.DT during PLAY)
// ══════════════════════════════════════════════════════════════════
function approach(cur, target, maxDelta) {
  if (cur < target) return Math.min(cur + maxDelta, target);
  if (cur > target) return Math.max(cur - maxDelta, target);
  return cur;
}

// ── Juice: particles + screen shake (cosmetic; uses Math.random, not the seed) ──
function shake(mag) { Game.shakeMag = Math.max(Game.shakeMag, mag); Game.shakeT = 0.25; }
function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 30 + Math.random() * 120;
    Game.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40, life: 0.4 + Math.random() * 0.4, t: 0, color, r: 1 + (Math.random() * 2 | 0) });
  }
  if (Game.particles.length > 240) Game.particles.splice(0, Game.particles.length - 240);
}
function addFloater(x, y, text, color) {
  Game.floaters.push({ x, y, text, color: color || '#eee8d5', t: 0, life: 0.9 });
  if (Game.floaters.length > 24) Game.floaters.shift();
}
// Award a monster kill. Airborne kills build a combo: the k-th airborne kill in a
// chain awards 2*min(k,10)-1 points (a chain of N totals N², capped at the 10x tier).
function addKill(x, y, color) {
  let award = 1;
  if (!Game.hero.onGround) {
    Game.combo += 1;
    const m = Math.min(Game.combo, 10);
    award = 2 * m - 1;
    if (Game.combo >= 2) { addFloater(x, y - 8, 'x' + m + '  +' + award, '#f4d03f'); Audio.sfx('lifeUp'); }
    else addFloater(x, y - 8, '+' + award, '#eee8d5');
  } else addFloater(x, y - 8, '+' + award, '#eee8d5');
  Game.points += award;
  Audio.sfx('stomp'); spawnBurst(x, y, color, 12);
}
function updateParticles(dt) {
  if (Game.shakeT > 0) { Game.shakeT -= dt; if (Game.shakeT <= 0) Game.shakeMag = 0; }
  if (Game.heartAnim) { Game.heartAnim.t += dt; if (Game.heartAnim.t >= Game.heartAnim.dur) Game.heartAnim = null; }
  const ps = Game.particles;
  for (const p of ps) { p.t += dt; p.vy += 380 * dt; p.x += p.vx * dt; p.y += p.vy * dt; }
  if (ps.length) Game.particles = ps.filter((p) => p.t < p.life);
  const fs = Game.floaters;
  for (const f of fs) { f.t += dt; f.y -= 22 * dt; }
  if (fs.length) Game.floaters = fs.filter((f) => f.t < f.life);
}

// Solid ground top at column index, or null (hole / off-platform).
function colTop(ter, ci) {
  if (ci < 0 || ci >= ter.nCols) return null;
  return ter.cols[ci];
}

// AABB vs terrain columns, axis-separated. Hero.y is the feet (bottom) y.
function collideHero(h, dt) {
  const ter = Game.terrain, T = ter.colW, C = CONFIG;
  // ── horizontal ──
  h.x += h.vx * dt;
  {
    const l = h.x - h.w / 2, r = h.x + h.w / 2, top = h.y - h.h, bot = h.y;
    const ci0 = Math.floor((l - ter.x0) / T), ci1 = Math.floor((r - ter.x0) / T);
    for (let ci = ci0; ci <= ci1; ci++) {
      const ct = colTop(ter, ci); if (ct == null) continue;      // hole / off-platform: no wall (can fall in)
      // A column is a wall only if the hero's feet are below its top (walking into a step/hill side).
      if (bot > ct + 0.5 && top < C.H) {
        const cx0 = ter.x0 + ci * T, cx1 = cx0 + T;
        if (h.vx > 0 && r > cx0 && l < cx0) { h.x = cx0 - h.w / 2; h.vx = 0; }
        else if (h.vx < 0 && l < cx1 && r > cx1) { h.x = cx1 + h.w / 2; h.vx = 0; }
      }
    }
  }
  // ── vertical ──
  h.y += h.vy * dt;
  h.onGround = false;
  if (h.vy >= 0) {
    const l = h.x - h.w / 2, r = h.x + h.w / 2 - 0.001;
    const ci0 = Math.floor((l - ter.x0) / T), ci1 = Math.floor((r - ter.x0) / T);
    let gy = null;
    for (let ci = ci0; ci <= ci1; ci++) { const ct = colTop(ter, ci); if (ct != null && (gy == null || ct < gy)) gy = ct; }
    if (gy != null && h.y >= gy) { h.y = gy; h.vy = 0; h.onGround = true; }
  }
}

// Falling into the lava costs a whole heart and respawns you (ghostly), regardless of mode.
function heroDie() {
  const h = Game.hero; if (h.dead) return;
  h.dead = true;
  Game.hitThisLevel = true;
  Game.hp = Math.max(0, Game.hp - 1);
  Audio.sfx('die'); spawnBurst(h.x, CONFIG.LAVA_Y, '#f4a300', 24); shake(8);
  if (Game.hp <= 0) { Game.hp = 0; onGameOver(); return; }
  respawnHero();
}

// Enemy/boss contact. Damage depends on the mode (EASY: harmless). Returns true if it landed.
function heroHurt(fromRight) {
  const h = Game.hero, C = CONFIG, m = MODES[Game.mode];
  if (h.ghost > 0 || h.hurt > 0 || h.dead) return false;          // ghostly / i-frames → immune
  if (m.hitDamage <= 0) return false;                              // EASY: contact does nothing
  h.hurt = C.HURT_IFRAMES;
  if (m.knockOnHit) { h.knock = C.KNOCK_LOCK; h.vx = (fromRight ? -1 : 1) * C.KNOCKBACK; h.vy = -140; h.onGround = false; }
  Game.hitThisLevel = true;
  Game.hp = Math.max(0, Game.hp - m.hitDamage);                    // lose a fraction of a heart
  if (m.pointPenalty) Game.points = Math.max(0, Game.points - m.pointPenalty);   // RAGE: −1 point per hit
  Audio.sfx('hurt'); shake(3);
  if (Game.hp <= 0) { Game.hp = 0; h.dead = true; onGameOver(); } // out of health → game over
  return true;
}

// ── Enemies + spawner ─────────────────────────────────────────────
function spawnEnemy(type, side) {
  const C = CONFIG, L = LEVELS[Game.level] || LEVELS[1];
  type = type || L.types[Math.floor(Game.rand() * L.types.length)];
  side = side || 'right';
  const dir = side === 'left' ? 1 : -1;                 // left box marches right, right box marches left
  const baseSpeed = L.speed * (ENEMY.speedMul[type] || 1);
  Game.enemies.push({
    x: side === 'left' ? C.SPAWN_X_L : C.SPAWN_X, y: C.SPAWN_Y + 12,
    vx: dir * baseSpeed, vy: 0, r: ENEMY.r, type, side, dir, baseSpeed,
    onGround: false, leaping: false, alive: true, trail: [], trailT: 0,
    jumpT: 0.5 + Game.rand() * 0.7, spikes: Game.rand() < 0.5 ? 3 : 5, gaze: -1,
  });
  Audio.sfx('spawn');
}

function updateEnemies(dt) {
  const C = CONFIG, ter = Game.terrain, L = LEVELS[Game.level] || LEVELS[1], h = Game.hero;

  // spawn cadence (paused during boss). RAGE mode feeds from both sides.
  if (!Game.bossActive) {
    Game.spawnT -= dt;
    if (Game.spawnT <= 0 && Game.enemies.length < L.maxAlive) {
      const side = (MODES[Game.mode].spawners === 2 && Game.rand() < 0.5) ? 'left' : 'right';
      spawnEnemy(undefined, side); Game.spawnT = L.spawnEvery / (MODES[Game.mode].spawnMul || 1);
    }
  }

  for (const e of Game.enemies) {
    if (!e.alive) continue;
    // motion-trace samples
    e.trailT -= dt;
    if (e.trailT <= 0) { e.trail.push({ x: e.x, y: e.y }); if (e.trail.length > 6) e.trail.shift(); e.trailT = 0.05; }

    // physics: constant march (vx), gravity, surface follow
    e.vy += ENEMY.gravity * dt;
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    const surf = surfaceAt(ter, e.x);
    if (surf != null && e.y >= surf) {
      e.y = surf; e.vy = 0; e.onGround = true;
      if (e.leaping) { e.leaping = false; e.vx = e.dir * e.baseSpeed; }   // landed from a leap → resume march
      // Leap over an INTERIOR hole (L2+); still walk off the final platform edge into lava.
      const aheadX = e.x + e.dir * (e.r + 3);
      const landX = e.x + e.dir * (C.MAX_JUMP_GAP + ter.colW);
      const holeAhead = surfaceAt(ter, aheadX) == null;
      const canLand = landX >= ter.x0 && landX < ter.x1 && surfaceAt(ter, landX) != null;
      if (Game.level > 1 && holeAhead && canLand) {
        e.vy = -ENEMY.leapV; e.vx = e.dir * ENEMY.leapVX; e.onGround = false; e.leaping = true;
      } else if (e.type === 'yellow') {
        e.jumpT -= dt; if (e.jumpT <= 0) { e.vy = -ENEMY.jumpImpulse; e.onGround = false; e.jumpT = 0.9 + Game.rand() * 0.6; }
      }
    } else e.onGround = false;

    e.gaze = h.x < e.x ? -1 : 1;                     // eye tracks the hero

    // despawn: walked off either platform edge (or fell) → into the lava
    if (e.y >= C.LAVA_Y || e.x < C.PLAT_X0 - e.r - 2 || e.x > C.PLAT_X1 + e.r + 2) e.alive = false;

    // hero interaction (skipped while ghostly or dodging — untouchable)
    if (e.alive && h.ghost <= 0 && h.dodgeT <= 0 && !h.dead) {
      const el = e.x - e.r, er = e.x + e.r, etop = e.y - 2 * e.r, ebot = e.y;
      const hl = h.x - h.w / 2, hr = h.x + h.w / 2, htop = h.y - h.h, hbot = h.y;
      if (hr > el && hl < er && hbot > etop && htop < ebot) {
        const stomp = h.vy > 0 && h.y < e.y - e.r;   // falling onto its top half
        if (stomp) { e.alive = false; h.vy = -ENEMY.bounce; h.onGround = false; addKill(e.x, e.y - e.r, ENEMY_COL[e.type] || '#fff'); shake(3); }
        else if (h.shieldT > 0) { e.alive = false; h.shieldT = 0; addKill(e.x, e.y - e.r, '#c9d0da'); shake(4); }  // spiked shield kills the attacker
        else heroHurt(e.x > h.x);                     // hit → knock away from the enemy
      }
    }
  }
  if (Game.enemies.length) Game.enemies = Game.enemies.filter((e) => e.alive);
}

// ── Boss ──────────────────────────────────────────────────────────
function activateBoss() {
  if (Game.bossActive) return;
  Game.bossActive = true;
  Game.enemies = [];                       // clear the field for the duel
  const C = CONFIG, type = (LEVELS[Game.level] || LEVELS[1]).boss;
  const maxHits = (MODES[Game.mode].bossHits[Game.level]) || BOSS.hits;
  Game.boss = {
    x: C.SPAWN_X, y: C.SPAWN_Y + 16, vx: 0, vy: 0, r: BOSS.r, type,
    hits: 0, maxHits, state: 'enter', stateT: 0, onGround: false,
    iframe: 0, alive: true, startX: C.PLAT_X1 - 34, gaze: -1, jumpT: 0.5,
    feint: false, spikes: (type === 'rainbow' || type === 'volcano') ? 7 : 5,
    lives: type === 'volcano' ? 2 : 1, enraged: false, canScream: type === 'volcano', screamT: 2.5,
  };
  Audio.sfx('bossSpawn'); Audio.playMusic('boss'); shake(6);
}

function bossHit(b, n) {
  if (!b.alive || b.iframe > 0) return;
  b.hits += (n || 1); b.iframe = BOSS.iframe; b.vy = -130; b.state = 'return';
  Audio.sfx('bossHit'); spawnBurst(b.x, b.y - b.r, ENEMY_COL[b.type] || '#fff', 14); shake(4);
  if (b.hits >= b.maxHits) {
    if (b.lives > 1) {                       // revive: full 12 bars, faster, bloodshot
      b.lives -= 1; b.hits = 0; b.maxHits = 12; b.enraged = true; b.iframe = 1.2; b.state = 'enter'; b.y = CONFIG.SPAWN_Y + 16;
      spawnBurst(b.x, b.y, '#e0392f', 40); shake(12); Audio.sfx('scream');
      return;
    }
    b.alive = false; Game.boss = null; spawnBurst(b.x, b.y - b.r, '#fff', 30); shake(9); onBossDefeated();
  }
}

// Strong-hit floor blast: kill monsters within ~1 hero-width L/R; 2 boss-hits if in range.
function strongHitBlast() {
  const C = CONFIG, h = Game.hero, R = C.STRONG_BLAST_W;
  spawnBurst(h.x, h.y - 2, '#ffca6b', 22); shake(6);
  for (const e of Game.enemies) {
    if (e.alive && Math.abs(e.x - h.x) <= R + e.r && Math.abs((e.y) - h.y) <= 24) {
      e.alive = false; addKill(e.x, e.y - e.r, ENEMY_COL[e.type] || '#fff');
    }
  }
  const b = Game.boss;
  if (b && b.alive && Math.abs(b.x - h.x) <= R + b.r && b.iframe <= 0) bossHit(b, 2);
}

function updateBoss(dt) {
  const b = Game.boss; if (!b || !b.alive) return;
  const C = CONFIG, ter = Game.terrain, h = Game.hero;
  if (b.iframe > 0) b.iframe = Math.max(0, b.iframe - dt);
  b.gaze = h.x < b.x ? -1 : 1;
  const phase2 = b.enraged || b.hits >= Math.ceil(b.maxHits * 2 / 3);   // enraged in the last third (or revived)
  const spd = (BOSS.charge[b.type] || 60) * (b.enraged ? 1.5 : phase2 ? 1.28 : 1);   // revived volcano boss is 1.5x

  // gravity + floor: the boss FOLLOWS the platform surface (walks up/down hills
  // and mini-platforms) but bridges holes at the base line — so it never falls
  // into the hazard and strands the fight, and never "flies" over raised terrain.
  const surf = surfaceAt(ter, b.x);
  const floorY = (surf != null) ? surf : ter.baseTop;
  b.vy += ENEMY.gravity * dt; b.y += b.vy * dt;
  if (b.y >= floorY) { b.y = floorY; b.vy = 0; b.onGround = true; } else b.onGround = false;

  const ease = (to, rate) => { const d = to - b.x; b.x += Math.sign(d) * Math.min(Math.abs(d), rate * dt); return Math.abs(d) < 1; };

  switch (b.state) {
    case 'enter':
      if (b.onGround) { b.state = 'idle'; b.stateT = (BOSS.idleWait[b.type] || 1); }
      break;
    case 'idle':
      if (ease(b.startX, BOSS.returnSpeed)) {
        b.stateT -= dt;
        if (b.canScream) { b.screamT -= dt; }
        if (b.stateT <= 0) {
          if (b.canScream && b.screamT <= 0) { b.state = 'scream'; b.stateT = 0.8; b.screamT = 4 + Game.rand() * 3; Audio.sfx('scream'); if (h.ghost <= 0 && h.dodgeT <= 0 && !h.dead) h.frozen = BOSS.freeze; }
          else if (b.type === 'rainbow' || b.type === 'volcano') { b.state = 'telegraph'; b.stateT = 0.6; b.feint = Game.rand() < 0.5; }
          else { b.state = 'charge'; b.jumpT = 0.4; }
        }
      }
      break;
    case 'scream':                            // rears back and screams (freeze already applied)
      b.stateT -= dt;
      if (b.stateT <= 0) { b.state = 'charge'; b.jumpT = 0.35; }
      break;
    case 'telegraph':                         // L4/L5 wind-up (may be a feint)
      b.stateT -= dt;
      if (b.stateT <= 0) { if (b.feint) { b.state = 'feint'; b.stateT = 0.22; } else { b.state = 'charge'; b.jumpT = 0.4; } }
      break;
    case 'feint':                             // quick fake lunge, then retreat
      b.x -= spd * 0.4 * dt; b.stateT -= dt;
      if (b.stateT <= 0) b.state = 'return';
      break;
    case 'charge':
      b.x -= spd * dt;
      if (b.type === 'yellow' || b.type === 'volcano' || (b.type === 'rainbow' && phase2)) {   // yellow/volcano (& rainbow p2) jump while charging
        if (b.onGround) { b.jumpT -= dt; if (b.jumpT <= 0) { b.vy = -BOSS.jumpImpulse; b.onGround = false; b.jumpT = 0.6; } }
      }
      if (b.x <= C.PLAT_X0 + b.r) b.state = 'return';
      break;
    case 'return':
      if (ease(b.startX, BOSS.returnSpeed)) { b.state = 'idle'; b.stateT = (BOSS.idleWait[b.type] || 1); }
      break;
  }

  // hero interaction (skipped while ghostly, dodging, or during boss hit-stun)
  if (h.ghost <= 0 && h.dodgeT <= 0 && !h.dead && b.iframe <= 0) {
    const bl = b.x - b.r, br = b.x + b.r, btop = b.y - 2 * b.r, bbot = b.y;
    const hl = h.x - h.w / 2, hr = h.x + h.w / 2, htop = h.y - h.h, hbot = h.y;
    if (hr > bl && hl < br && hbot > btop && htop < bbot) {
      const stomp = h.vy > 0 && h.y < b.y - b.r;
      if (stomp) { bossHit(b, h.strong ? 2 : 1); Game.hero.vy = -ENEMY.bounce; Game.hero.onGround = false; h.strong = false; }
      else if (h.shieldT > 0) { h.shieldT = 0; bossHit(b); }   // shield damages the boss instead of hurting you
      else heroHurt(b.x > h.x);
    }
  }
}

function update(dt) {
  Game.sceneT += dt;
  if (Game.scene === 'PLAY' && !Game.paused) Game.t += dt;
  updateParticles(dt);

  // transient screens auto-advance (tap advances sooner via tapAdvance)
  if (Game.scene === 'INTRO' && Game.sceneT >= 1.6) { gotoPlay(); return; }
  if (Game.scene === 'CLEAR' && Game.sceneT >= 2.4) { afterClear(); return; }
  if (Game.scene === 'SHOP') { updateMerchant(dt); return; }
  if (Game.scene !== 'PLAY' || Game.paused) return;

  const h = Game.hero, C = CONFIG;

  // timers
  if (h.hurt > 0) h.hurt = Math.max(0, h.hurt - dt);
  if (h.ghost > 0) h.ghost = Math.max(0, h.ghost - dt);
  if (h.knock > 0) h.knock = Math.max(0, h.knock - dt);
  if (h.shieldT > 0) h.shieldT = Math.max(0, h.shieldT - dt);
  if (h.shieldCd > 0) h.shieldCd = Math.max(0, h.shieldCd - dt);
  if (h.dodgeCd > 0) h.dodgeCd = Math.max(0, h.dodgeCd - dt);
  if (h.frozen > 0) h.frozen = Math.max(0, h.frozen - dt);
  h.coyote = h.onGround ? C.COYOTE : Math.max(0, h.coyote - dt);
  h.jumpBuf = Input.consumeJump() ? C.JUMP_BUFFER : Math.max(0, h.jumpBuf - dt);
  const downPressed = Input.consumeDown();
  const frozen = h.frozen > 0;   // scream-frozen: can't act (but still vulnerable)

  // ── Dodge (hold LEFT+RIGHT): spin untouchable in place, cannot fall.
  //    Lasts as long as both are held, up to DODGE_TIME (5s), then cooldown. ──
  if (h.dodgeT > 0) {
    const holding = Input.left && Input.right;
    h.dodgeT = holding ? Math.max(0, h.dodgeT - dt) : 0;   // release ends it early
    h.vx = 0; h.vy = 0;                       // frozen — no fall while dodging
    if (h.dodgeT <= 0) { h.dodgeT = 0; h.dodgeCd = C.DODGE_CD; }
    updateEnemies(dt);
    if (!Game.bossActive && !Game.boss && Game.t >= C.LEVEL_TIME) activateBoss();
    updateBoss(dt);
    return;
  }
  if (Game.owned.dodge && !frozen && Input.left && Input.right && h.dodgeCd <= 0) {
    h.dodgeT = C.DODGE_TIME; Audio.sfx('jump'); shake(2); return;
  }

  // ── DOWN: in the air = Strong Hit dive; on the ground = arm the shield ──
  if (downPressed && !frozen) {
    if (!h.onGround && Game.owned.strongHit && !h.strong) { h.strong = true; h.vy = C.STRONG_HIT_V; Audio.sfx('jump'); }
    else if (h.onGround && Game.owned.shield && h.shieldCd <= 0) { h.shieldT = C.SHIELD_ACTIVE; h.shieldCd = C.SHIELD_CD; Audio.sfx('buzz'); }
  }

  // horizontal control (suppressed during knockback / scream-freeze)
  if (frozen) { h.vx = 0; }
  else if (h.knock <= 0) {
    const dir = (Input.right ? 1 : 0) - (Input.left ? 1 : 0);
    const target = dir * C.RUN_SPEED;
    const rate = (h.onGround ? (dir ? C.GROUND_ACCEL : C.GROUND_FRICTION) : C.AIR_ACCEL) * dt;
    h.vx = approach(h.vx, target, rate);
    if (dir !== 0) h.face = dir;
  }

  // jump (ground/coyote) + optional mid-air double jump
  if (frozen) h.jumpBuf = 0;
  if (h.jumpBuf > 0 && (h.onGround || h.coyote > 0)) {
    h.vy = -C.JUMP_V; h.onGround = false; h.coyote = 0; h.jumpBuf = 0; h.jumping = true;
    h.airJumps = Game.owned.doubleJump ? 1 : 0;   // grant an air jump on takeoff
    Audio.sfx('jump');
  } else if (h.jumpBuf > 0 && !h.onGround && h.airJumps > 0) {
    h.vy = -C.JUMP_V; h.airJumps--; h.jumpBuf = 0; h.jumping = true;
    Audio.sfx('jump'); spawnBurst(h.x, h.y - 2, '#cfe8ff', 6);
  }

  // variable-height jump via 3-phase gravity
  if (!Input.jumpHeld) h.jumping = false;
  let g;
  if (h.vy < 0) g = (Input.jumpHeld && h.jumping) ? C.G_HELD : C.G_CUT;
  else { g = C.G_FALL; h.jumping = false; }
  h.vy = Math.min(h.vy + g * dt, C.MAX_FALL);

  const wasAir = !h.onGround;
  collideHero(h, dt);
  // Strong-hit floor blast: landing a dive clears nearby monsters (and blasts the boss).
  if (h.strong && h.onGround && wasAir) { strongHitBlast(); h.strong = false; }
  if (wasAir && h.onGround) Game.combo = 0;   // landing ends the combo chain

  // lava death — fell into a hole or off an edge and reached the lava surface
  if (h.y >= C.LAVA_Y) heroDie();

  updateEnemies(dt);

  // boss emerges once the 60s survival timer elapses
  if (!Game.bossActive && !Game.boss && Game.t >= C.LEVEL_TIME) activateBoss();
  updateBoss(dt);
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function vgrad(y0, y1, c0, c1) { const g = ctx.createLinearGradient(0, y0, 0, y1); g.addColorStop(0, c0); g.addColorStop(1, c1); ctx.fillStyle = g; ctx.fillRect(-8, y0, CONFIG.W + 16, y1 - y0); }
function hash(n) { n = (n << 13) ^ n; return ((n * (n * n * 15731 + 789221) + 1376312589) & 0x7fffffff) / 0x7fffffff; }

// ── Skies (drawn behind everything; animated via Game.t) ──
function drawSky(sky) {
  const C = CONFIG, W = C.W, H = C.H, t = Game.t;
  switch (sky) {
    case 'sunset': {
      vgrad(0, H, '#3a1b4e', '#f4772e');
      const sx = W * 0.72, sy = H * 0.6;
      ctx.fillStyle = '#ffd36b'; ctx.beginPath(); ctx.arc(sx, sy, 26, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(255,150,60,0.25)'; ctx.beginPath(); ctx.arc(sx, sy, 40, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(60,20,50,0.35)'; for (let i = 0; i < 3; i++) ctx.fillRect(0, H * 0.5 + i * 8 + Math.sin(t * 0.3 + i) * 2, W, 3);
      break;
    }
    case 'sunrise': {
      vgrad(0, H, '#8ec5e8', '#ffd9c0');
      const sx = W * 0.3, sy = H * 0.55;
      ctx.fillStyle = '#fff0c0'; ctx.beginPath(); ctx.arc(sx, sy, 22, 0, 7); ctx.fill();
      ctx.fillStyle = 'rgba(255,220,150,0.3)'; ctx.beginPath(); ctx.arc(sx, sy, 38, 0, 7); ctx.fill();
      drawClouds('#ffffff', 0.7, t);
      break;
    }
    case 'blueClouds': { vgrad(0, H, '#3a86d0', '#bfe3f5'); drawClouds('#ffffff', 1, t); break; }
    case 'thunder': {
      const flash = (t % 4.3) < 0.12 || (t % 4.3 > 0.2 && t % 4.3 < 0.28);
      vgrad(0, H, flash ? '#b9c4d4' : '#20242e', flash ? '#8894a6' : '#3a4150');
      drawClouds('#4a4f5c', 1, t * 1.6);
      if ((t % 4.3) < 0.28) { // jagged bolt
        ctx.strokeStyle = '#fdf6b0'; ctx.lineWidth = 2; ctx.beginPath();
        let bx = W * (0.3 + 0.4 * hash(Math.floor(t / 4.3))), by = 20; ctx.moveTo(bx, by);
        for (let s = 0; s < 6; s++) { bx += (hash(s + Math.floor(t / 4.3) * 7) - 0.5) * 26; by += 18; ctx.lineTo(bx, by); }
        ctx.stroke();
      }
      break;
    }
    case 'space': {
      ctx.fillStyle = '#05060f'; ctx.fillRect(-8, -8, W + 16, H + 16);
      for (let i = 0; i < 70; i++) { const x = hash(i) * W, y = hash(i + 99) * H * 0.9; const tw = 0.6 + 0.4 * Math.sin(t * 2 + i); ctx.fillStyle = `rgba(255,255,255,${tw})`; ctx.fillRect(x, y, 1, 1); }
      drawGalaxy(W * 0.2, H * 0.28, t); drawGalaxy(W * 0.8, H * 0.62, t * 0.7);
      // shooting star
      const sp = (t % 3.5) / 3.5; if (sp < 0.25) { const sx = W * (0.1 + sp * 3), sy = H * (0.15 + sp * 1.2); ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(sx - 14, sy - 6); ctx.stroke(); }
      drawJWST((t * 8) % (W + 60) - 30, H * 0.35 + Math.sin(t * 0.5) * 10, t);
      break;
    }
    case 'windy': {
      vgrad(0, H, '#8b95a0', '#c3ccd4');
      ctx.fillStyle = '#6f7a86'; // distant hills
      for (let hx = -20; hx < W + 20; hx += 60) { const hh = 30 + 14 * Math.sin(hx * 0.05); ctx.beginPath(); ctx.arc(hx, C.PLAT_Y + 10, hh, Math.PI, 0); ctx.fill(); }
      for (let i = 0; i < 4; i++) { const fy = 60 + i * 34, fx = ((t * (14 + i * 6)) % (W + 160)) - 80; ctx.fillStyle = `rgba(230,235,240,${0.14 + i * 0.03})`; ctx.beginPath(); ctx.ellipse(fx, fy, 90, 16, 0, 0, 7); ctx.fill(); }
      break;
    }
    default: vgrad(0, H, '#241a2e', '#3a1f2b');
  }
}
function drawClouds(col, alpha, t) {
  const C = CONFIG;
  ctx.fillStyle = col; ctx.globalAlpha = 0.85 * alpha;
  for (let i = 0; i < 5; i++) {
    const cx = ((t * (8 + i * 3) + i * 130) % (C.W + 120)) - 60, cy = 24 + i * 26;
    ctx.beginPath(); ctx.ellipse(cx, cy, 26, 10, 0, 0, 7); ctx.ellipse(cx + 18, cy + 4, 18, 8, 0, 0, 7); ctx.ellipse(cx - 18, cy + 4, 16, 7, 0, 0, 7); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawGalaxy(cx, cy, t) {
  ctx.save(); ctx.translate(cx, cy); ctx.rotate(t * 0.1);
  for (let i = 0; i < 40; i++) { const a = i * 0.5, r = i * 0.6; ctx.fillStyle = `rgba(${180 + i},${140},${230 - i},${0.5 - i * 0.01})`; ctx.fillRect(Math.cos(a) * r, Math.sin(a) * r * 0.6, 2, 2); ctx.fillRect(-Math.cos(a) * r, -Math.sin(a) * r * 0.6, 2, 2); }
  ctx.fillStyle = 'rgba(255,240,255,0.9)'; ctx.fillRect(-1, -1, 3, 3); ctx.restore();
}
function drawJWST(x, y, t) {
  // gold hex mirror + angled sunshield
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = '#5a2a6a'; ctx.beginPath(); ctx.moveTo(-14, 8); ctx.lineTo(14, 4); ctx.lineTo(10, 12); ctx.lineTo(-12, 16); ctx.closePath(); ctx.fill();  // sunshield
  ctx.fillStyle = '#f4c430'; for (let i = 0; i < 6; i++) { const a = (i / 6) * 6.283; ctx.fillRect(Math.cos(a) * 4 - 1, Math.sin(a) * 4 - 6, 3, 3); } ctx.fillRect(-1, -3, 3, 3);
  ctx.restore();
}

// ── Hazards (fill below CONFIG.LAVA_Y + show through holes; all cosmetic) ──
function drawHazard(worldKey) {
  const C = CONFIG, t = Game.t, y0 = C.LAVA_Y, w = WORLDS[worldKey] || WORLDS.classic;
  const liquid = (base, hi, hot) => {
    ctx.fillStyle = base; ctx.fillRect(-8, y0, C.W + 16, C.H - y0 + 8);
    for (let x = 0; x < C.W; x += 4) { const wob = Math.sin(x * 0.05 + t * 2.6) * 2 + Math.sin(x * 0.11 - t * 3.7) * 1.4; ctx.fillStyle = (((x >> 2) + (t * 5 | 0)) & 1) ? hi : hot; ctx.fillRect(x, y0 + wob - 1, 4, 5); }
    ctx.fillStyle = 'rgba(255,255,255,0.5)'; for (let i = 0; i < 14; i++) { const bx = (i * 89 + 13) % C.W, ph = (t * 0.6 + i * 0.41) % 1; if (ph > 0.12 && ph < 0.95) ctx.fillRect(bx, y0 + 20 - ph * 18, 2, 2); }
  };
  switch (w.hazard) {
    case 'lava': liquid('#7a0d13', '#ff7a00', '#f4a300'); break;
    case 'poison': liquid('#2a0f3a', '#a840e0', '#7a20b0'); break;
    case 'wine': liquid('#3a0a1e', '#7a1030', '#a01840'); break;
    case 'water': liquid('#2a6fb0', '#7ec8f0', '#a8e0ff'); break;
    case 'sea': liquid('#1f6ea8', '#4aa8e0', '#8fd4f5'); break;
    case 'river': { // crocodile river
      liquid('#245a7a', '#3f88a8', '#6fb0c8');
      ctx.fillStyle = '#2e5a2e';
      for (let i = 0; i < 3; i++) { const cx = ((t * 12 + i * 170) % (C.W + 80)) - 40, cy = y0 + 12 + i * 6; ctx.fillRect(cx, cy, 22, 4); ctx.fillRect(cx + 22, cy - 1, 6, 4); ctx.fillStyle = '#e8e8e8'; ctx.fillRect(cx + 24, cy, 1, 1); ctx.fillStyle = '#2e5a2e'; for (let s = 0; s < 4; s++) ctx.fillRect(cx + 3 + s * 5, cy - 2, 2, 2); }
      break;
    }
    case 'void': vgrad(y0 - 10, C.H, 'rgba(10,10,18,0)', '#0a0a12'); break;      // abyss fade
    case 'dark': vgrad(y0 - 10, C.H, 'rgba(8,6,10,0.2)', '#050307'); break;      // mansion basement
    case 'sky': /* open air — leave the sky showing */ break;
    default: liquid('#7a0d13', '#ff7a00', '#f4a300');
  }
}

// Fully-repainting backdrops for indoor worlds (drawn after the sky); others add
// a far layer or nothing so the themed sky still shows.
function drawWorldBackdrop(world) {
  const C = CONFIG, W = C.W, H = C.H, t = Game.t;
  if (world === 'climbing') {                 // indoor climbing gym wall + colourful holds
    vgrad(0, H, '#6f6a62', '#4a463f');
    for (let i = 0; i < 46; i++) {
      const x = (hash(i) * W) | 0, y = (hash(i + 51) * (H - 20) + 6) | 0;
      const cols = ['#e0392f', '#f4d03f', '#39a0ed', '#7cb342', '#e0348b', '#e8912a'];
      ctx.fillStyle = cols[i % cols.length]; ctx.beginPath(); ctx.arc(x, y, 2.5, 0, 7); ctx.fill();
    }
    ctx.strokeStyle = 'rgba(0,0,0,0.15)'; ctx.lineWidth = 1;
    for (let y = 24; y < H; y += 24) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  } else if (world === 'mansion') {            // a real DOLLHOUSE — sky shows left/right/above
    const hx0 = C.PLAT_X0 - 12, hx1 = C.PLAT_X1 + 12, wallTop = 46, peak = 16;
    // interior (wallpaper) — only inside the house, so the sky remains visible around it
    ctx.fillStyle = '#5a3d2e'; ctx.fillRect(hx0, wallTop, hx1 - hx0, H - wallTop);
    ctx.fillStyle = 'rgba(255,220,180,0.06)'; for (let x = hx0 + 6; x < hx1; x += 14) ctx.fillRect(x, wallTop, 5, H - wallTop);
    // roof (peaked) sitting on the walls
    ctx.fillStyle = '#7a2318'; ctx.beginPath(); ctx.moveTo(hx0 - 10, wallTop); ctx.lineTo((hx0 + hx1) / 2, peak); ctx.lineTo(hx1 + 10, wallTop); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#5a1810'; ctx.fillRect(hx0 - 10, wallTop - 3, hx1 - hx0 + 20, 4);
    // side walls (exterior trim)
    ctx.fillStyle = '#3a2618'; ctx.fillRect(hx0, wallTop, 5, H - wallTop); ctx.fillRect(hx1 - 5, wallTop, 5, H - wallTop);
    // a framed picture + a window on the interior wall
    ctx.fillStyle = '#3a2a1e'; ctx.fillRect(hx0 + 30, wallTop + 12, 34, 26); ctx.fillStyle = '#caa96b'; ctx.fillRect(hx0 + 33, wallTop + 15, 28, 20);
    ctx.fillStyle = '#2a2f3a'; ctx.fillRect(hx1 - 74, wallTop + 10, 44, 40); ctx.fillStyle = '#6f8cae'; ctx.fillRect(hx1 - 71, wallTop + 13, 38, 34);
    ctx.fillStyle = '#3a2a1e'; ctx.fillRect(hx1 - 54, wallTop + 10, 4, 40); ctx.fillRect(hx1 - 74, wallTop + 28, 44, 4);
  } else if (world === 'rooftops') {           // distant skyline near the horizon
    for (let i = 0; i < 14; i++) {
      const bx = i * 38 - 10, bh = 40 + (hash(i) * 60 | 0), by = C.PLAT_Y - bh + 30;
      ctx.fillStyle = i % 2 ? '#2c3340' : '#333b49'; ctx.fillRect(bx, by, 34, bh);
      ctx.fillStyle = 'rgba(240,220,120,0.25)'; for (let wy = by + 6; wy < by + bh - 4; wy += 8) for (let wx = bx + 4; wx < bx + 30; wx += 8) if (((wx + wy) & 3) === 0) ctx.fillRect(wx, wy, 3, 3);
    }

}

// ── Per-world platform renderers (collision surface = ter.segments, unchanged) ──
function segDefault(s, d) {                    // brick column (bathtub + fallback)
  const C = CONFIG, w = s.x1 - s.x0;
  ctx.fillStyle = d.body; ctx.fillRect(s.x0, s.top, w, C.H - s.top);
  ctx.fillStyle = d.brick;
  for (let by = s.top + 6; by < C.H; by += 10) ctx.fillRect(s.x0, by, w, 1);
  for (let bx = s.x0 + 8; bx < s.x1; bx += 16) ctx.fillRect(bx, s.top, 1, C.H - s.top);
  ctx.fillStyle = d.edge; ctx.fillRect(s.x0, s.top, w, 4);
  ctx.fillStyle = d.hi; ctx.fillRect(s.x0, s.top, w, 1);
}
function segVolcano(s) {                        // craggy basalt rock with molten seams
  const C = CONFIG, w = s.x1 - s.x0, y = s.top;
  ctx.fillStyle = '#241c1a'; ctx.fillRect(s.x0, y, w, C.H - y);
  ctx.fillStyle = '#332722'; for (let bx = s.x0 + 4; bx < s.x1; bx += 9) ctx.fillRect(bx, y + 3, 3, C.H - y);
  ctx.fillStyle = 'rgba(255,90,0,0.55)'; for (let bx = s.x0 + 2; bx < s.x1; bx += 13) ctx.fillRect(bx, y + 6 + (hash(bx) * 10 | 0), 2, 8 + (hash(bx + 1) * 12 | 0));
  ctx.fillStyle = '#5a4a3e'; ctx.fillRect(s.x0, y, w, 3);
  ctx.fillStyle = '#7a685a'; ctx.fillRect(s.x0, y, w, 1);
  ctx.fillStyle = 'rgba(255,140,40,0.6)'; ctx.fillRect(s.x0, C.H - 3, w, 3);   // lava-lit underside
}
function segRooftops(s) {                       // concrete building facade with lit windows
  const C = CONFIG, w = s.x1 - s.x0, y = s.top;
  ctx.fillStyle = '#4a4e57'; ctx.fillRect(s.x0, y, w, C.H - y);
  ctx.fillStyle = '#33373f'; ctx.fillRect(s.x0, y + 5, w, C.H - y);
  for (let wy = y + 9; wy < C.H; wy += 11) for (let wx = s.x0 + 4; wx < s.x1 - 3; wx += 9) { ctx.fillStyle = (hash(wx * 7 + wy) > 0.45) ? '#ffe08a' : '#20242c'; ctx.fillRect(wx, wy, 5, 6); }
  ctx.fillStyle = '#6d727d'; ctx.fillRect(s.x0, y, w, 5);   // parapet roof
  ctx.fillStyle = '#8b909b'; ctx.fillRect(s.x0, y, w, 1);
}
function segPoison(s) {                          // dark smudgy clay + green turf tufts
  const C = CONFIG, w = s.x1 - s.x0, y = s.top;
  ctx.fillStyle = '#241f2a'; ctx.fillRect(s.x0, y, w, C.H - y);
  ctx.fillStyle = 'rgba(60,40,70,0.6)'; for (let i = 0; i < w; i += 5) ctx.fillRect(s.x0 + i, y + 4 + (hash(s.x0 + i) * 14 | 0), 4, 3 + (hash(i) * 8 | 0));  // smudges
  ctx.fillStyle = '#3a5a2e'; ctx.fillRect(s.x0, y, w, 4);   // mossy top
  ctx.fillStyle = '#5f8a3a'; for (let tx = s.x0 + 2; tx < s.x1; tx += 7) { const th = 3 + (hash(tx) * 4 | 0); ctx.fillRect(tx, y - th, 2, th); ctx.fillRect(tx + 3, y - th + 1, 1, th); }   // turf blades
}
function segClimbing(s) {                        // bolted wooden plank ledge
  const C = CONFIG, w = s.x1 - s.x0, y = s.top;
  ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(s.x0, y + 6, w, C.H - y);   // shadow under the ledge on the wall
  ctx.fillStyle = '#8a5a30'; ctx.fillRect(s.x0, y, w, 7);
  ctx.fillStyle = '#b5843f'; ctx.fillRect(s.x0, y, w, 2);
  ctx.fillStyle = '#5a3a1e'; for (let bx = s.x0 + 3; bx < s.x1; bx += 14) ctx.fillRect(bx, y + 2, 1, 4);   // plank seams
  ctx.fillStyle = '#cfd6dd'; ctx.fillRect(s.x0 + 2, y + 2, 2, 2); ctx.fillRect(s.x1 - 4, y + 2, 2, 2);   // bolts
}
function segCorks(s) {                           // wine corks stood vertically, side by side
  const C = CONFIG, y = s.top;
  for (let cx = s.x0; cx < s.x1; cx += 8) {
    const cw = Math.min(8, s.x1 - cx);
    ctx.fillStyle = '#c8a06a'; ctx.fillRect(cx, y, cw, C.H - y);
    ctx.fillStyle = '#a8804a'; ctx.fillRect(cx + cw - 1, y, 1, C.H - y);   // seam between corks
    ctx.fillStyle = '#e0c090'; ctx.fillRect(cx, y, cw, 2);                 // lit top
    ctx.fillStyle = 'rgba(120,90,50,0.5)'; for (let sy = y + 5; sy < C.H; sy += 6) ctx.fillRect(cx + 1, sy, cw - 2, 1);   // cork speckle lines
  }
}
function segBridge(s) {                          // wooden rope bridge planks on support trestles
  const C = CONFIG, w = s.x1 - s.x0, y = s.top, wl = C.LAVA_Y + 4;   // trestles reach into the water
  // support trestles (posts + cross-brace) holding the bridge up, at ~40px spacing
  ctx.strokeStyle = '#3a2414'; ctx.lineWidth = 2;
  for (let tx = s.x0 + 8; tx < s.x1 - 2; tx += 42) {
    ctx.fillStyle = '#5a3a1e'; ctx.fillRect(tx, y + 8, 3, wl - (y + 8)); ctx.fillRect(tx + 14, y + 8, 3, wl - (y + 8));   // two posts
    ctx.beginPath(); ctx.moveTo(tx + 1, y + 12); ctx.lineTo(tx + 16, wl - 6); ctx.moveTo(tx + 16, y + 12); ctx.lineTo(tx + 1, wl - 6); ctx.stroke();   // X brace
  }
  ctx.strokeStyle = '#6b4a2a'; ctx.lineWidth = 2;   // side ropes with a little sag
  ctx.beginPath(); ctx.moveTo(s.x0, y - 6); ctx.quadraticCurveTo(s.x0 + w / 2, y - 1, s.x1, y - 6); ctx.stroke();
  for (let px = s.x0 + 1; px < s.x1 - 2; px += 6) { ctx.fillStyle = (px & 8) ? '#7a5230' : '#8a5a30'; ctx.fillRect(px, y, 4, 8); ctx.strokeStyle = '#3a2414'; ctx.strokeRect(px + 0.5, y + 0.5, 4, 7); }
  ctx.fillStyle = '#4a3018'; ctx.fillRect(s.x0 - 2, y - 8, 3, 16); ctx.fillRect(s.x1 - 1, y - 8, 3, 16);   // end posts
}
function segClouds(s) {                          // fluffy cloud platform (open air below)
  const w = s.x1 - s.x0, y = s.top, cy = y + 5;
  ctx.fillStyle = 'rgba(180,200,225,0.9)'; ctx.beginPath(); ctx.ellipse(s.x0 + w / 2, cy + 3, w / 2, 7, 0, 0, 7); ctx.fill();   // shaded underside
  ctx.fillStyle = '#ffffff';
  for (let bx = s.x0 + 4; bx <= s.x1 - 4; bx += 9) { const r = 5 + (hash(bx) * 4 | 0); ctx.beginPath(); ctx.arc(bx, cy, r, 0, 7); ctx.fill(); }
  ctx.fillRect(s.x0 + 2, y + 1, w - 4, 5);
}
function segMansion(s) {                          // wooden floorboards + baseboard (holes = gaps)
  const C = CONFIG, w = s.x1 - s.x0, y = s.top;
  ctx.fillStyle = '#6b4a2e'; ctx.fillRect(s.x0, y, w, C.H - y);
  ctx.fillStyle = '#7a5636'; ctx.fillRect(s.x0, y, w, 6);
  ctx.fillStyle = '#5a3a20'; for (let bx = s.x0 + 6; bx < s.x1; bx += 18) ctx.fillRect(bx, y, 1, 6);   // board seams
  ctx.fillStyle = '#3a2616'; ctx.fillRect(s.x0, y + 6, w, 2);                 // baseboard shadow
  ctx.fillStyle = '#9a6a44'; ctx.fillRect(s.x0, y, w, 1);
}
function segBeach(s) {                            // sandy dune with grains + a shell
  const C = CONFIG, w = s.x1 - s.x0, y = s.top;
  ctx.fillStyle = '#e0c890'; ctx.fillRect(s.x0, y, w, C.H - y);
  ctx.fillStyle = '#c8a868'; ctx.beginPath(); ctx.moveTo(s.x0, y + 4); ctx.quadraticCurveTo(s.x0 + w / 2, y - 2, s.x1, y + 4); ctx.lineTo(s.x1, y + 6); ctx.lineTo(s.x0, y + 6); ctx.fill();
  ctx.fillStyle = '#fff0cc'; ctx.beginPath(); ctx.moveTo(s.x0, y + 3); ctx.quadraticCurveTo(s.x0 + w / 2, y - 3, s.x1, y + 3); ctx.lineTo(s.x1, y + 4); ctx.lineTo(s.x0, y + 4); ctx.fill();   // dune highlight
  ctx.fillStyle = 'rgba(150,120,70,0.5)'; for (let gx = s.x0 + 3; gx < s.x1; gx += 6) ctx.fillRect(gx, y + 8 + (hash(gx) * 8 | 0), 1, 1);   // grains
}
const SEG_RENDER = { classic: segVolcano, rooftops: segRooftops, poison: segPoison, climbing: segClimbing, wineCorks: segCorks, ropeBridge: segBridge, skyClouds: segClouds, mansion: segMansion, beach: segBeach };

function drawTerrain() {
  const ter = Game.terrain; if (!ter) return;
  const world = Game.theme.world, d = (WORLDS[world] || WORLDS.classic).deco, fn = SEG_RENDER[world];
  // Holes (gaps between segments) stay open → sky/hazard shows through.
  for (const s of ter.segments) { if (fn) fn(s, d); else segDefault(s, d); }
}

function heroColor(h) {
  const p = PALETTE[h.colorIdx];
  if (p && p.rainbow) return `hsl(${(Game.t * 90) % 360} 90% 62%)`;
  return (p && p.css) || '#39a0ed';
}

// A tiny arm from body-edge (ax,ay) in direction dir (±1), holding a knife pointing UP.
function drawArmKnife(c, ax, ay, dir) {
  const hand = dir > 0 ? ax + 4 : ax - 6;                                            // outer end (fist)
  c.fillStyle = '#0a0a0a'; c.fillRect(dir > 0 ? ax : ax - 4, ay, 4, 2);              // arm (horizontal)
  c.fillStyle = '#8a5a30'; c.fillRect(hand, ay - 1, 2, 2);                           // hilt / fist
  c.fillStyle = '#d7dde4'; c.fillRect(hand, ay - 6, 2, 5);                           // blade pointing up
}

function drawHero() {
  const h = Game.hero, C = CONFIG;
  const tremble = h.frozen > 0 ? Math.round((Math.random() * 2 - 1) * 1.5) : 0;   // scream-freeze shiver
  const x = Math.round(h.x - h.w / 2) + tremble, y = Math.round(h.y - h.h);
  let alpha = 1;
  if (h.ghost > 0) alpha = 0.35 + 0.3 * (0.5 + 0.5 * Math.sin(Game.t * 34));   // ghostly respawn
  else if (h.hurt > 0 && ((Game.t * 20) | 0) & 1) alpha = 0.35;                // i-frame flicker

  ctx.save();
  // dodge: spin the sprite in place (ninja)
  if (h.dodgeT > 0) { const cxc = h.x, cyc = h.y - h.h / 2; ctx.translate(cxc, cyc); ctx.rotate(Game.t * 26); ctx.translate(-cxc, -cyc); }
  ctx.globalAlpha = alpha;

  // legs (little walk cycle on the ground)
  ctx.fillStyle = '#0a0a0a';
  const moving = h.onGround && Math.abs(h.vx) > 6;
  const step = moving ? (Math.sin(Game.t * 20) > 0 ? 1 : 0) : 0;
  ctx.fillRect(x + 1, h.y - 3, 3, 3 + step);
  ctx.fillRect(x + h.w - 4, h.y - 3, 3, 4 - step);

  // body frame
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(x, y, h.w, h.h - 2);
  const col = heroColor(h);
  if (Game.owned.costume) {                                    // striped suit
    for (let sx = 2; sx < h.w - 2; sx += 3) { ctx.fillStyle = ((sx >> 1) & 1) ? col : '#eee8d5'; ctx.fillRect(x + sx, y + 2, 2, h.h - 6); }
  } else {                                                     // interior "T" from the concept art
    ctx.fillStyle = col;
    ctx.fillRect(x + 2, y + 2, h.w - 4, 3);                     // top bar
    ctx.fillRect(x + (h.w >> 1) - 1, y + 2, 3, h.h - 8);        // stem
  }
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(x + 2, y + 2, h.w - 4, 1);
  ctx.fillStyle = '#fff'; ctx.fillRect(x + (h.face > 0 ? h.w - 4 : 2), y + 6, 2, 2);   // eye
  // per-mode arms + knives (normal: one; RAGE: two)
  const my = y + (h.h >> 1);
  if (Game.mode === 'normal' || Game.mode === 'rage') drawArmKnife(ctx, x + h.w, my, 1);
  if (Game.mode === 'rage') drawArmKnife(ctx, x, my + 2, -1);
  // gray outline so the hero reads on dark backgrounds
  ctx.fillStyle = 'rgba(150,156,166,0.9)';
  ctx.fillRect(x - 1, y - 1, h.w + 2, 1); ctx.fillRect(x - 1, y + h.h - 2, h.w + 2, 1);
  ctx.fillRect(x - 1, y - 1, 1, h.h); ctx.fillRect(x + h.w, y - 1, 1, h.h);
  ctx.restore();

  // spiked shield in front of the facing side (not rotated)
  if (h.shieldT > 0) {
    const sxp = h.face > 0 ? x + h.w + 1 : x - 4;
    ctx.fillStyle = '#c9d0da'; ctx.fillRect(sxp, y + 1, 3, h.h - 3);
    ctx.fillStyle = '#e6ecf3'; for (let sy = y + 1; sy < y + h.h - 2; sy += 3) { const tip = sxp + (h.face > 0 ? 5 : -2); ctx.beginPath(); ctx.moveTo(tip, sy + 1); ctx.lineTo(sxp + (h.face > 0 ? 3 : 0), sy); ctx.lineTo(sxp + (h.face > 0 ? 3 : 0), sy + 2); ctx.fill(); }
  }
  // shield cooldown ring above the hero (until ready again)
  if (Game.owned.shield && h.shieldCd > 0) {
    const rcx = h.x, rcy = y - 6, frac = 1 - h.shieldCd / C.SHIELD_CD;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(rcx, rcy, 3, 0, 7); ctx.stroke();
    ctx.strokeStyle = '#8fd0ff'; ctx.beginPath(); ctx.arc(rcx, rcy, 3, -Math.PI / 2, -Math.PI / 2 + frac * Math.PI * 2); ctx.stroke();
  }
  // dodge fuel bar above the hero (a bit higher than the shield ring, no overlap)
  if (h.dodgeT > 0) {
    const bw = 16, bx = Math.round(h.x - bw / 2), by = y - 12;
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(bx - 1, by - 1, bw + 2, 4);
    ctx.fillStyle = '#b58ce0'; ctx.fillRect(bx, by, Math.round(bw * (h.dodgeT / C.DODGE_TIME)), 2);
  }
  ctx.globalAlpha = 1;
}

const ENEMY_COL = { clear: '#dfe6e9', red: '#e0392f', yellow: '#f4d03f', rainbow: '#fff', volcano: '#c1121f' };

function drawDonut(cx, cy, r, type, spikes, gaze, alpha, phase) {
  const col = ENEMY_COL[type] || '#fff';
  ctx.globalAlpha = alpha;
  // spikes (triangles pointing outward)
  ctx.fillStyle = type === 'clear' ? 'rgba(220,228,230,0.9)' : col;
  for (let i = 0; i < spikes; i++) {
    const a = phase + (i / spikes) * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const tx = cx + Math.cos(a) * (r + 4), ty = cy + Math.sin(a) * (r + 4);
    const px = -Math.sin(a) * 2.4, py = Math.cos(a) * 2.4;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx + px, sy + py); ctx.lineTo(sx - px, sy - py); ctx.closePath(); ctx.fill();
  }
  // donut ring
  if (type === 'clear') { ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
  else { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); }
  // eye socket + tracking pupil
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx + gaze * r * 0.22, cy, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawEnemies() {
  const phase = Game.t * 6;
  for (const e of Game.enemies) {
    // fading motion trail
    for (let i = 0; i < e.trail.length; i++) {
      const tp = e.trail[i], a = 0.06 + 0.12 * (i / e.trail.length);
      drawDonut(tp.x, tp.y - e.r, e.r * 0.85, e.type, e.spikes, e.gaze, a, phase);
    }
    drawDonut(e.x, e.y - e.r, e.r, e.type, e.spikes, e.gaze, 1, phase);
  }
}

function drawBoss() {
  const b = Game.boss; if (!b) return;
  const cx = b.x, cy = b.y - b.r, r = b.r;
  const phase2 = b.enraged || b.hits >= Math.ceil(b.maxHits * 2 / 3);   // enraged in the last third (or revived)
  let col = ENEMY_COL[b.type] || '#fff';
  if (b.type === 'rainbow') col = `hsl(${(Game.t * 120) % 360} 90% 60%)`;
  else if (b.type === 'volcano') col = b.enraged ? '#8a0f16' : '#c1121f';
  // hit flash
  const flash = b.iframe > 0 && ((Game.t * 24) | 0) & 1;

  // telegraph/feint wind-up cue (lean + glow)
  if (b.state === 'telegraph' || b.state === 'feint') {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(cx, cy, r + 5 + Math.sin(Game.t * 20) * 2, 0, Math.PI * 2); ctx.fill();
  }
  // scream: expanding shock rings
  if (b.state === 'scream') {
    for (let i = 0; i < 3; i++) { const rr = r + 6 + ((Game.t * 60 + i * 12) % 30); ctx.strokeStyle = `rgba(255,80,40,${0.5 - rr / 90})`; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, rr, 0, Math.PI * 2); ctx.stroke(); }
  }
  ctx.save();
  if (flash) ctx.globalAlpha = 0.5;
  // spikes
  const phase = Game.t * (phase2 ? 5 : 3);
  ctx.fillStyle = b.type === 'clear' ? 'rgba(223,230,233,0.9)' : col;
  for (let i = 0; i < b.spikes; i++) {
    const a = phase + (i / b.spikes) * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const tx = cx + Math.cos(a) * (r + (phase2 ? 8 : 6)), ty = cy + Math.sin(a) * (r + (phase2 ? 8 : 6));
    const px = -Math.sin(a) * 3.5, py = Math.cos(a) * 3.5;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx + px, sy + py); ctx.lineTo(sx - px, sy - py); ctx.closePath(); ctx.fill();
  }
  // body
  if (b.type === 'clear') { ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
  else { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); }
  // cracks when enraged
  if (phase2) {
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx - r * 0.5, cy - r * 0.3); ctx.lineTo(cx - r * 0.1, cy + r * 0.2); ctx.lineTo(cx - r * 0.3, cy + r * 0.6); ctx.stroke();
  }
  // eye (angrier + bloodshot in phase 2), tracking pupil
  ctx.fillStyle = phase2 ? '#ffdede' : '#fff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = phase2 ? '#c1121f' : '#111'; ctx.beginPath(); ctx.arc(cx + b.gaze * r * 0.2, cy, r * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // HP: pips for small counts, a bar for big ones (RAGE goes up to 12)
  const remain = b.maxHits - b.hits, bw = 30, bx = cx - bw / 2, by = cy - r - 11;
  if (b.maxHits <= 6) {
    const pw = Math.min(6, (bw + 2) / b.maxHits - 2);
    for (let i = 0; i < b.maxHits; i++) { ctx.fillStyle = i < remain ? (phase2 ? '#e0392f' : '#f4d03f') : 'rgba(255,255,255,0.2)'; ctx.fillRect(bx + i * (pw + 2), by, pw, 4); }
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(bx, by, bw, 4);
    ctx.fillStyle = phase2 ? '#e0392f' : '#f4d03f'; ctx.fillRect(bx, by, bw * (remain / b.maxHits), 4);
  }
}

function drawParticles() {
  for (const p of Game.particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.r, p.r);
  }
  ctx.globalAlpha = 1;
  // rising combo / points floaters
  ctx.textAlign = 'center'; ctx.font = '7px monospace';
  for (const f of Game.floaters) {
    ctx.globalAlpha = Math.max(0, 1 - f.t / f.life);
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, Math.round(f.x), Math.round(f.y));
  }
  ctx.globalAlpha = 1; ctx.textAlign = 'left';
}

// fill in [0,1] — draws an empty heart then clips a left-anchored fraction in red.
// fill in [0,1] — empty heart, then a clockwise PIE wedge of red from 12 o'clock.
function drawHeart(x, y, fill) {
  const px = () => { ctx.fillRect(x + 1, y, 2, 1); ctx.fillRect(x + 5, y, 2, 1); ctx.fillRect(x, y + 1, 8, 3); ctx.fillRect(x + 1, y + 4, 6, 1); ctx.fillRect(x + 2, y + 5, 4, 1); ctx.fillRect(x + 3, y + 6, 2, 1); };
  ctx.fillStyle = 'rgba(255,255,255,0.18)'; px();                 // empty base
  fill = Math.max(0, Math.min(1, fill));
  if (fill >= 1) { ctx.fillStyle = '#e0392f'; px(); return; }
  if (fill > 0) {
    const cx = x + 4, cy = y + 3.5, r = 7, a0 = -Math.PI / 2;      // start at top, sweep clockwise
    ctx.save(); ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, a0, a0 + fill * Math.PI * 2); ctx.closePath(); ctx.clip();
    ctx.fillStyle = '#e0392f'; px(); ctx.restore();
  }
}

function drawHUD() {
  const C = CONFIG;
  ctx.textBaseline = 'top'; ctx.font = '8px monospace';
  // readability backdrop so hearts/text stay legible over any world
  const slotsN = Math.min(9, Math.max(3, Math.ceil(maxHearts())));
  ctx.fillStyle = 'rgba(6,8,14,0.45)';
  ctx.fillRect(0, 0, Math.max(150, 12 + slotsN * 11), 40);
  if (Game.scene === 'PLAY') ctx.fillRect(C.W / 2 - 26, 0, 52, 20);
  // health as (fractional) hearts; one slot per max heart, capped for display.
  const slots = slotsN;
  const a = Game.heartAnim, p = a ? Math.min(1, a.t / a.dur) : 1;   // new heart slides in from the left
  for (let i = 0; i < slots; i++) {
    let hx = 6 + i * 11;
    if (a) hx = (i === 0) ? 6 - (1 - p) * 14 : 6 + (i - 1 + p) * 11;   // insert on the left, push the rest right
    drawHeart(hx, 7, Math.max(0, Math.min(1, Game.hp - i)));
  }
  ctx.fillStyle = '#eee8d5';
  if (maxHearts() > 9) ctx.fillText('+' + (maxHearts() - 9), 6 + 9 * 11 + 1, 7);
  // level name + score (top-left, second row; kept clear of the top-right buttons)
  ctx.fillStyle = '#93a1a1'; ctx.fillText('LV' + Game.level + ' ' + (LEVEL_NAMES[Game.level] || ''), 6, 18);
  ctx.fillStyle = '#8a9ba0'; ctx.fillText('POINTS ' + Game.points, 6, 28);
  // timer / boss flag (centre)
  if (Game.scene === 'PLAY') {
    if (Game.bossActive) { ctx.textAlign = 'center'; ctx.fillStyle = '#e0392f'; ctx.font = '10px monospace'; ctx.fillText('◆ BOSS ◆', C.W / 2, 7); ctx.textAlign = 'left'; }
    else {
      const remain = Math.max(0, Math.ceil(C.LEVEL_TIME - Game.t));
      ctx.textAlign = 'center'; ctx.fillStyle = remain <= 10 ? '#f4d03f' : '#eee8d5'; ctx.font = '11px monospace';
      ctx.fillText(remain + '', C.W / 2, 7); ctx.textAlign = 'left';
    }
  }
}

function centerText(lines) {
  const C = CONFIG;
  ctx.fillStyle = 'rgba(6,8,18,0.55)'; ctx.fillRect(0, 0, C.W, C.H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let y = C.H / 2 - (lines.length - 1) * 12;
  for (const ln of lines) {
    ctx.font = (ln.big ? 'bold 22px' : '10px') + ' monospace';
    ctx.fillStyle = ln.color || '#eee8d5';
    ctx.fillText(ln.t, C.W / 2, y); y += ln.big ? 26 : 15;
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
}

function drawSpawner(x) {
  const bob = Math.sin(Game.t * 2.2) * 3, sy = CONFIG.SPAWN_Y + bob;
  ctx.fillStyle = '#0c0c10'; ctx.fillRect(x - 13, sy - 13, 26, 26);
  ctx.fillStyle = '#23252e'; ctx.fillRect(x - 13, sy - 13, 26, 3);
  const mawGlow = 0.5 + 0.5 * Math.sin(Game.t * 5);
  ctx.fillStyle = `rgba(230,57,47,${0.5 + 0.4 * mawGlow})`;
  ctx.fillRect(x - 6, sy - 2, 12, 9);
  ctx.fillStyle = '#0c0c10'; ctx.fillRect(x - 2, sy - 13, 5, 8);
  ctx.fillRect(x - 9, sy + 4, 18, 3);
}

function drawMerchant() {
  const m = Game.merchant; if (!m) return;
  const x = Math.round(m.x), y = Math.round(m.y);
  // red parachute canopy + strings (shown while airborne)
  if (m.state !== 'shop') {
    ctx.strokeStyle = '#111'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x - 5, y - 8); ctx.lineTo(x - 12, y - 26); ctx.moveTo(x + 5, y - 8); ctx.lineTo(x + 12, y - 26); ctx.stroke();
    ctx.fillStyle = '#c31432'; ctx.beginPath(); ctx.moveTo(x - 16, y - 26); ctx.quadraticCurveTo(x, y - 44, x + 16, y - 26); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#8a0f24'; ctx.fillRect(x - 16, y - 27, 32, 2);
  }
  // green blocky body (eye + orange/red accents + little legs) — per IMG_0052
  ctx.fillStyle = '#0a0a0a'; ctx.fillRect(x - 3, y + 6, 3, 4); ctx.fillRect(x + 1, y + 6, 3, 4);   // legs
  ctx.fillStyle = '#2e6b3a'; ctx.fillRect(x - 7, y - 8, 14, 15);                                    // body
  ctx.fillStyle = '#0a0a0a'; ctx.strokeStyle = '#0a0a0a'; ctx.lineWidth = 1; ctx.strokeRect(x - 7 + 0.5, y - 8 + 0.5, 13, 14);
  ctx.fillStyle = '#c31432'; ctx.fillRect(x + 1, y - 6, 4, 2);                                      // red accent
  ctx.fillStyle = '#e8912a'; ctx.fillRect(x - 6, y + 1, 3, 4);                                      // orange satchel
  ctx.fillStyle = '#fff'; ctx.fillRect(x - 2, y - 4, 4, 4);                                         // eye
  ctx.fillStyle = '#2a7fd0'; ctx.fillRect(x - 1, y - 3, 2, 2);                                      // blue pupil
}

function render() {
  const C = CONFIG;
  ctx.save();
  // screen shake
  if (Game.shakeMag > 0) {
    const m = Game.shakeMag * (Game.shakeT / 0.25);
    ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
  }

  // Themed sky → world backdrop → hazard → platforms (holes show sky/hazard through)
  drawSky(Game.theme.sky);
  drawWorldBackdrop(Game.theme.world);
  drawHazard(Game.theme.world);
  drawTerrain();

  // Spawner cube(s) — RAGE mode adds a second box on the left.
  drawSpawner(C.SPAWN_X);
  if (MODES[Game.mode].spawners === 2) drawSpawner(C.SPAWN_X_L);

  const live = Game.scene === 'PLAY' || Game.scene === 'INTRO' || Game.scene === 'CLEAR' || Game.scene === 'SHOP';
  if (live) { drawEnemies(); drawBoss(); drawHero(); }
  if (Game.scene === 'SHOP') drawMerchant();
  drawParticles();

  if (live) drawHUD();

  // Scene overlays (canvas-drawn transient screens)
  if (Game.scene === 'INTRO') centerText([{ t: 'LEVEL ' + Game.level, big: true, color: '#f4d03f' }, { t: (WORLDS[Game.theme.world] || {}).name + ' · ' + (SKY_NAMES[Game.theme.sky] || ''), color: '#eee8d5' }, { t: 'survive 60 seconds, then the boss', color: '#93a1a1' }]);
  else if (Game.scene === 'CLEAR') centerText([{ t: 'LEVEL CLEAR', big: true, color: '#7cb342' }].concat(Game.gainedLife ? [{ t: '★ no-hit bonus: +1 heart! ★', color: '#f4d03f' }] : [{ t: 'points ' + Game.points, color: '#93a1a1' }]));
  else if (Game.scene === 'GAMEOVER') centerText([{ t: 'GAME OVER', big: true, color: '#e0392f' }, { t: 'reached level ' + Game.level, color: '#eee8d5' }, { t: 'tap to return to title', color: '#93a1a1' }]);
  else if (Game.scene === 'VICTORY') centerText([{ t: 'VICTORY!', big: true, color: '#f4d03f' }, { t: 'you conquered the tower', color: '#eee8d5' }, { t: MODES[Game.mode].name, color: '#93a1a1' }, { t: 'tap to return to title', color: '#93a1a1' }]);

  ctx.restore();
  updateShieldButton();
}

// ══════════════════════════════════════════════════════════════════
//  LOOP — fixed timestep with accumulator; render every frame
// ══════════════════════════════════════════════════════════════════
let acc = 0, last = null, testFreeze = false;
function tick(now) {
  if (last === null) last = now;
  let el = (now - last) / 1000; last = now;
  if (el > 0.25) el = 0.25;                 // clamp huge gaps (tab was hidden)
  if (testFreeze) { /* physics driven manually by BS.stepFixed in tests */ }
  else if (Game.scene === 'PLAY' && !Game.paused) {
    acc += el;
    let guard = 0;
    while (acc >= CONFIG.DT && guard++ < 600) { update(CONFIG.DT); acc -= CONFIG.DT; }
  } else {
    update(el);                             // transient scenes (INTRO/CLEAR/…) advance in real time
  }
  render();
  requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════════════════════
//  RESIZE / LIFECYCLE
// ══════════════════════════════════════════════════════════════════
function resize() {
  const vw = innerWidth, vh = innerHeight;
  const scale = Math.min(vw / CONFIG.W, vh / CONFIG.H);
  canvas.style.width = Math.floor(CONFIG.W * scale) + 'px';
  canvas.style.height = Math.floor(CONFIG.H * scale) + 'px';
  const portrait = vh > vw;
  document.getElementById('rotate').classList.toggle('show', portrait);
  updateControlsVisibility();
}
// Touch controls only make sense on touch devices — hide them on desktop (keyboard).
function isTouchDevice() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0) ||
         (window.matchMedia && window.matchMedia('(pointer: coarse)').matches);
}
function updateControlsVisibility() {
  const el = document.getElementById('controls');
  if (el) el.style.display = isTouchDevice() ? '' : 'none';
}
function updateShieldButton() {
  const el = document.getElementById('btn-shield'); if (!el) return;
  const show = isTouchDevice() && Game.owned && Game.owned.shield && Game.scene === 'PLAY';
  el.style.display = show ? 'flex' : 'none';
  if (show) { const cd = Game.hero.shieldCd; el.classList.toggle('cooling', cd > 0); el.textContent = cd > 0 ? String(Math.ceil(cd)) : '⛊'; }
}
addEventListener('resize', resize);
addEventListener('orientationchange', resize);
document.addEventListener('visibilitychange', () => { if (document.hidden && Game.scene === 'PLAY' && !Game.paused) togglePause(true); });
addEventListener('blur', () => { if (Game.scene === 'PLAY' && !Game.paused) togglePause(true); });

// ══════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════
Save.load();
reseed(pickSeed());
initInput();
resize();
Game.scene = 'TITLE';
requestAnimationFrame(tick);

// ── Test hook: pure logic + deterministic stepping for Playwright ──
window.BS = {
  version: '1.4.0',
  CONFIG, PALETTE, LEVELS, LEVEL_NAMES, MUSIC, MODES, WORLDS, WORLD_KEYS, SKY_KEYS, LAST_LEVEL,
  theme: () => Game.theme,
  themeOrder: () => Game.themeOrder,
  setMode: (m) => { if (MODES[m]) Game.mode = m; },
  mode: () => Game.mode,
  mulberry32,
  state: () => Game,
  scene: () => Game.scene,
  seed: () => Game.seed,
  reseed,
  genTerrain, surfaceAt, findSafeX,
  terrain: () => Game.terrain,
  setLevel: (n) => { Game.level = n | 0; buildLevel(); },
  hero: () => Game.hero,
  heroHurt, respawnHero,
  enemies: () => Game.enemies,
  spawnEnemy,
  boss: () => Game.boss,
  activateBoss,
  bossHit: () => Game.boss && bossHit(Game.boss),
  addKill,
  Input,
  audioState: () => (Audio.ctx ? Audio.ctx.state : 'none'),
  musicKey: () => Audio.music.key,
  musicRate: () => Audio.music.rate,
  musicVoices: () => Audio.music.oscs.length,   // scheduled osc/drum nodes (multi-voice songs schedule many)
  playMusic: (k) => Audio.playMusic(k),
  trackBars: (k) => { const t = MUSIC[k], L = t && t.layers && t.layers[0]; return L ? Math.round(L.notes.reduce((s, n) => s + n[1], 0) / 4) : 0; },
  trackLayerBars: (k) => { const t = MUSIC[k]; return t && t.layers ? t.layers.map((L) => L.notes.reduce((s, n) => s + n[1], 0) / 4) : []; },
  masterGain: () => (Audio.master ? Audio.master.gain.value : null),
  muted: () => Audio.muted,
  Save,
  // Flow controls
  start: startPlay,          // straight into PLAY (deterministic test entry)
  startGame,                 // real title→intro flow
  gotoPlay, tapAdvance, gotoTitle, gotoShop, closeShop,
  merchant: () => Game.merchant,
  SHOP_ITEMS, buyItem, buildShop,
  pause: togglePause,
  isPaused: () => Game.paused,
  buildSwatches,
  // Deterministic stepping (bypasses rAF) for physics tests.
  freeze: (on) => { testFreeze = !!on; },
  step: (dt) => update(dt),
  stepFixed: (n) => { for (let i = 0; i < (n | 0); i++) update(CONFIG.DT); },
};

})();
</script>

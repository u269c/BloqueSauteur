<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>BloqueSauteur</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0a12; touch-action:none; overscroll-behavior:none; }
  body { display:flex; align-items:center; justify-content:center; font-family:system-ui,-apple-system,sans-serif; }
  #game {
    display:block; background:#000;
    image-rendering:pixelated; image-rendering:crisp-edges;
    touch-action:none;
  }

  /* ── Touch controls (also work with mouse) ─────────────────────── */
  #controls { position:fixed; inset:0; pointer-events:none; z-index:10; }
  .btn {
    position:absolute; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:34px; font-weight:700;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.22);
    border-radius:16px; backdrop-filter:blur(2px);
    width:19vmin; height:19vmin; min-width:74px; min-height:74px;
    transition:background .05s;
  }
  .btn.pressed { background:rgba(255,255,255,0.28); }
  #btn-left  { left:3vmin;  bottom:4vmin; }
  #btn-right { left:24vmin; bottom:4vmin; }
  #btn-jump  { right:3vmin; bottom:4vmin; width:22vmin; height:22vmin; }

  /* ── Overlays ──────────────────────────────────────────────────── */
  .overlay {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:2.4vmin; text-align:center; color:#eee8d5; padding:6vmin;
    background:rgba(6,8,18,0.72);
  }
  .overlay.hidden { display:none; }
  .overlay h1 { font-size:min(11vmin,74px); letter-spacing:.06em; color:#f4d03f; text-shadow:3px 3px 0 #d63031; }
  .overlay p  { font-size:min(4.4vmin,22px); color:#b6c2c6; max-width:32ch; line-height:1.5; }
  .overlay .hint { font-size:min(3.6vmin,17px); color:#7a8a90; }
  .pulse { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* Portrait hint (non-blocking, informational) */
  #rotate { position:fixed; top:0; left:0; right:0; z-index:15; pointer-events:none;
    text-align:center; font-size:min(3.4vmin,15px); color:#f4d03f; padding:6px;
    background:rgba(6,8,18,0.6); display:none; }
  @media (orientation:portrait) { #rotate.show { display:block; } }

  /* Top-right HUD buttons */
  #topbar { position:fixed; top:2vmin; right:2vmin; z-index:12; display:flex; gap:1.4vmin; }
  .hud-btn {
    width:8.5vmin; height:8.5vmin; min-width:38px; min-height:38px;
    font-size:min(4.4vmin,20px); font-weight:700; color:#eee8d5;
    background:rgba(10,12,22,0.55); border:2px solid rgba(255,255,255,0.22);
    border-radius:10px; cursor:pointer;
  }
  .hud-btn.off { color:#7a6; opacity:.55; text-decoration:line-through; }

  /* Colour picker */
  .picker-label { font-size:min(3.4vmin,15px); color:#93a1a1; letter-spacing:.08em; text-transform:uppercase; }
  .swatches { display:grid; grid-template-columns:repeat(5,1fr); gap:1.6vmin; max-width:min(76vw,360px); }
  .swatch {
    width:11vmin; height:11vmin; max-width:56px; max-height:56px; min-width:38px; min-height:38px;
    border-radius:10px; border:3px solid rgba(255,255,255,0.18); cursor:pointer; position:relative;
    padding:0; background-clip:padding-box;
  }
  .swatch.sel { border-color:#fff; box-shadow:0 0 0 2px #f4d03f; }
  .swatch.locked { cursor:not-allowed; }
  .swatch.locked::after { content:'🔒'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:min(5vmin,22px); }
  .swatch.rainbow { background:linear-gradient(120deg,#e0392f,#f4d03f,#7cb342,#39a0ed,#e0348b); }

  .play-btn {
    margin-top:1vmin; padding:2vmin 6vmin; font-size:min(5vmin,22px); font-weight:700;
    color:#101018; background:#f4d03f; border:none; border-radius:12px; cursor:pointer;
    letter-spacing:.05em; box-shadow:0 4px 0 #b58900;
  }
  .play-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #b58900; }
  .play-btn.ghost { background:transparent; color:#b6c2c6; border:2px solid rgba(255,255,255,0.25); box-shadow:none; font-size:min(3.8vmin,17px); padding:1.4vmin 4vmin; }
</style>
</head>
<body>
  <canvas id="game" width="480" height="270"></canvas>

  <div id="rotate">↻ Rotate to landscape for the best view</div>

  <div id="topbar">
    <button class="hud-btn" id="pause-btn" aria-label="Pause">II</button>
    <button class="hud-btn" id="mute-btn" aria-label="Mute">♪</button>
  </div>

  <div id="controls" aria-hidden="true">
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-right">▶</div>
    <div class="btn" id="btn-jump">▲</div>
  </div>

  <div class="overlay" id="start">
    <h1>BLOQUE&nbsp;SAUTEUR</h1>
    <p>Survive the tower. Stomp the monsters into the lava.</p>
    <div class="picker-label">Your colour</div>
    <div class="swatches" id="swatches"></div>
    <button class="play-btn" id="play-btn">▶ PLAY</button>
    <p class="hint">Arrow keys ← → move, ↑ jump &nbsp;·&nbsp; or the on-screen buttons</p>
  </div>

  <div class="overlay hidden" id="pause">
    <h1 style="font-size:min(9vmin,52px)">PAUSED</h1>
    <div class="picker-label">Your colour</div>
    <div class="swatches" id="swatches-pause"></div>
    <button class="play-btn" id="resume-btn">▶ RESUME</button>
    <button class="play-btn ghost" id="quit-btn">✕ QUIT TO TITLE</button>
  </div>

<script>
"use strict";
(function () {

// ══════════════════════════════════════════════════════════════════
//  RNG — deterministic, seedable (mulberry32)
// ══════════════════════════════════════════════════════════════════
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function pickSeed() {
  const q = new URLSearchParams(location.search).get('seed');
  if (q !== null && q !== '' && Number.isFinite(+q)) return (+q) >>> 0;
  return (Math.floor(Math.random() * 0xffffffff)) >>> 0;
}

// ══════════════════════════════════════════════════════════════════
//  CONFIG — logical dimensions, physics, world layout, palette
// ══════════════════════════════════════════════════════════════════
const CONFIG = {
  W: 480, H: 270, TILE: 16,
  DT: 1 / 120,                       // fixed physics timestep (s)
  // World layout (logical px). Tower is central; lava fills both flanks.
  // Platform span is tile-aligned: (416-64)/16 = 22 columns.
  PLAT_Y: 178,                       // base platform top surface
  PLAT_X0: 64, PLAT_X1: 416,         // platform span (off either edge = lava)
  LAVA_Y: 232,                       // lava surface level
  SPAWN_X: 396, SPAWN_Y: 92,         // spawner cube centre
  // Hero physics (feel-tuned in P7). Variable jump via 3-phase gravity.
  RUN_SPEED: 112, GROUND_ACCEL: 1200, AIR_ACCEL: 700, GROUND_FRICTION: 1500,
  JUMP_V: 300, G_HELD: 940, G_CUT: 2600, G_FALL: 1050, MAX_FALL: 520,
  COYOTE: 0.08, JUMP_BUFFER: 0.10,
  HURT_IFRAMES: 1.0, KNOCKBACK: 155, KNOCK_LOCK: 0.18,
  // Terrain contract: generator guarantees holes ≤ MAX_JUMP_GAP and vertical
  // steps ≤ JUMP_MAX_H; hero physics (P3) must be able to clear both.
  MAX_JUMP_GAP: 48,                  // 3 tiles — widest hole the hero can clear
  JUMP_MAX_H: 48,                    // 3 tiles — apex height
  STEP_MAX: 6,                       // auto-step-up threshold (px); taller = wall
  // Meta
  LIVES_START: 3, LEVEL_TIME: 60, RESPAWN_GHOST: 2.0,
};

// 3×3 solid colours + rainbow (index 9), per concept art IMG_0049.
const PALETTE = [
  { name: 'blue',   css: '#39a0ed' },
  { name: 'green',  css: '#2e7d32' },
  { name: 'black',  css: '#1a1a1a' },
  { name: 'yellow', css: '#f4d03f' },
  { name: 'orange', css: '#e8731e' },
  { name: 'pink',   css: '#e0348b' },
  { name: 'slate',  css: '#455a64' },
  { name: 'red',    css: '#d63031' },
  { name: 'lime',   css: '#7cb342' },
  { name: 'rainbow', rainbow: true },
];

// Per-level difficulty (spawn cadence, enemy roster, pace, boss variant).
// Numbers are feel-tuning knobs (revisited in P7).
const LEVELS = {
  1: { types: ['clear'],                  spawnEvery: 2.2, speed: 26, maxAlive: 4, boss: 'clear'   },
  2: { types: ['clear', 'red'],           spawnEvery: 2.0, speed: 26, maxAlive: 5, boss: 'red'     },
  3: { types: ['clear', 'red', 'yellow'], spawnEvery: 2.0, speed: 26, maxAlive: 6, boss: 'yellow'  },
  4: { types: ['clear', 'red', 'yellow'], spawnEvery: 1.4, speed: 32, maxAlive: 7, boss: 'rainbow' },
};
const ENEMY = { r: 7, speedMul: { clear: 1, red: 1.7, yellow: 1 }, bounce: 230, jumpImpulse: 205, gravity: 900 };
const BOSS = {
  r: 17, hits: 3, iframe: 0.9, returnSpeed: 95, jumpImpulse: 250,
  charge:   { clear: 55, red: 108, yellow: 82, rainbow: 122 },   // charge speed per level boss
  idleWait: { clear: 1.2, red: 0.9, yellow: 0.9, rainbow: 0.7 }, // pause between attacks
};

const LEVEL_NAMES = { 1: 'THE SHALLOWS', 2: 'BROKEN GROUND', 3: 'THE GAPS', 4: 'INFERNO' };

// Chiptune loops + jingles (TRACKS format from the reference engine: [note, beats]).
const MUSIC = {
  title:   { bpm: 120, wave: 'square', gain: 0.22, loop: true, notes: [['E5',1],['B4',.5],['C5',.5],['D5',1],['C5',.5],['B4',.5],['A4',1],['A4',.5],['C5',.5],['E5',1],['D5',.5],['C5',.5],['B4',1.5],['R',.5]] },
  1:       { bpm: 112, wave: 'square', gain: 0.20, loop: true, notes: [['C5',1],['E5',1],['G5',1],['E5',1],['A4',1],['C5',1],['E5',1],['C5',1],['F4',1],['A4',1],['C5',1],['A4',1],['G4',2],['G5',2]] },
  2:       { bpm: 128, wave: 'square', gain: 0.20, loop: true, notes: [['D5',.5],['A4',.5],['D5',.5],['F5',.5],['E5',.5],['C5',.5],['E5',.5],['G5',.5],['D5',.5],['A4',.5],['D5',.5],['F5',.5],['A5',1],['G5',1]] },
  3:       { bpm: 140, wave: 'square', gain: 0.20, loop: true, notes: [['E5',.5],['E5',.5],['R',.5],['E5',.5],['R',.5],['C5',.5],['E5',.5],['G5',1],['G4',1],['C5',.75],['G4',.75],['E4',.5],['A4',.5],['B4',.5],['A4',.5],['G4',.5]] },
  4:       { bpm: 152, wave: 'sawtooth', gain: 0.18, loop: true, notes: [['A4',.5],['C5',.5],['E5',.5],['A5',.5],['G5',.5],['E5',.5],['C5',.5],['E5',.5],['F4',.5],['A4',.5],['C5',.5],['F5',.5],['E5',.5],['B4',.5],['G4',.5],['E4',.5]] },
  boss:    { bpm: 144, wave: 'sawtooth', gain: 0.20, loop: true, notes: [['D4',.5],['D4',.5],['F4',.5],['D4',.5],['A4',.5],['D4',.5],['G4',.5],['F4',.5],['E4',.5],['E4',.5],['G4',.5],['E4',.5],['C5',1],['A4',1]] },
  clear:   { bpm: 140, wave: 'square', gain: 0.26, loop: false, notes: [['C5',.5],['E5',.5],['G5',.5],['C6',1],['G5',.5],['C6',1.5]] },
  victory: { bpm: 132, wave: 'square', gain: 0.28, loop: false, notes: [['C5',.5],['C5',.5],['C5',.5],['C5',1],['G4',.5],['A4',.5],['C5',1],['A4',.5],['C5',2]] },
  gameover:{ bpm: 100, wave: 'triangle', gain: 0.26, loop: false, notes: [['C5',.5],['G4',.5],['E4',.5],['C4',1.5],['R',.3],['G3',2]] },
};

// ══════════════════════════════════════════════════════════════════
//  TERRAIN — seeded, per-level. Deterministic pure function of
//  (level, seed). Column heightmap → walkable segments; gaps = holes
//  (lava below). Fairness guaranteed by construction:
//    · solid footing at both ends
//    · every hole width ≤ MAX_JUMP_GAP
//    · every vertical step ≤ JUMP_MAX_H
//  L1 flat · L2/L4 hills + holes · L3 split into raised mini-platforms.
// ══════════════════════════════════════════════════════════════════
function genTerrain(level, seed) {
  const C = CONFIG, T = C.TILE, x0 = C.PLAT_X0, x1 = C.PLAT_X1, baseTop = C.PLAT_Y;
  const nCols = Math.round((x1 - x0) / T);                 // 22
  const EDGE = 2;                                          // solid columns each end
  const maxHoleCols = Math.max(1, Math.floor(C.MAX_JUMP_GAP / T));
  const rand = mulberry32(((seed >>> 0) ^ Math.imul(level | 0, 0x9E3779B1)) >>> 0);
  const h = new Array(nCols).fill(baseTop);               // null = hole

  function carveHoles(count, minW, maxW) {
    let placed = 0, tries = 0;
    maxW = Math.min(maxW, maxHoleCols);
    while (placed < count && tries++ < 300) {
      const w = minW + Math.floor(rand() * (maxW - minW + 1));
      const start = EDGE + Math.floor(rand() * (nCols - 2 * EDGE - w));
      let ok = true;                                       // need a solid buffer col on each side
      for (let i = start - 1; i <= start + w; i++) { if (i < EDGE || i >= nCols - EDGE || h[i] === null) { ok = false; break; } }
      if (!ok) continue;
      for (let i = start; i < start + w; i++) h[i] = null;
      placed++;
    }
    return placed;
  }
  function raiseHills(count, dTiles) {
    let placed = 0, tries = 0;
    while (placed < count && tries++ < 300) {
      const w = 2 + Math.floor(rand() * 3);                // 2-4 cols
      const start = EDGE + Math.floor(rand() * (nCols - 2 * EDGE - w));
      let ok = true;
      for (let i = start; i < start + w; i++) { if (h[i] !== baseTop) { ok = false; break; } }
      if (!ok) continue;
      for (let i = start; i < start + w; i++) h[i] = baseTop - dTiles * T;
      placed++;
    }
    return placed;
  }

  if (level === 1) { /* flat */ }
  else if (level === 2) { carveHoles(2 + Math.floor(rand() * 2), 1, 2); raiseHills(1 + Math.floor(rand() * 2), 1); }
  else if (level === 3) { carveHoles(1 + Math.floor(rand() * 2), 2, maxHoleCols); }
  else { carveHoles(3 + Math.floor(rand() * 2), 1, 2); raiseHills(2 + Math.floor(rand() * 2), 1); }

  // L3: raise every other mini-platform by one tile (visual + light platforming).
  if (level === 3) {
    let seg = -1, prevNull = true;
    for (let i = 0; i < nCols; i++) {
      if (h[i] === null) { prevNull = true; continue; }
      if (prevNull) seg++;
      prevNull = false;
      if (seg % 2 === 1) h[i] = baseTop - T;
    }
  }

  // Extract contiguous equal-height runs into segments.
  const segments = [];
  let i = 0;
  while (i < nCols) {
    if (h[i] === null) { i++; continue; }
    let j = i; while (j < nCols && h[j] === h[i]) j++;
    segments.push({ x0: x0 + i * T, x1: x0 + j * T, top: h[i] });
    i = j;
  }
  return { level, seed: seed >>> 0, cols: h, segments, baseTop, x0, x1, colW: T, nCols };
}

// Surface top y at world-x, or null if over a hole / off the platform.
function surfaceAt(terrain, x) {
  if (!terrain || x < terrain.x0 || x >= terrain.x1) return null;
  return terrain.cols[Math.floor((x - terrain.x0) / terrain.colW)];
}
// A solid x near the centre, for hero spawn / respawn.
function findSafeX(terrain) {
  const mid = (terrain.x0 + terrain.x1) / 2;
  for (let d = 0; d < (terrain.x1 - terrain.x0); d += terrain.colW) {
    for (const x of [mid + d, mid - d]) { if (surfaceAt(terrain, x) != null) return Math.round(x); }
  }
  return Math.round(mid);
}

// ══════════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════════
const Game = {
  scene: 'TITLE',        // TITLE | PLAY | (PAUSE handled by flag)
  paused: false,
  seed: 0,
  rand: null,            // active PRNG (reseeded per game)
  t: 0,                  // seconds elapsed in current scene
  level: 1,
  lives: CONFIG.LIVES_START,
  terrain: null,
  enemies: [],
  boss: null,
  spawnT: 0,                     // countdown to next spawn
  bossActive: false,            // regular spawns pause during the boss
  kills: 0,
  particles: [],
  shakeT: 0, shakeMag: 0,
  sceneT: 0,                     // time in the current transient scene (INTRO/CLEAR/…)
  gainedLife: false,             // did the last level clear award a no-hit life?
  rainbowUnlocked: false,        // unlocked on reaching level 4 (persisted)
  best: 0,                       // best level reached (persisted)
  hitThisLevel: false,           // cleared per level; drives the no-hit +1 life bonus
  hero: {
    x: 240, y: CONFIG.PLAT_Y, vx: 0, vy: 0, w: 12, h: 16, face: 1, colorIdx: 0,
    onGround: true, coyote: 0, jumpBuf: 0, jumping: false,
    hurt: 0,        // hurt-invulnerability timer (i-frames)
    knock: 0,       // control-lock during knockback
    ghost: 0,       // respawn ghostly-invincibility timer (enemies pass through)
    dead: false,
  },
  fps: 0,
};

// ── Persistence (localStorage) ────────────────────────────────────
const Save = {
  KEY: 'bloquesauteur.save',
  load() {
    let d = {};
    try { d = JSON.parse(localStorage.getItem(this.KEY) || '{}') || {}; } catch (e) { d = {}; }
    Game.hero.colorIdx = Number.isInteger(d.colorIdx) ? d.colorIdx : 0;
    Game.rainbowUnlocked = !!d.rainbowUnlocked;
    Game.best = d.best | 0;
    Audio.muted = !!d.muted;
    // never leave the hero on rainbow if it isn't unlocked yet
    if (PALETTE[Game.hero.colorIdx] && PALETTE[Game.hero.colorIdx].rainbow && !Game.rainbowUnlocked) Game.hero.colorIdx = 0;
  },
  save() {
    try {
      localStorage.setItem(this.KEY, JSON.stringify({
        colorIdx: Game.hero.colorIdx, rainbowUnlocked: Game.rainbowUnlocked, best: Game.best, muted: Audio.muted,
      }));
    } catch (e) { /* private mode / quota — ignore */ }
  },
};

function reseed(seed) { Game.seed = seed >>> 0; Game.rand = mulberry32(Game.seed); buildLevel(); }
function buildLevel() {
  Game.terrain = genTerrain(Game.level, Game.seed);
  Game.hitThisLevel = false;
  Game.enemies = [];
  Game.boss = null;
  Game.bossActive = false;
  Game.spawnT = (LEVELS[Game.level] || LEVELS[1]).spawnEvery * 0.5;   // first wave comes a touch early
  const sx = findSafeX(Game.terrain);
  Object.assign(Game.hero, {
    x: sx, y: surfaceAt(Game.terrain, sx) ?? CONFIG.PLAT_Y, vx: 0, vy: 0,
    onGround: true, coyote: 0, jumpBuf: 0, jumping: false, hurt: 0, knock: 0, ghost: 0, dead: false,
  });
}
function respawnHero() {
  const t = Game.terrain, sx = findSafeX(t);
  Object.assign(Game.hero, {
    x: sx, y: surfaceAt(t, sx) ?? CONFIG.PLAT_Y, vx: 0, vy: 0,
    onGround: true, coyote: 0, jumpBuf: 0, jumping: false, hurt: 0, knock: 0, dead: false,
    ghost: CONFIG.RESPAWN_GHOST,        // 2s ghostly invincibility — enemies pass through
  });
}

// ══════════════════════════════════════════════════════════════════
//  INPUT — arrow keys / WASD / space  +  on-screen touch buttons
// ══════════════════════════════════════════════════════════════════
const Input = {
  left: false, right: false, jumpHeld: false,
  _jumpQueued: false,          // rising-edge latch, consumed by hero
  _sources: { kb: {}, touch: {} },
  press(action, on) {
    if (action === 'jump') {
      if (on && !this.jumpHeld) this._jumpQueued = true;
      this.jumpHeld = on;
    } else if (action === 'left') this.left = on;
    else if (action === 'right') this.right = on;
  },
  consumeJump() { const q = this._jumpQueued; this._jumpQueued = false; return q; },
  reset() { this.left = this.right = this.jumpHeld = false; this._jumpQueued = false; },
};

const KEYMAP = {
  ArrowLeft: 'left', KeyA: 'left',
  ArrowRight: 'right', KeyD: 'right',
  ArrowUp: 'jump', KeyW: 'jump', Space: 'jump',
};

function initInput() {
  addEventListener('keydown', (e) => {
    if (e.repeat) return;
    onFirstGesture();
    if (e.code === 'KeyP') { togglePause(); return; }
    if (e.code === 'KeyM') { Audio.toggleMute(); return; }
    if (e.code === 'Enter' && Game.scene === 'TITLE') { startGame(); return; }
    if (Game.scene === 'INTRO' || Game.scene === 'CLEAR' || Game.scene === 'GAMEOVER' || Game.scene === 'VICTORY') {
      if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowUp') { e.preventDefault(); tapAdvance(); return; }
    }
    const a = KEYMAP[e.code];
    if (a) { e.preventDefault(); Input.press(a, true); }
  });
  addEventListener('keyup', (e) => {
    const a = KEYMAP[e.code];
    if (a) { e.preventDefault(); Input.press(a, false); }
  });

  const bind = (id, action) => {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); onFirstGesture(); el.classList.add('pressed'); Input.press(action, true); };
    const up   = (e) => { e.preventDefault(); el.classList.remove('pressed'); Input.press(action, false); };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('pointerleave', up);
    el.addEventListener('contextmenu', (e) => e.preventDefault());
  };
  bind('btn-left', 'left'); bind('btn-right', 'right'); bind('btn-jump', 'jump');

  // Title / pause / HUD buttons
  const on = (id, fn) => document.getElementById(id).addEventListener('click', (e) => { e.preventDefault(); onFirstGesture(); fn(); });
  on('play-btn', () => startGame());
  on('resume-btn', () => togglePause(false));
  on('quit-btn', () => quitToTitle());
  on('pause-btn', () => { if (Game.scene === 'PLAY') togglePause(); });
  on('mute-btn', () => Audio.toggleMute());

  // Tap on the canvas advances transient screens (INTRO/CLEAR/GAMEOVER/VICTORY).
  canvas.addEventListener('pointerdown', (e) => {
    onFirstGesture();
    if (Game.scene === 'INTRO' || Game.scene === 'CLEAR' || Game.scene === 'GAMEOVER' || Game.scene === 'VICTORY') { e.preventDefault(); tapAdvance(); }
  });

  buildSwatches();
  updateHudButtons();
}

let _gestured = false;
function onFirstGesture() {
  firstGesture();                         // unlock audio
  if (!_gestured) { _gestured = true; if (Game.scene === 'TITLE') Audio.playMusic('title'); }
}

function buildSwatches() {
  for (const containerId of ['swatches', 'swatches-pause']) {
    const box = document.getElementById(containerId); if (!box) continue;
    box.innerHTML = '';
    PALETTE.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'swatch' + (p.rainbow ? ' rainbow' : '') + (i === Game.hero.colorIdx ? ' sel' : '');
      if (!p.rainbow) b.style.background = p.css;
      const locked = p.rainbow && !Game.rainbowUnlocked;
      if (locked) b.classList.add('locked');
      b.setAttribute('aria-label', p.name);
      b.addEventListener('click', (e) => {
        e.preventDefault(); onFirstGesture();
        if (p.rainbow && !Game.rainbowUnlocked) return;   // locked until level 4
        Game.hero.colorIdx = i; Save.save(); buildSwatches();
      });
      box.appendChild(b);
    });
  }
}

function updateHudButtons() {
  const m = document.getElementById('mute-btn');
  if (m) { m.textContent = Audio.muted ? '♪' : '♪'; m.classList.toggle('off', Audio.muted); }
}

// ══════════════════════════════════════════════════════════════════
//  AUDIO — persistent WebAudio context (ported+extended from the
//  Tic-Tac-Toe engine). Music layer arrives in P6; here: unlock + SFX.
// ══════════════════════════════════════════════════════════════════
const Audio = {
  ctx: null, master: null, sfxGain: null, musicGain: null, muted: false, unlocked: false,
  music: { key: null, playing: false, timer: null },
  ensure() {
    if (!this.ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      this.ctx = new AC();
      this.master = this.ctx.createGain();
      this.sfxGain = this.ctx.createGain(); this.sfxGain.gain.value = 1;
      this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = 0.7;
      this.sfxGain.connect(this.master); this.musicGain.connect(this.master);
      this.master.connect(this.ctx.destination);
      this.applyGain();
    }
    if (this.ctx.state === 'suspended') this.ctx.resume();
    this.unlocked = this.ctx.state === 'running';
  },
  applyGain() { if (this.master) this.master.gain.value = (this.muted || Game.paused) ? 0 : 0.55; },
  // ── music layer (looping tracks + one-shot jingles) ──
  playMusic(key) {
    this.ensure(); if (!this.ctx) return;
    if (this.music.key === key && this.music.playing) return;
    this.stopMusic();
    const track = MUSIC[key]; if (!track) return;
    this.music.key = key; this.music.playing = true;
    this._loop(track, this.ctx.currentTime + 0.06);
  },
  _loop(track, t0) {
    const beat = 60 / track.bpm; let t = t0;
    for (const [note, beats] of track.notes) {
      const dur = beats * beat;
      if (note !== 'R') this._note(this.noteToFreq(note), dur, track.wave, track.gain, t, this.musicGain);
      t += dur;
    }
    const ms = (t - this.ctx.currentTime) * 1000;
    this.music.timer = setTimeout(() => {
      if (!this.music.playing) return;
      if (track.loop) this._loop(track, t); else this.music.playing = false;
    }, Math.max(20, ms - 100));
  },
  stopMusic() { this.music.playing = false; if (this.music.timer) { clearTimeout(this.music.timer); this.music.timer = null; } this.music.key = null; },
  _note(freq, dur, wave, gain, when, dest) {
    if (!this.ctx || !freq) return;
    const t = when != null ? when : this.ctx.currentTime;
    const osc = this.ctx.createOscillator(), g = this.ctx.createGain();
    osc.type = wave || 'square'; osc.frequency.value = freq;
    osc.connect(g); g.connect(dest || this.sfxGain);
    g.gain.setValueAtTime(gain != null ? gain : 0.5, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
    osc.start(t); osc.stop(t + dur + 0.03);
  },
  noteToFreq(name) {
    const S = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
    const m = String(name).match(/^([A-G])(#|b)?(\d)$/); if (!m) return 0;
    const semi = S[m[1]] + (m[2] === '#' ? 1 : m[2] === 'b' ? -1 : 0);
    return 440 * 2 ** ((+m[3] * 12 + semi - 57) / 12);
  },
  blip(freq, dur, wave, gain, when) { this._note(freq, dur, wave, gain, when, this.sfxGain); },
  sfx(name) {
    this.ensure(); if (!this.ctx) return;
    const n = this.noteToFreq.bind(this), t0 = this.ctx.currentTime;
    switch (name) {
      case 'start': this.blip(n('C5'), .09, 'square', .4, t0); this.blip(n('G5'), .12, 'square', .4, t0 + .1); break;
      case 'jump':  this.blip(n('E5'), .08, 'square', .32, t0); this.blip(n('B5'), .06, 'square', .28, t0 + .05); break;
      case 'hurt':  this.blip(n('A3'), .16, 'sawtooth', .4, t0); this.blip(n('E3'), .18, 'sawtooth', .35, t0 + .04); break;
      case 'die':   this.blip(n('G4'), .12, 'square', .4, t0); this.blip(n('D4'), .12, 'square', .4, t0 + .1); this.blip(n('G3'), .3, 'square', .4, t0 + .2); break;
      case 'land':  this.blip(n('C4'), .04, 'square', .18, t0); break;
      case 'stomp': this.blip(n('C6'), .05, 'square', .38, t0); this.blip(n('G5'), .07, 'square', .32, t0 + .04); this.blip(n('C5'), .09, 'square', .28, t0 + .09); break;
      case 'spawn': this.blip(n('E4'), .05, 'triangle', .18, t0); break;
      case 'bossSpawn': this.blip(n('C3'), .18, 'sawtooth', .45, t0); this.blip(n('G3'), .18, 'sawtooth', .4, t0 + .12); this.blip(n('C4'), .24, 'square', .4, t0 + .24); break;
      case 'bossHit':   this.blip(n('E5'), .06, 'square', .42, t0); this.blip(n('A4'), .12, 'sawtooth', .35, t0 + .05); break;
      case 'bossDie':   this.blip(n('C4'), .1, 'square', .45, t0); this.blip(n('E4'), .1, 'square', .45, t0 + .1); this.blip(n('G4'), .1, 'square', .45, t0 + .2); this.blip(n('C5'), .4, 'square', .45, t0 + .3); break;
      default:      this.blip(n('A4'), .06, 'square', .3, t0);
    }
  },
  toggleMute() { this.muted = !this.muted; this.applyGain(); Save.save(); updateHudButtons(); },
};

// ══════════════════════════════════════════════════════════════════
//  FLOW — scene transitions
// ══════════════════════════════════════════════════════════════════
// Scenes: TITLE → INTRO → PLAY → (boss) → CLEAR → INTRO/… → VICTORY;  PLAY→GAMEOVER on 0 lives.
function firstGesture() { Audio.ensure(); }   // unlock audio on the very first gesture

function startGame() {                         // TITLE → level 1
  Game.level = 1; Game.lives = CONFIG.LIVES_START; Game.kills = 0;
  reseed(pickSeed());
  hideOverlay('start');
  Audio.sfx('start');
  gotoIntro();
}
function gotoIntro() {
  Game.scene = 'INTRO'; Game.sceneT = 0; Game.paused = false;
  buildLevel(); Game.hero.face = 1;
  if (Game.level >= 4 && !Game.rainbowUnlocked) { Game.rainbowUnlocked = true; Save.save(); buildSwatches(); }
  Game.best = Math.max(Game.best, Game.level); Save.save();
  Audio.playMusic(Game.level);
}
function gotoPlay() { Game.scene = 'PLAY'; Game.t = 0; }

// Fast entry straight into PLAY — used by the deterministic test harness.
function startPlay() {
  Game.level = 1; Game.lives = CONFIG.LIVES_START; Game.kills = 0;
  reseed(pickSeed());
  Game.scene = 'PLAY'; Game.t = 0; Game.sceneT = 0; Game.paused = false; Game.hero.face = 1;
  hideOverlay('start');
}

function onBossDefeated() {
  Game.bossActive = false;
  Game.gainedLife = !Game.hitThisLevel;
  if (Game.gainedLife) Game.lives++;            // no-hit-level bonus (may exceed 3)
  Game.scene = 'CLEAR'; Game.sceneT = 0;
  Audio.sfx('bossDie'); Audio.playMusic('clear');
}
function afterClear() {
  if (Game.level >= 4) { Game.scene = 'VICTORY'; Game.sceneT = 0; Audio.playMusic('victory'); return; }
  Game.level++;
  gotoIntro();
}
function onGameOver() { Game.scene = 'GAMEOVER'; Game.sceneT = 0; Audio.stopMusic(); Audio.playMusic('gameover'); }
function gotoTitle() {
  Game.scene = 'TITLE'; Game.paused = false; Audio.stopMusic(); Audio.playMusic('title');
  showOverlay('start'); hideOverlay('pause');
}

// Tap / key on a transient screen advances it.
function tapAdvance() {
  if (Game.scene === 'INTRO') gotoPlay();
  else if (Game.scene === 'CLEAR') afterClear();
  else if ((Game.scene === 'GAMEOVER' || Game.scene === 'VICTORY') && Game.sceneT > 0.5) gotoTitle();
}
function togglePause(force) {
  if (Game.scene !== 'PLAY') return;
  Game.paused = (force != null) ? !!force : !Game.paused;
  Audio.applyGain();
  if (Game.paused) { showOverlay('pause'); buildSwatches(); } else hideOverlay('pause');
}
function quitToTitle() { hideOverlay('pause'); gotoTitle(); }

function showOverlay(id) { document.getElementById(id).classList.remove('hidden'); }
function hideOverlay(id) { document.getElementById(id).classList.add('hidden'); }

// ══════════════════════════════════════════════════════════════════
//  UPDATE — fixed-timestep simulation (dt is constant = CONFIG.DT)
//  Placeholder hero kinematics; replaced by real physics in P3.
// ══════════════════════════════════════════════════════════════════
function approach(cur, target, maxDelta) {
  if (cur < target) return Math.min(cur + maxDelta, target);
  if (cur > target) return Math.max(cur - maxDelta, target);
  return cur;
}

// ── Juice: particles + screen shake (cosmetic; uses Math.random, not the seed) ──
function shake(mag) { Game.shakeMag = Math.max(Game.shakeMag, mag); Game.shakeT = 0.25; }
function spawnBurst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2, s = 30 + Math.random() * 120;
    Game.particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 40, life: 0.4 + Math.random() * 0.4, t: 0, color, r: 1 + (Math.random() * 2 | 0) });
  }
  if (Game.particles.length > 240) Game.particles.splice(0, Game.particles.length - 240);
}
function updateParticles(dt) {
  if (Game.shakeT > 0) { Game.shakeT -= dt; if (Game.shakeT <= 0) Game.shakeMag = 0; }
  const ps = Game.particles;
  for (const p of ps) { p.t += dt; p.vy += 380 * dt; p.x += p.vx * dt; p.y += p.vy * dt; }
  if (ps.length) Game.particles = ps.filter((p) => p.t < p.life);
}

// Solid ground top at column index, or null (hole / off-platform).
function colTop(ter, ci) {
  if (ci < 0 || ci >= ter.nCols) return null;
  return ter.cols[ci];
}

// AABB vs terrain columns, axis-separated. Hero.y is the feet (bottom) y.
function collideHero(h, dt) {
  const ter = Game.terrain, T = ter.colW, C = CONFIG;
  // ── horizontal ──
  h.x += h.vx * dt;
  {
    const l = h.x - h.w / 2, r = h.x + h.w / 2, top = h.y - h.h, bot = h.y;
    const ci0 = Math.floor((l - ter.x0) / T), ci1 = Math.floor((r - ter.x0) / T);
    for (let ci = ci0; ci <= ci1; ci++) {
      const ct = colTop(ter, ci); if (ct == null) continue;      // hole / off-platform: no wall (can fall in)
      // A column is a wall only if the hero's feet are below its top (walking into a step/hill side).
      if (bot > ct + 0.5 && top < C.H) {
        const cx0 = ter.x0 + ci * T, cx1 = cx0 + T;
        if (h.vx > 0 && r > cx0 && l < cx0) { h.x = cx0 - h.w / 2; h.vx = 0; }
        else if (h.vx < 0 && l < cx1 && r > cx1) { h.x = cx1 + h.w / 2; h.vx = 0; }
      }
    }
  }
  // ── vertical ──
  h.y += h.vy * dt;
  h.onGround = false;
  if (h.vy >= 0) {
    const l = h.x - h.w / 2, r = h.x + h.w / 2 - 0.001;
    const ci0 = Math.floor((l - ter.x0) / T), ci1 = Math.floor((r - ter.x0) / T);
    let gy = null;
    for (let ci = ci0; ci <= ci1; ci++) { const ct = colTop(ter, ci); if (ct != null && (gy == null || ct < gy)) gy = ct; }
    if (gy != null && h.y >= gy) { h.y = gy; h.vy = 0; h.onGround = true; }
  }
}

function heroDie() {
  const h = Game.hero; if (h.dead) return;
  h.dead = true;
  Game.hitThisLevel = true;
  Game.lives--;
  Audio.sfx('die'); spawnBurst(h.x, CONFIG.LAVA_Y, '#f4a300', 24); shake(8);
  if (Game.lives <= 0) { Game.lives = 0; onGameOver(); return; }   // GAME_OVER handled in P6
  respawnHero();
}

// Enemy/boss contact hurts the hero (called from P4/P5). Returns true if it landed.
function heroHurt(fromRight) {
  const h = Game.hero, C = CONFIG;
  if (h.ghost > 0 || h.hurt > 0 || h.dead) return false;          // ghostly / i-frames → immune
  h.hurt = C.HURT_IFRAMES; h.knock = C.KNOCK_LOCK;
  h.vx = (fromRight ? -1 : 1) * C.KNOCKBACK;                       // knocked away (toward left lava if hit from the right)
  h.vy = -140; h.onGround = false;
  Game.hitThisLevel = true;
  Audio.sfx('hurt');
  return true;
}

// ── Enemies + spawner ─────────────────────────────────────────────
function spawnEnemy(type) {
  const C = CONFIG, L = LEVELS[Game.level] || LEVELS[1];
  type = type || L.types[Math.floor(Game.rand() * L.types.length)];
  const speed = L.speed * (ENEMY.speedMul[type] || 1);
  Game.enemies.push({
    x: C.SPAWN_X, y: C.SPAWN_Y + 12, vx: -speed, vy: 0, r: ENEMY.r, type,
    onGround: false, alive: true, trail: [], trailT: 0,
    jumpT: 0.5 + Game.rand() * 0.7, spikes: Game.rand() < 0.5 ? 3 : 5, gaze: -1,
  });
  Audio.sfx('spawn');
}

function updateEnemies(dt) {
  const C = CONFIG, ter = Game.terrain, L = LEVELS[Game.level] || LEVELS[1], h = Game.hero;

  // spawn cadence (paused during boss)
  if (!Game.bossActive) {
    Game.spawnT -= dt;
    if (Game.spawnT <= 0 && Game.enemies.length < L.maxAlive) { spawnEnemy(); Game.spawnT = L.spawnEvery; }
  }

  for (const e of Game.enemies) {
    if (!e.alive) continue;
    // motion-trace samples
    e.trailT -= dt;
    if (e.trailT <= 0) { e.trail.push({ x: e.x, y: e.y }); if (e.trail.length > 6) e.trail.shift(); e.trailT = 0.05; }

    // physics: constant leftward vx, gravity, surface follow
    e.vy += ENEMY.gravity * dt;
    e.x += e.vx * dt;
    e.y += e.vy * dt;
    const surf = surfaceAt(ter, e.x);
    if (surf != null && e.y >= surf) {
      e.y = surf; e.vy = 0; e.onGround = true;
      if (e.type === 'yellow') { e.jumpT -= dt; if (e.jumpT <= 0) { e.vy = -ENEMY.jumpImpulse; e.onGround = false; e.jumpT = 0.9 + Game.rand() * 0.6; } }
    } else e.onGround = false;

    e.gaze = h.x < e.x ? -1 : 1;                     // eye tracks the hero

    // despawn: dropped off the left edge or fell into a hole → into the lava
    if (e.y >= C.LAVA_Y || e.x < C.PLAT_X0 - e.r - 2) e.alive = false;

    // hero interaction (skipped entirely while the hero is ghostly)
    if (e.alive && h.ghost <= 0 && !h.dead) {
      const el = e.x - e.r, er = e.x + e.r, etop = e.y - 2 * e.r, ebot = e.y;
      const hl = h.x - h.w / 2, hr = h.x + h.w / 2, htop = h.y - h.h, hbot = h.y;
      if (hr > el && hl < er && hbot > etop && htop < ebot) {
        const stomp = h.vy > 0 && h.y < e.y - e.r;   // falling onto its top half
        if (stomp) { e.alive = false; h.vy = -ENEMY.bounce; h.onGround = false; Game.kills++; Audio.sfx('stomp'); spawnBurst(e.x, e.y - e.r, ENEMY_COL[e.type] || '#fff', 12); shake(3); }
        else heroHurt(e.x > h.x);                     // hit → knock away from the enemy
      }
    }
  }
  if (Game.enemies.length) Game.enemies = Game.enemies.filter((e) => e.alive);
}

// ── Boss ──────────────────────────────────────────────────────────
function activateBoss() {
  if (Game.bossActive) return;
  Game.bossActive = true;
  Game.enemies = [];                       // clear the field for the duel
  const C = CONFIG, type = (LEVELS[Game.level] || LEVELS[1]).boss;
  Game.boss = {
    x: C.SPAWN_X, y: C.SPAWN_Y + 16, vx: 0, vy: 0, r: BOSS.r, type,
    hits: 0, maxHits: BOSS.hits, state: 'enter', stateT: 0, onGround: false,
    iframe: 0, alive: true, startX: C.PLAT_X1 - 34, gaze: -1, jumpT: 0.5,
    feint: false, spikes: type === 'rainbow' ? 7 : 5,
  };
  Audio.sfx('bossSpawn'); Audio.playMusic('boss'); shake(6);
}

function bossHit(b) {
  if (!b.alive || b.iframe > 0) return;
  b.hits++; b.iframe = BOSS.iframe; b.vy = -130; b.state = 'return';
  Audio.sfx('bossHit'); spawnBurst(b.x, b.y - b.r, ENEMY_COL[b.type] || '#fff', 14); shake(4);
  if (b.hits >= b.maxHits) { b.alive = false; Game.boss = null; spawnBurst(b.x, b.y - b.r, '#fff', 30); shake(9); onBossDefeated(); }
}

function updateBoss(dt) {
  const b = Game.boss; if (!b || !b.alive) return;
  const C = CONFIG, ter = Game.terrain, h = Game.hero;
  if (b.iframe > 0) b.iframe = Math.max(0, b.iframe - dt);
  b.gaze = h.x < b.x ? -1 : 1;
  const phase2 = b.hits >= 2;
  const spd = (BOSS.charge[b.type] || 60) * (phase2 ? 1.28 : 1);

  // gravity + surface follow
  b.vy += ENEMY.gravity * dt; b.y += b.vy * dt;
  const surf = surfaceAt(ter, b.x);
  if (surf != null && b.y >= surf) { b.y = surf; b.vy = 0; b.onGround = true; } else b.onGround = false;

  const ease = (to, rate) => { const d = to - b.x; b.x += Math.sign(d) * Math.min(Math.abs(d), rate * dt); return Math.abs(d) < 1; };

  switch (b.state) {
    case 'enter':
      if (b.onGround) { b.state = 'idle'; b.stateT = (BOSS.idleWait[b.type] || 1); }
      break;
    case 'idle':
      if (ease(b.startX, BOSS.returnSpeed)) {
        b.stateT -= dt;
        if (b.stateT <= 0) {
          if (b.type === 'rainbow') { b.state = 'telegraph'; b.stateT = 0.6; b.feint = Game.rand() < 0.5; }
          else { b.state = 'charge'; b.jumpT = 0.4; }
        }
      }
      break;
    case 'telegraph':                         // L4 rainbow wind-up (may be a feint)
      b.stateT -= dt;
      if (b.stateT <= 0) { if (b.feint) { b.state = 'feint'; b.stateT = 0.22; } else { b.state = 'charge'; b.jumpT = 0.4; } }
      break;
    case 'feint':                             // quick fake lunge, then retreat
      b.x -= spd * 0.4 * dt; b.stateT -= dt;
      if (b.stateT <= 0) b.state = 'return';
      break;
    case 'charge':
      b.x -= spd * dt;
      if (b.type === 'yellow' || (b.type === 'rainbow' && phase2)) {   // L3 (and rainbow p2) jump while charging
        if (b.onGround) { b.jumpT -= dt; if (b.jumpT <= 0) { b.vy = -BOSS.jumpImpulse; b.onGround = false; b.jumpT = 0.6; } }
      }
      if (b.x <= C.PLAT_X0 + b.r) b.state = 'return';
      break;
    case 'return':
      if (ease(b.startX, BOSS.returnSpeed)) { b.state = 'idle'; b.stateT = (BOSS.idleWait[b.type] || 1); }
      break;
  }

  // hero interaction (skipped while ghostly or during boss hit-stun)
  if (h.ghost <= 0 && !h.dead && b.iframe <= 0) {
    const bl = b.x - b.r, br = b.x + b.r, btop = b.y - 2 * b.r, bbot = b.y;
    const hl = h.x - h.w / 2, hr = h.x + h.w / 2, htop = h.y - h.h, hbot = h.y;
    if (hr > bl && hl < br && hbot > btop && htop < bbot) {
      const stomp = h.vy > 0 && h.y < b.y - b.r;
      if (stomp) { bossHit(b); Game.hero.vy = -ENEMY.bounce; Game.hero.onGround = false; }
      else heroHurt(b.x > h.x);
    }
  }
}

function update(dt) {
  Game.sceneT += dt;
  if (Game.scene === 'PLAY' && !Game.paused) Game.t += dt;
  updateParticles(dt);

  // transient screens auto-advance (tap advances sooner via tapAdvance)
  if (Game.scene === 'INTRO' && Game.sceneT >= 1.6) { gotoPlay(); return; }
  if (Game.scene === 'CLEAR' && Game.sceneT >= 2.4) { afterClear(); return; }
  if (Game.scene !== 'PLAY' || Game.paused) return;

  const h = Game.hero, C = CONFIG;

  // timers
  if (h.hurt > 0) h.hurt = Math.max(0, h.hurt - dt);
  if (h.ghost > 0) h.ghost = Math.max(0, h.ghost - dt);
  if (h.knock > 0) h.knock = Math.max(0, h.knock - dt);
  h.coyote = h.onGround ? C.COYOTE : Math.max(0, h.coyote - dt);
  h.jumpBuf = Input.consumeJump() ? C.JUMP_BUFFER : Math.max(0, h.jumpBuf - dt);

  // horizontal control (suppressed briefly during knockback)
  if (h.knock <= 0) {
    const dir = (Input.right ? 1 : 0) - (Input.left ? 1 : 0);
    const target = dir * C.RUN_SPEED;
    const rate = (h.onGround ? (dir ? C.GROUND_ACCEL : C.GROUND_FRICTION) : C.AIR_ACCEL) * dt;
    h.vx = approach(h.vx, target, rate);
    if (dir !== 0) h.face = dir;
  }

  // jump (with coyote time + input buffer)
  if (h.jumpBuf > 0 && (h.onGround || h.coyote > 0)) {
    h.vy = -C.JUMP_V; h.onGround = false; h.coyote = 0; h.jumpBuf = 0; h.jumping = true;
    Audio.sfx('jump');
  }

  // variable-height jump via 3-phase gravity
  if (!Input.jumpHeld) h.jumping = false;
  let g;
  if (h.vy < 0) g = (Input.jumpHeld && h.jumping) ? C.G_HELD : C.G_CUT;
  else { g = C.G_FALL; h.jumping = false; }
  h.vy = Math.min(h.vy + g * dt, C.MAX_FALL);

  collideHero(h, dt);

  // lava death — fell into a hole or off an edge and reached the lava surface
  if (h.y >= C.LAVA_Y) heroDie();

  updateEnemies(dt);

  // boss emerges once the 60s survival timer elapses
  if (!Game.bossActive && !Game.boss && Game.t >= C.LEVEL_TIME) activateBoss();
  updateBoss(dt);
}

// ══════════════════════════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════════════════════════
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Per-level terrain decoration palette.
const DECO = {
  1: { body: '#2b2f38', edge: '#5b6472', hi: '#7a8494', brick: '#242830' },
  2: { body: '#3a3324', edge: '#6b5b3a', hi: '#8a7a4a', brick: '#2e2820' },
  3: { body: '#243a4a', edge: '#3a7ba0', hi: '#5aa6d0', brick: '#1e3240' },
  4: { body: '#33243a', edge: '#7a3a6b', hi: '#a04a8a', brick: '#2a1e30' },
};

function drawLava() {
  const C = CONFIG, t = Game.t, y0 = C.LAVA_Y;
  ctx.fillStyle = '#7a0d13';
  ctx.fillRect(0, y0, C.W, C.H - y0);
  // wobbling molten surface band
  for (let x = 0; x < C.W; x += 4) {
    const wob = Math.sin(x * 0.05 + t * 2.6) * 2 + Math.sin(x * 0.11 - t * 3.7) * 1.4;
    ctx.fillStyle = (((x >> 2) + (t * 5 | 0)) & 1) ? '#ff7a00' : '#f4a300';
    ctx.fillRect(x, y0 + wob - 1, 4, 5);
  }
  ctx.fillStyle = '#ffd25a';
  for (let x = 0; x < C.W; x += 4) {
    const wob = Math.sin(x * 0.05 + t * 2.6) * 2;
    if (((x * 7 + (t * 8 | 0)) % 23) === 0) ctx.fillRect(x, y0 + wob - 2, 3, 2);
  }
  // rising bubbles
  ctx.fillStyle = '#ffb01e';
  for (let i = 0; i < 16; i++) {
    const bx = (i * 89 + 13) % C.W;
    const phase = (t * 0.6 + i * 0.41) % 1;
    const by = y0 + 20 - phase * 18;
    if (phase > 0.12 && phase < 0.95) { const r = 1 + (i % 3 === 0 ? 1 : 0); ctx.fillRect(bx, by, r + 1, r + 1); }
  }
}

function drawTerrain() {
  const C = CONFIG, ter = Game.terrain;
  if (!ter) return;
  const segs = ter.segments, d = DECO[ter.level] || DECO[1];
  // Hole chutes (dark shafts with a lava glow at the bottom).
  for (let i = 0; i < segs.length - 1; i++) {
    const hx0 = segs[i].x1, hx1 = segs[i + 1].x0;
    if (hx1 <= hx0) continue;
    ctx.fillStyle = '#180a10';
    ctx.fillRect(hx0, C.PLAT_Y - 2, hx1 - hx0, C.LAVA_Y - (C.PLAT_Y - 2));
    const glow = 0.5 + 0.5 * Math.sin(Game.t * 4 + hx0);
    ctx.fillStyle = `rgba(244,120,0,${0.25 + 0.35 * glow})`;
    ctx.fillRect(hx0, C.LAVA_Y - 14, hx1 - hx0, 14);
  }
  // Solid columns per segment.
  for (const s of segs) {
    const w = s.x1 - s.x0;
    ctx.fillStyle = d.body; ctx.fillRect(s.x0, s.top, w, C.H - s.top);
    // brick texture
    ctx.fillStyle = d.brick;
    for (let by = s.top + 6; by < C.H; by += 10) ctx.fillRect(s.x0, by, w, 1);
    for (let bx = s.x0 + 8; bx < s.x1; bx += 16) ctx.fillRect(bx, s.top, 1, C.H - s.top);
    // lit top edge + step face on the left flank of raised segments
    ctx.fillStyle = d.edge; ctx.fillRect(s.x0, s.top, w, 4);
    ctx.fillStyle = d.hi;   ctx.fillRect(s.x0, s.top, w, 1);
  }
}

function heroColor(h) {
  const p = PALETTE[h.colorIdx];
  if (p && p.rainbow) return `hsl(${(Game.t * 90) % 360} 90% 62%)`;
  return (p && p.css) || '#39a0ed';
}

function drawHero() {
  const h = Game.hero, C = CONFIG;
  const x = Math.round(h.x - h.w / 2), y = Math.round(h.y - h.h);
  let alpha = 1;
  if (h.ghost > 0) alpha = 0.35 + 0.3 * (0.5 + 0.5 * Math.sin(Game.t * 34));   // ghostly respawn
  else if (h.hurt > 0 && ((Game.t * 20) | 0) & 1) alpha = 0.35;                // i-frame flicker
  ctx.globalAlpha = alpha;

  // legs (little walk cycle on the ground)
  ctx.fillStyle = '#0a0a0a';
  const moving = h.onGround && Math.abs(h.vx) > 6;
  const step = moving ? (Math.sin(Game.t * 20) > 0 ? 1 : 0) : 0;
  ctx.fillRect(x + 1, h.y - 3, 3, 3 + step);
  ctx.fillRect(x + h.w - 4, h.y - 3, 3, 4 - step);

  // body frame
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(x, y, h.w, h.h - 2);
  // interior colour — the "T" from the concept art
  const col = heroColor(h);
  ctx.fillStyle = col;
  ctx.fillRect(x + 2, y + 2, h.w - 4, 3);                       // top bar
  ctx.fillRect(x + (h.w >> 1) - 1 + (h.face > 0 ? 0 : 0), y + 2, 3, h.h - 8); // stem
  ctx.fillStyle = 'rgba(255,255,255,0.22)'; ctx.fillRect(x + 2, y + 2, h.w - 4, 1);
  // eye dot, faces travel direction
  ctx.fillStyle = '#fff';
  ctx.fillRect(x + (h.face > 0 ? h.w - 4 : 2), y + 6, 2, 2);
  ctx.globalAlpha = 1;
}

const ENEMY_COL = { clear: '#dfe6e9', red: '#e0392f', yellow: '#f4d03f', rainbow: '#fff' };

function drawDonut(cx, cy, r, type, spikes, gaze, alpha, phase) {
  const col = ENEMY_COL[type] || '#fff';
  ctx.globalAlpha = alpha;
  // spikes (triangles pointing outward)
  ctx.fillStyle = type === 'clear' ? 'rgba(220,228,230,0.9)' : col;
  for (let i = 0; i < spikes; i++) {
    const a = phase + (i / spikes) * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const tx = cx + Math.cos(a) * (r + 4), ty = cy + Math.sin(a) * (r + 4);
    const px = -Math.sin(a) * 2.4, py = Math.cos(a) * 2.4;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx + px, sy + py); ctx.lineTo(sx - px, sy - py); ctx.closePath(); ctx.fill();
  }
  // donut ring
  if (type === 'clear') { ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
  else { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); }
  // eye socket + tracking pupil
  ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#111'; ctx.beginPath(); ctx.arc(cx + gaze * r * 0.22, cy, r * 0.3, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawEnemies() {
  const phase = Game.t * 6;
  for (const e of Game.enemies) {
    // fading motion trail
    for (let i = 0; i < e.trail.length; i++) {
      const tp = e.trail[i], a = 0.06 + 0.12 * (i / e.trail.length);
      drawDonut(tp.x, tp.y - e.r, e.r * 0.85, e.type, e.spikes, e.gaze, a, phase);
    }
    drawDonut(e.x, e.y - e.r, e.r, e.type, e.spikes, e.gaze, 1, phase);
  }
}

function drawBoss() {
  const b = Game.boss; if (!b) return;
  const cx = b.x, cy = b.y - b.r, r = b.r;
  const phase2 = b.hits >= 2;
  let col = ENEMY_COL[b.type] || '#fff';
  if (b.type === 'rainbow') col = `hsl(${(Game.t * 120) % 360} 90% 60%)`;
  // hit flash
  const flash = b.iframe > 0 && ((Game.t * 24) | 0) & 1;

  // telegraph/feint wind-up cue (lean + glow)
  if (b.state === 'telegraph' || b.state === 'feint') {
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.beginPath(); ctx.arc(cx, cy, r + 5 + Math.sin(Game.t * 20) * 2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.save();
  if (flash) ctx.globalAlpha = 0.5;
  // spikes
  const phase = Game.t * (phase2 ? 5 : 3);
  ctx.fillStyle = b.type === 'clear' ? 'rgba(223,230,233,0.9)' : col;
  for (let i = 0; i < b.spikes; i++) {
    const a = phase + (i / b.spikes) * Math.PI * 2;
    const sx = cx + Math.cos(a) * r, sy = cy + Math.sin(a) * r;
    const tx = cx + Math.cos(a) * (r + (phase2 ? 8 : 6)), ty = cy + Math.sin(a) * (r + (phase2 ? 8 : 6));
    const px = -Math.sin(a) * 3.5, py = Math.cos(a) * 3.5;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(sx + px, sy + py); ctx.lineTo(sx - px, sy - py); ctx.closePath(); ctx.fill();
  }
  // body
  if (b.type === 'clear') { ctx.strokeStyle = col; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke(); }
  else { ctx.fillStyle = col; ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill(); }
  // cracks when enraged
  if (phase2) {
    ctx.strokeStyle = 'rgba(0,0,0,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx - r * 0.5, cy - r * 0.3); ctx.lineTo(cx - r * 0.1, cy + r * 0.2); ctx.lineTo(cx - r * 0.3, cy + r * 0.6); ctx.stroke();
  }
  // eye (angrier + bloodshot in phase 2), tracking pupil
  ctx.fillStyle = phase2 ? '#ffdede' : '#fff'; ctx.beginPath(); ctx.arc(cx, cy, r * 0.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = phase2 ? '#c1121f' : '#111'; ctx.beginPath(); ctx.arc(cx + b.gaze * r * 0.2, cy, r * 0.28, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  // HP pips above the boss
  for (let i = 0; i < b.maxHits; i++) {
    ctx.fillStyle = i < b.maxHits - b.hits ? '#f4d03f' : 'rgba(255,255,255,0.2)';
    ctx.fillRect(cx - 10 + i * 8, cy - r - 9, 6, 4);
  }
}

function drawParticles() {
  for (const p of Game.particles) {
    ctx.globalAlpha = Math.max(0, 1 - p.t / p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.r, p.r);
  }
  ctx.globalAlpha = 1;
}

function drawHeart(x, y, filled) {
  ctx.fillStyle = filled ? '#e0392f' : 'rgba(255,255,255,0.18)';
  ctx.fillRect(x + 1, y, 2, 1); ctx.fillRect(x + 5, y, 2, 1);
  ctx.fillRect(x, y + 1, 8, 3);
  ctx.fillRect(x + 1, y + 4, 6, 1); ctx.fillRect(x + 2, y + 5, 4, 1); ctx.fillRect(x + 3, y + 6, 2, 1);
}

function drawHUD() {
  const C = CONFIG;
  ctx.textBaseline = 'top'; ctx.font = '8px monospace';
  // lives (hearts; overflow shown as ×N)
  const shown = Math.min(Game.lives, 6);
  for (let i = 0; i < shown; i++) drawHeart(6 + i * 11, 7, true);
  ctx.fillStyle = '#eee8d5';
  if (Game.lives > 6) ctx.fillText('x' + Game.lives, 6 + 6 * 11 + 2, 7);
  // level name + score (top-left, second row; kept clear of the top-right buttons)
  ctx.fillStyle = '#93a1a1'; ctx.fillText('LV' + Game.level + ' ' + (LEVEL_NAMES[Game.level] || ''), 6, 18);
  ctx.fillStyle = '#8a9ba0'; ctx.fillText('KILLS ' + Game.kills, 6, 28);
  // timer / boss flag (centre)
  if (Game.scene === 'PLAY') {
    if (Game.bossActive) { ctx.textAlign = 'center'; ctx.fillStyle = '#e0392f'; ctx.font = '10px monospace'; ctx.fillText('◆ BOSS ◆', C.W / 2, 7); ctx.textAlign = 'left'; }
    else {
      const remain = Math.max(0, Math.ceil(C.LEVEL_TIME - Game.t));
      ctx.textAlign = 'center'; ctx.fillStyle = remain <= 10 ? '#f4d03f' : '#eee8d5'; ctx.font = '11px monospace';
      ctx.fillText(remain + '', C.W / 2, 7); ctx.textAlign = 'left';
    }
  }
}

function centerText(lines) {
  const C = CONFIG;
  ctx.fillStyle = 'rgba(6,8,18,0.55)'; ctx.fillRect(0, 0, C.W, C.H);
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let y = C.H / 2 - (lines.length - 1) * 12;
  for (const ln of lines) {
    ctx.font = (ln.big ? 'bold 22px' : '10px') + ' monospace';
    ctx.fillStyle = ln.color || '#eee8d5';
    ctx.fillText(ln.t, C.W / 2, y); y += ln.big ? 26 : 15;
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
}

function render() {
  const C = CONFIG;
  ctx.save();
  // screen shake
  if (Game.shakeMag > 0) {
    const m = Game.shakeMag * (Game.shakeT / 0.25);
    ctx.translate((Math.random() * 2 - 1) * m, (Math.random() * 2 - 1) * m);
  }

  // Sky
  const g = ctx.createLinearGradient(0, 0, 0, C.H);
  g.addColorStop(0, '#241a2e'); g.addColorStop(1, '#3a1f2b');
  ctx.fillStyle = g; ctx.fillRect(-8, -8, C.W + 16, C.H + 16);

  drawLava();
  drawTerrain();

  // Spawner cube (floats + wobbles above the platform)
  const bob = Math.sin(Game.t * 2.2) * 3;
  const sx = C.SPAWN_X, sy = C.SPAWN_Y + bob;
  ctx.fillStyle = '#0c0c10'; ctx.fillRect(sx - 13, sy - 13, 26, 26);
  ctx.fillStyle = '#23252e'; ctx.fillRect(sx - 13, sy - 13, 26, 3);
  const mawGlow = 0.5 + 0.5 * Math.sin(Game.t * 5);
  ctx.fillStyle = `rgba(230,57,47,${0.5 + 0.4 * mawGlow})`;
  ctx.fillRect(sx - 6, sy - 2, 12, 9);
  ctx.fillStyle = '#0c0c10'; ctx.fillRect(sx - 2, sy - 13, 5, 8);
  ctx.fillRect(sx - 9, sy + 4, 18, 3);

  const live = Game.scene === 'PLAY' || Game.scene === 'INTRO' || Game.scene === 'CLEAR';
  if (live) { drawEnemies(); drawBoss(); drawHero(); }
  drawParticles();

  if (Game.scene === 'PLAY' || Game.scene === 'INTRO' || Game.scene === 'CLEAR') drawHUD();

  // Scene overlays (canvas-drawn transient screens)
  if (Game.scene === 'INTRO') centerText([{ t: 'LEVEL ' + Game.level, big: true, color: '#f4d03f' }, { t: LEVEL_NAMES[Game.level] || '', color: '#eee8d5' }, { t: 'survive 60 seconds, then the boss', color: '#93a1a1' }]);
  else if (Game.scene === 'CLEAR') centerText([{ t: 'LEVEL CLEAR', big: true, color: '#7cb342' }].concat(Game.gainedLife ? [{ t: '★ no-hit bonus: +1 life! ★', color: '#f4d03f' }] : [{ t: 'kills ' + Game.kills, color: '#93a1a1' }]));
  else if (Game.scene === 'GAMEOVER') centerText([{ t: 'GAME OVER', big: true, color: '#e0392f' }, { t: 'reached level ' + Game.level, color: '#eee8d5' }, { t: 'tap to return to title', color: '#93a1a1' }]);
  else if (Game.scene === 'VICTORY') centerText([{ t: 'VICTORY!', big: true, color: '#f4d03f' }, { t: 'you conquered the tower', color: '#eee8d5' }, { t: 'kills ' + Game.kills + '  ·  lives ' + Game.lives, color: '#93a1a1' }, { t: 'tap to return to title', color: '#93a1a1' }]);

  ctx.restore();
}

// ══════════════════════════════════════════════════════════════════
//  LOOP — fixed timestep with accumulator; render every frame
// ══════════════════════════════════════════════════════════════════
let acc = 0, last = null, _fpsT = 0, _fpsN = 0, testFreeze = false;
function tick(now) {
  if (last === null) last = now;
  let el = (now - last) / 1000; last = now;
  if (el > 0.25) el = 0.25;                 // clamp huge gaps (tab was hidden)
  if (testFreeze) { /* physics driven manually by BS.stepFixed in tests */ }
  else if (Game.scene === 'PLAY' && !Game.paused) {
    acc += el;
    let guard = 0;
    while (acc >= CONFIG.DT && guard++ < 600) { update(CONFIG.DT); acc -= CONFIG.DT; }
  } else {
    update(el);                             // transient scenes (INTRO/CLEAR/…) advance in real time
  }
  _fpsN++; _fpsT += el; if (_fpsT >= 0.5) { Game.fps = Math.round(_fpsN / _fpsT); _fpsN = 0; _fpsT = 0; }
  render();
  requestAnimationFrame(tick);
}

// ══════════════════════════════════════════════════════════════════
//  RESIZE / LIFECYCLE
// ══════════════════════════════════════════════════════════════════
function resize() {
  const vw = innerWidth, vh = innerHeight;
  const scale = Math.min(vw / CONFIG.W, vh / CONFIG.H);
  canvas.style.width = Math.floor(CONFIG.W * scale) + 'px';
  canvas.style.height = Math.floor(CONFIG.H * scale) + 'px';
  const portrait = vh > vw;
  document.getElementById('rotate').classList.toggle('show', portrait);
}
addEventListener('resize', resize);
addEventListener('orientationchange', resize);
document.addEventListener('visibilitychange', () => { if (document.hidden && Game.scene === 'PLAY' && !Game.paused) togglePause(true); });
addEventListener('blur', () => { if (Game.scene === 'PLAY' && !Game.paused) togglePause(true); });

// ══════════════════════════════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════════════════════════════
Save.load();
reseed(pickSeed());
initInput();
resize();
Game.scene = 'TITLE';
requestAnimationFrame(tick);

// ── Test hook: pure logic + deterministic stepping for Playwright ──
window.BS = {
  version: '0.6.0-P6',
  CONFIG, PALETTE, LEVELS, LEVEL_NAMES, MUSIC,
  mulberry32,
  state: () => Game,
  scene: () => Game.scene,
  seed: () => Game.seed,
  reseed,
  genTerrain, surfaceAt, findSafeX,
  terrain: () => Game.terrain,
  setLevel: (n) => { Game.level = n | 0; buildLevel(); },
  hero: () => Game.hero,
  heroHurt, respawnHero,
  enemies: () => Game.enemies,
  spawnEnemy,
  boss: () => Game.boss,
  activateBoss,
  bossHit: () => Game.boss && bossHit(Game.boss),
  Input,
  audioState: () => (Audio.ctx ? Audio.ctx.state : 'none'),
  musicKey: () => Audio.music.key,
  muted: () => Audio.muted,
  Save,
  // Flow controls
  start: startPlay,          // straight into PLAY (deterministic test entry)
  startGame,                 // real title→intro flow
  gotoPlay, tapAdvance, gotoTitle,
  pause: togglePause,
  isPaused: () => Game.paused,
  buildSwatches,
  // Deterministic stepping (bypasses rAF) for physics tests.
  freeze: (on) => { testFreeze = !!on; },
  step: (dt) => update(dt),
  stepFixed: (n) => { for (let i = 0; i < (n | 0); i++) update(CONFIG.DT); },
};

})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>BloqueSauteur</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent; }
  html, body { width:100%; height:100%; overflow:hidden; background:#0a0a12; touch-action:none; overscroll-behavior:none; }
  body { display:flex; align-items:center; justify-content:center; font-family:system-ui,-apple-system,sans-serif; }
  #game {
    display:block; background:#000;
    image-rendering:pixelated; image-rendering:crisp-edges;
    touch-action:none;
  }

  /* ── Touch controls (also work with mouse) ─────────────────────── */
  #controls { position:fixed; inset:0; pointer-events:none; z-index:10; }
  .btn {
    position:absolute; pointer-events:auto;
    display:flex; align-items:center; justify-content:center;
    color:#fff; font-size:34px; font-weight:700;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.22);
    border-radius:16px; backdrop-filter:blur(2px);
    width:19vmin; height:19vmin; min-width:74px; min-height:74px;
    transition:background .05s;
  }
  .btn.pressed { background:rgba(255,255,255,0.28); }
  #btn-left  { left:3vmin;  bottom:4vmin; }
  #btn-right { left:24vmin; bottom:4vmin; }
  #btn-jump  { right:3vmin; bottom:4vmin; width:22vmin; height:22vmin; }
  #btn-shield { right:27vmin; bottom:6vmin; width:15vmin; height:15vmin; min-width:56px; min-height:56px; font-size:24px; }
  #btn-shield.cooling { opacity:.45; }
  #btn-shield .cd { position:absolute; font-size:min(4vmin,16px); font-weight:700; color:#f4d03f; }

  /* ── Overlays ──────────────────────────────────────────────────── */
  .overlay {
    position:fixed; inset:0; z-index:20;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:1.8vmin; text-align:center; color:#eee8d5; padding:3vmin; overflow-y:auto;
    background:rgba(6,8,18,0.72);
  }
  #start h1 { margin-bottom:0; }
  .overlay.hidden { display:none; }
  .hidden { display:none !important; }
  .overlay h1 { font-size:min(11vmin,74px); letter-spacing:.06em; color:#f4d03f; text-shadow:3px 3px 0 #d63031; }
  .overlay p  { font-size:min(4.4vmin,22px); color:#b6c2c6; max-width:32ch; line-height:1.5; }
  .overlay .hint { font-size:min(3.6vmin,17px); color:#7a8a90; }
  .overlay .version { font-size:min(3vmin,13px); color:#4d5c62; letter-spacing:.1em; margin-top:.5vmin; }
  .pulse { animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* Portrait hint (non-blocking, informational) */
  #rotate { position:fixed; top:0; left:0; right:0; z-index:15; pointer-events:none;
    text-align:center; font-size:min(3.4vmin,15px); color:#f4d03f; padding:6px;
    background:rgba(6,8,18,0.6); display:none; }
  @media (orientation:portrait) { #rotate.show { display:block; } .overlay h1 { font-size:min(8.5vw,60px); } }

  /* Top-right HUD buttons */
  #topbar { position:fixed; top:2vmin; right:2vmin; z-index:12; display:flex; gap:1.4vmin; }
  .hud-btn {
    width:8.5vmin; height:8.5vmin; min-width:38px; min-height:38px;
    font-size:min(4.4vmin,20px); font-weight:700; color:#eee8d5;
    background:rgba(10,12,22,0.55); border:2px solid rgba(255,255,255,0.22);
    border-radius:10px; cursor:pointer;
  }
  .hud-btn.off { color:#7a6; opacity:.55; text-decoration:line-through; }

  /* Colour picker */
  .picker-label { font-size:min(3.4vmin,15px); color:#93a1a1; letter-spacing:.08em; text-transform:uppercase; }
  .play-btn {
    margin-top:1.5vmin; padding:2vmin 7vmin; font-size:min(5vmin,22px); font-weight:700;
    color:#101018; background:#f4d03f; border:none; border-radius:12px; cursor:pointer;
    letter-spacing:.05em; box-shadow:0 4px 0 #b58900;
  }
  .play-btn:active { transform:translateY(2px); box-shadow:0 2px 0 #b58900; }
  .play-btn.ghost { background:transparent; color:#b6c2c6; border:2px solid rgba(255,255,255,0.25); box-shadow:none; font-size:min(3.8vmin,17px); padding:1.4vmin 4vmin; }

  /* ── Single-screen loadout: [big hero] [colour squares] [mode buttons] ── */
  .loadout { display:flex; align-items:center; justify-content:center; gap:3vmin; margin-top:0.5vmin; }
  #hero-preview { image-rendering:pixelated; height:min(31vmin,178px); width:auto; background:rgba(255,255,255,0.05); border:2px solid rgba(255,255,255,0.14); border-radius:10px; padding:4px; align-self:center; }

  /* colour squares: a compact 2-wide vertical block beside the hero */
  .swatches { display:grid; grid-template-columns:repeat(2,1fr); gap:1.1vmin; }
  .swatch {
    width:min(5.5vmin,26px); height:min(5.5vmin,26px); border-radius:6px;
    border:2px solid rgba(255,255,255,0.18); cursor:pointer; position:relative; padding:0; background-clip:padding-box;
  }
  .swatch.sel { border-color:#fff; box-shadow:0 0 0 2px #f4d03f; transform:scale(1.12); }
  .swatch.locked { cursor:not-allowed; }
  .swatch.locked::after { content:'🔒'; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:min(3vmin,13px); }
  .swatch.rainbow { background:linear-gradient(120deg,#e0392f,#f4d03f,#7cb342,#39a0ed,#e0348b); }

  /* mode buttons: vertical stack beside the hero */
  .modes { display:flex; flex-direction:column; gap:1.2vmin; }
  .mode-btn {
    padding:1.3vmin 3vmin; font-size:min(3.6vmin,16px); font-weight:700; letter-spacing:.03em;
    color:#b6c2c6; background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.2);
    border-radius:9px; cursor:pointer; min-width:min(30vmin,140px); text-align:center;
  }
  .mode-btn.easy   { border-color:#7cb342; color:#a6d977; }
  .mode-btn.normal { border-color:#39a0ed; color:#8fcdf5; }
  .mode-btn.rage   { border-color:#e0392f; color:#f19086; }
  .mode-btn.easy.sel   { background:#7cb342; color:#0d1a06; box-shadow:0 0 0 2px #cdeeaa; }
  .mode-btn.normal.sel { background:#39a0ed; color:#04121d; box-shadow:0 0 0 2px #b8e0ff; }
  .mode-btn.rage.sel   { background:#e0392f; color:#fff; border-color:#ff6a5a; box-shadow:0 0 0 2px #ffb3aa; }
  .mode-desc { font-size:min(3vmin,12px); color:#93a1a1; max-width:48ch; min-height:1.2em; line-height:1.25; margin:.6vmin 6vmin 0; }

  /* Save slots — a row of 3 boxes at the top */
  .slots { display:flex; gap:2vmin; flex-wrap:wrap; justify-content:center; }
  .slot-card {
    position:relative; width:min(30vw,168px); padding:1.8vmin; cursor:pointer; text-align:left;
    background:rgba(255,255,255,0.06); border:2px solid rgba(255,255,255,0.2); border-radius:12px; color:#eee8d5;
  }
  .slot-card:hover { background:rgba(255,255,255,0.12); border-color:#f4d03f; }
  .slot-card.sel { border-color:#f4d03f; background:rgba(244,208,63,0.14); box-shadow:0 0 0 2px #f4d03f; }
  .slot-card .slot-name { font-weight:700; font-size:min(4.2vmin,19px); color:#f4d03f; }
  .slot-card .slot-sum { font-size:min(3vmin,12px); color:#b6c2c6; margin-top:.4em; line-height:1.4; }
  .slot-card .acq { display:flex; gap:3px; margin-top:.5em; align-items:center; min-height:20px; flex-wrap:wrap; }
  .slot-card .acq canvas { width:18px; height:18px; image-rendering:pixelated; }
  .slot-card .acq-none { font-size:min(2.6vmin,10px); color:#7a8a90; font-style:italic; }
  .slot-card .slot-del { position:absolute; top:5px; right:7px; color:#93a1a1; font-size:min(3.4vmin,15px); background:none; border:none; cursor:pointer; }
  .slot-card .slot-del:hover { color:#e0392f; }
  .slot-card .slot-del.confirm { color:#fff; background:#e0392f; border-radius:4px; padding:1px 6px; font-size:min(2.8vmin,11px); font-weight:700; }

  /* Merchant shop */
  .shop-bubble { background:#faf3e0; color:#2a2320; border:3px solid #2a2320; border-radius:18px; padding:3vmin; max-width:min(92vw,520px); box-shadow:0 6px 0 rgba(0,0,0,0.3); }
  .shop-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:1.6vmin; }
  .shop-title { font-weight:800; letter-spacing:.06em; color:#2e6b3a; font-size:min(4.6vmin,22px); }
  .shop-points { font-weight:700; color:#b58900; font-size:min(4vmin,18px); }
  .shop-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2vmin; }
  .shop-item { background:#fffaf0; border:2px solid #cdbfa0; border-radius:12px; padding:1.6vmin 1vmin; text-align:center; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:.6vmin; }
  .shop-item:hover:not(.disabled) { border-color:#2e6b3a; background:#f2fbef; }
  .shop-item canvas { image-rendering:pixelated; width:min(11vmin,52px); height:min(11vmin,52px); }
  .shop-item .it-name { font-weight:700; font-size:min(3.1vmin,13px); line-height:1.1; }
  .shop-item .it-price { font-weight:800; font-size:min(3.4vmin,15px); color:#b58900; }
  .shop-item.owned { opacity:.55; cursor:default; }
  .shop-item.owned .it-price { color:#2e6b3a; }
  .shop-item.poor { opacity:.5; cursor:default; }
  .shop-item.poor .it-price { color:#c31432; }
  #shop-leave { margin-top:2.2vmin; }
</style>
</head>
<body>
  <canvas id="game" width="480" height="270"></canvas>

  <div id="rotate">↻ Rotate to landscape for the best view</div>

  <div id="topbar">
    <button class="hud-btn" id="pause-btn" aria-label="Pause">II</button>
    <button class="hud-btn" id="mute-btn" aria-label="Mute">♪</button>
  </div>

  <div id="controls" aria-hidden="true">
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-right">▶</div>
    <div class="btn" id="btn-shield" style="display:none">⛊</div>
    <div class="btn" id="btn-jump">▲</div>
  </div>

  <div class="overlay" id="start">
    <h1>BLOQUE&nbsp;SAUTEUR</h1>

    <div class="slots" id="slots"></div>

    <div class="loadout">
      <canvas id="hero-preview" width="120" height="120" aria-label="hero preview"></canvas>
      <div class="swatches" id="swatches"></div>
      <div class="modes" id="modes"></div>
    </div>
    <button class="play-btn" id="play-btn">▶ PLAY</button>
    <p class="version" id="version"></p>
  </div>

  <div class="overlay hidden" id="pause">
    <h1 style="font-size:min(9vmin,52px)">PAUSED</h1>
    <div class="picker-label">Your colour</div>
    <div class="swatches" id="swatches-pause"></div>
    <button class="play-btn" id="resume-btn">▶ RESUME</button>
    <button class="play-btn ghost" id="quit-btn">✕ QUIT TO TITLE</button>
  </div>

  <div class="overlay hidden" id="shop">
    <div class="shop-bubble">
      <div class="shop-head"><span class="shop-title">✦ MERCHANT ✦</span><span class="shop-points" id="shop-points">0 pts</span></div>
      <div class="shop-grid" id="shop-grid"></div>
      <button class="play-btn" id="shop-leave">LEAVE</button>
    </div>
  </div>

<script>
"use strict";
(function () {

const VERSION = 'v1.4';

// ══════════════════════════════════════════════════════════════════
//  RNG — deterministic, seedable (mulberry32)
// ══════════════════════════════════════════════════════════════════
function mulberry32(seed) {
  let a = seed >>> 0;
  return function () {
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
function pickSeed() {
  const q = new URLSearchParams(location.search).get('seed');
  if (q !== null && q !== '' && Number.isFinite(+q)) return (+q) >>> 0;
  return (Math.floor(Math.random() * 0xffffffff)) >>> 0;
}

// ══════════════════════════════════════════════════════════════════
//  CONFIG — logical dimensions, physics, world layout, palette
// ══════════════════════════════════════════════════════════════════
const CONFIG = {
  W: 480, H: 270, TILE: 16,
  DT: 1 / 120,                       // fixed physics timestep (s)
  // World layout (logical px). Tower is central; lava fills both flanks.
  // Platform span is tile-aligned: (416-64)/16 = 22 columns.
  PLAT_Y: 178,                       // base platform top surface
  PLAT_X0: 64, PLAT_X1: 416,         // platform span (off either edge = lava)
  LAVA_Y: 232,                       // lava surface level
  SPAWN_X: 396, SPAWN_Y: 92,         // right spawner cube centre
  SPAWN_X_L: 84,                     // left spawner (RAGE mode); mirror of the right one
  // Hero physics (feel-tuned in P7). Variable jump via 3-phase gravity.
  RUN_SPEED: 112, GROUND_ACCEL: 1200, AIR_ACCEL: 700, GROUND_FRICTION: 1500,
  JUMP_V: 300, G_HELD: 940, G_CUT: 2600, G_FALL: 1050, MAX_FALL: 520,
  COYOTE: 0.08, JUMP_BUFFER: 0.10,
  HURT_IFRAMES: 1.0, KNOCKBACK: 155, KNOCK_LOCK: 0.18,
  // Skills (from the shop)
  SHIELD_ACTIVE: 1.3, SHIELD_CD: 10, DODGE_TIME: 5, DODGE_CD: 3,
  STRONG_HIT_V: 560, STRONG_BLAST_W: 22,   // strong-hit dive speed + floor-blast half-width
  // Terrain contract: generator guarantees holes ≤ MAX_JUMP_GAP and vertical
  // steps ≤ JUMP_MAX_H; hero physics (P3) must be able to clear both.
  MAX_JUMP_GAP: 48,                  // 3 tiles — widest hole the hero can clear
  JUMP_MAX_H: 48,                    // 3 tiles — apex height
  // Meta
  LIVES_START: 3, LEVEL_TIME: 60, RESPAWN_GHOST: 2.0,
};

// 3×3 solid colours + rainbow (index 9), per concept art IMG_0049.
const PALETTE = [
  { name: 'blue',   css: '#39a0ed' },
  { name: 'green',  css: '#2e7d32' },
  { name: 'black',  css: '#1a1a1a' },
  { name: 'yellow', css: '#f4d03f' },
  { name: 'orange', css: '#e8731e' },
  { name: 'pink',   css: '#e0348b' },
  { name: 'slate',  css: '#455a64' },
  { name: 'red',    css: '#d63031' },
  { name: 'lime',   css: '#7cb342' },
  { name: 'rainbow', rainbow: true },
];

// Per-level difficulty (spawn cadence, enemy roster, pace, boss variant).
// Numbers are feel-tuning knobs (revisited in P7).
const LEVELS = {
  1: { types: ['clear'],                  spawnEvery: 2.2, speed: 26, maxAlive: 4, boss: 'clear'   },
  2: { types: ['clear', 'red'],           spawnEvery: 2.0, speed: 26, maxAlive: 5, boss: 'red'     },
  3: { types: ['clear', 'red', 'yellow'], spawnEvery: 2.0, speed: 26, maxAlive: 6, boss: 'yellow'  },
  4: { types: ['clear', 'red', 'yellow'], spawnEvery: 1.4, speed: 32, maxAlive: 7, boss: 'rainbow' },
  5: { types: ['clear', 'red', 'yellow'], spawnEvery: 1.3, speed: 34, maxAlive: 8, boss: 'volcano' },
};
const LAST_LEVEL = 5;
const ENEMY = { r: 7, speedMul: { clear: 1, red: 1.7, yellow: 1 }, bounce: 300, jumpImpulse: 205, gravity: 900, leapV: 250, leapVX: 118 };
const BOSS = {
  r: 17, hits: 3, iframe: 0.9, returnSpeed: 95, jumpImpulse: 250, freeze: 5,
  charge:   { clear: 55, red: 108, yellow: 82, rainbow: 122, volcano: 100 },   // charge speed per level boss
  idleWait: { clear: 1.2, red: 0.9, yellow: 0.9, rainbow: 0.7, volcano: 0.7 }, // pause between attacks
};

// Difficulty modes (chosen on the title screen). Health is measured in hearts
// (fractional). bossHits is indexed by level; L5 volcano boss is a fixed 12 (2 lives).
const MODES = {
  easy:   { name: 'EASY',      hitDamage: 0,    knockOnHit: false, levelHeart: true,  spawners: 1, spawnMul: 1.0, pointPenalty: 0, bossHits: { 1: 3, 2: 3, 3: 3, 4: 3, 5: 12 }, musicRate: 1.0,  musicWave: null },
  normal: { name: 'NORMAL',    hitDamage: 0.25, knockOnHit: true,  levelHeart: true,  spawners: 1, spawnMul: 1.2, pointPenalty: 0, bossHits: { 1: 3, 2: 4, 3: 5, 4: 6, 5: 12 }, musicRate: 1.14, musicWave: null },
  rage:   { name: 'RAGE MODE', hitDamage: 0.5,  knockOnHit: true,  levelHeart: false, spawners: 2, spawnMul: 1.5, pointPenalty: 1, bossHits: { 1: 6, 2: 8, 3: 10, 4: 12, 5: 12 }, musicRate: 1.3, musicWave: 'sawtooth' },
};

const LEVEL_NAMES = { 1: 'THE SHALLOWS', 2: 'BROKEN GROUND', 3: 'THE GAPS', 4: 'INFERNO', 5: 'THE VOLCANO' };

// ── Aesthetic themes (purely visual; gameplay is levels 1–5) ──
// Each run randomly (seeded) assigns a sky + a world to each level.
const SKY_KEYS = ['sunset', 'sunrise', 'blueClouds', 'thunder', 'space', 'windy'];
const SKY_NAMES = { sunset: 'SUNSET', sunrise: 'SUNRISE', blueClouds: 'CLEAR SKIES', thunder: 'THUNDERSTORM', space: 'DEEP SPACE', windy: 'GLOOM' };
// hazard: what fills the holes/flanks below (all cosmetic — a fall always costs a heart).
const WORLDS = {
  classic:   { name: 'THE TOWER',        hazard: 'lava',   deco: { body: '#2b2f38', edge: '#5b6472', hi: '#7a8494', brick: '#242830' } },
  rooftops:  { name: 'ROOFTOPS',         hazard: 'void',   deco: { body: '#4a4e57', edge: '#6d727d', hi: '#8b909b', brick: '#3a3e46' } },
  poison:    { name: 'POISON MARSH',     hazard: 'poison', deco: { body: '#2e3a2a', edge: '#4e6b3a', hi: '#7cb342', brick: '#26301f' } },
  climbing:  { name: 'THE CLIMB',        hazard: 'void',   deco: { body: '#5a3f28', edge: '#8a5a30', hi: '#b5843f', brick: '#472f1d' } },
  wineCorks: { name: 'THE VINEYARD',     hazard: 'wine',   deco: { body: '#c8a06a', edge: '#e0c090', hi: '#f0dcb0', brick: '#a8804a' } },
  ropeBridge:{ name: 'CROC RIVER',       hazard: 'river',  deco: { body: '#6b4a2a', edge: '#8a5a30', hi: '#a87a44', brick: '#523620' } },
  skyClouds: { name: 'CLOUDTOP',         hazard: 'sky',    deco: { body: '#e8eef5', edge: '#ffffff', hi: '#ffffff', brick: '#d2dceb' } },
  mansion:   { name: 'THE MANSION',      hazard: 'dark',   deco: { body: '#5a3b2a', edge: '#7a5236', hi: '#9a6a44', brick: '#412a1e' } },
  bathtub:   { name: 'THE BATHTUB',      hazard: 'water',  deco: { body: '#e6d8c0', edge: '#fff4e2', hi: '#ffffff', brick: '#d0c0a4' } },
  beach:     { name: 'THE BEACH',        hazard: 'sea',    deco: { body: '#e0c890', edge: '#f0dcae', hi: '#fff0cc', brick: '#c8a868' } },
};
const WORLD_KEYS = Object.keys(WORLDS);

// Deterministic Fisher–Yates shuffle using a seeded PRNG.
function shuffled(arr, rng) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(rng() * (i + 1)); const t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

// ── Merchant shop: 6 items (2×3), each purchasable once per slot. ──
// persistent items (kept per slot across games) vs per-run consumables (hearts).
const SHOP_ITEMS = [
  { key: 'shield',     name: 'Spiked Shield', price: 100, blurb: 'DOWN (on the ground) arms a shield; kills the next attacker (10s cooldown)' },
  { key: 'doubleJump', name: 'Double Jump',   price: 125, blurb: 'Jump again in mid-air' },
  { key: 'dodge',      name: 'Dodge',         price: 125, blurb: 'LEFT+RIGHT: spin untouchable (hold up to 5s)' },
  { key: 'strongHit',  name: 'Strong Hit',    price: 130, blurb: 'DOWN in the air = a hard dive: double boss damage, and a floor blast that clears nearby monsters' },
  { key: 'halfHeart',  name: 'Half Heart',    price: 40,  blurb: '+½ max heart (this game)' },
  { key: 'heart',      name: 'A Heart',       price: 75,  blurb: '+1 max heart (this game)' },
  { key: 'twoHearts',  name: 'Two Hearts',    price: 110, blurb: '+2 max hearts (this game)' },
  { key: 'costume',    name: 'Striped Suit',  price: 150, blurb: 'A dapper striped costume' },
];
// Which owned flags persist between games (purchases) vs reset each game (hearts).
const PERSISTENT_ITEMS = ['shield', 'doubleJump', 'dodge', 'strongHit', 'costume'];
const MERCHANT = { landY: CONFIG.PLAT_Y, descendV: 42, riseV: 260, hoverAmp: 22 };

// ── MUSIC ────────────────────────────────────────────────────────
// Two shapes: short one-shot JINGLES use a single `notes` line; the eight long
// genre SONGS use parallel `layers` — a bass, a lead (and sometimes an arp), plus a
// `drum:true` percussion line (K=kick, S=snare, H=hat). Songs are built from bar-sized
// patterns repeated with `rep()` so each loop runs ~30-40s instead of a few seconds.
const rep = (arr, n) => { let o = []; while (n-- > 0) o = o.concat(arr); return o; };
const roll = (note, n, b = 0.25) => { const a = []; while (n-- > 0) a.push([note, b]); return a; };
// one bar of bass: root pulse + fifth (mellow, on-beat)
const bb = (root, fifth) => [[root, 1], [root, 0.5], [fifth, 0.5], [root, 1], [fifth, 1]];
// one bar of off-beat bass (the "and" of each beat — house/techno pump)

// ══════════════════════════════════════════════════════════════════
//  TERRAIN — seeded, per-level. Deterministic pure function of
//  (level, seed). Column heightmap → walkable segments; gaps = holes
//  (lava below). Fairness guaranteed by construction:
//    · solid footing at both ends
//    · every hole width ≤ MAX_JUMP_GAP
//    · every vertical step ≤ JUMP_MAX_H
//  L1 flat · L2/L4 hills + holes · L3 split into raised mini-platforms.
// ══════════════════════════════════════════════════════════════════
function genTerrain(level, seed) {
  const C = CONFIG, T = C.TILE, x0 = C.PLAT_X0, x1 = C.PLAT_X1, baseTop = C.PLAT_Y;
  const nCols = Math.round((x1 - x0) / T);                 // 22
  const EDGE = 2;                                          // solid columns each end
  const maxHoleCols = Math.max(1, Math.floor(C.MAX_JUMP_GAP / T));
  const rand = mulberry32(((seed >>> 0) ^ Math.imul(level | 0, 0x9E3779B1)) >>> 0);
  const h = new Array(nCols).fill(baseTop);               // null = hole
  // Spawn runways: keep the columns next to each spawner solid so a fresh monster
  // has room to get marching before it meets a hole (no instant fall on spawn).
  const RUNWAY = 3;
  const spawnColR = Math.floor((C.SPAWN_X - x0) / T);     // right box lands here, marches LEFT
  const spawnColL = Math.floor((C.SPAWN_X_L - x0) / T);   // left box (RAGE) lands here, marches RIGHT
  const inRunway = (i) => i >= spawnColR - RUNWAY || i <= spawnColL + RUNWAY;

  // minW is clamped to 2: single-tile "pinhole" gaps are removed — monsters fell
  // through them constantly and they read badly.
  function carveHoles(count, minW, maxW) {
    let placed = 0, tries = 0;
    minW = Math.max(2, minW);
    maxW = Math.min(Math.max(maxW, minW), maxHoleCols);
    while (placed < count && tries++ < 300) {
      const w = minW + Math.floor(rand() * (maxW - minW + 1));
      const start = EDGE + Math.floor(rand() * (nCols - 2 * EDGE - w));
      let ok = true;                                       // need a solid buffer col on each side, clear of spawn runways
      for (let i = start - 1; i <= start + w; i++) { if (i < EDGE || i >= nCols - EDGE || h[i] === null || inRunway(i)) { ok = false; break; } }
      if (!ok) continue;
      for (let i = start; i < start + w; i++) h[i] = null;
      placed++;
    }
    return placed;
  }
  function raiseHills(count, dTiles) {
    let placed = 0, tries = 0;
    while (placed < count && tries++ < 300) {
      const w = 2 + Math.floor(rand() * 3);                // 2-4 cols
      const start = EDGE + Math.floor(rand() * (nCols - 2 * EDGE - w));
      let ok = true;
      for (let i = start; i < start + w; i++) { if (h[i] !== baseTop) { ok = false; break; } }
      if (!ok) continue;
      for (let i = start; i < start + w; i++) h[i] = baseTop - dTiles * T;
      placed++;
    }
    return placed;
  }

  if (level === 1) { /* flat */ }
  else if (level === 2) { carveHoles(2 + Math.floor(rand() * 2), 2, 2); raiseHills(1 + Math.floor(rand() * 2), 1); }
  else if (level === 3) { carveHoles(1 + Math.floor(rand() * 2), 2, maxHoleCols); }
  else { carveHoles(3 + Math.floor(rand() * 2), 2, 2); raiseHills(2 + Math.floor(rand() * 2), 1); }

  // L3: raise every other mini-platform by one tile (visual + light platforming).
  if (level === 3) {
    let seg = -1, prevNull = true;
    for (let i = 0; i < nCols; i++) {
      if (h[i] === null) { prevNull = true; continue; }
      if (prevNull) seg++;
      prevNull = false;
      if (seg % 2 === 1) h[i] = baseTop - T;
    }
  }

  // Extract contiguous equal-height runs into segments.
  const segments = [];
  let i = 0;
  while (i < nCols) {
    if (h[i] === null) { i++; continue; }
    let j = i; while (j < nCols && h[j] === h[i]) j++;
    segments.push({ x0: x0 + i * T, x1: x0 + j * T, top: h[i] });
    i = j;
  }
  return { level, seed: seed >>> 0, cols: h, segments, baseTop, x0, x1, colW: T, nCols };
}

// Surface top y at world-x, or null if over a hole / off the platform.
function surfaceAt(terrain, x) {
  if (!terrain || x < terrain.x0 || x >= terrain.x1) return null;
  return terrain.cols[Math.floor((x - terrain.x0) / terrain.colW)];
}
// A solid x near the centre, for hero spawn / respawn.
// Safest spawn: centre of the widest solid segment (far from holes/edges).
function findSafeX(terrain) {
  const segs = terrain.segments;
  if (segs && segs.length) {
    let best = segs[0];
    for (const s of segs) if ((s.x1 - s.x0) > (best.x1 - best.x0)) best = s;
    return Math.round((best.x0 + best.x1) / 2);
  }
  return Math.round((terrain.x0 + terrain.x1) / 2);
}

    knock: 0,       // control-lock during knockback
    ghost: 0,       // respawn ghostly-invincibility timer (enemies pass through)
    dead: false,
    airJumps: 0,    // remaining mid-air jumps (double-jump skill)
    shieldT: 0, shieldCd: 0,   // spiked-shield active window / cooldown
    dodgeT: 0, dodgeCd: 0,     // dodge untouchable window / cooldown
    strong: false, frozen: 0,  // strong-hit dive in progress / scream-freeze timer

};

// ── Persistence (localStorage) ────────────────────────────────────
// A slot keeps PURCHASED skills/costume + prefs; points & hearts are per-game
// (not persisted). Muted is global. SAVE_VERSION bump wipes old saves.
const SAVE_VERSION = 2;
// All shop "owned" flags, cleared. Persistent skills + per-run hearts/costume in one shape.
function blankOwned() { return { shield: false, doubleJump: false, dodge: false, strongHit: false, heart: false, twoHearts: false, halfHeart: false, costume: false }; }
function freshSlot() {
  return { owned: { shield: false, doubleJump: false, dodge: false, strongHit: false, costume: false }, rainbowUnlocked: false, colorIdx: 0, mode: 'normal', best: 0 };
}
const Save = {
  KEY: 'bloquesauteur.save',
  data: { v: SAVE_VERSION, activeSlot: null, slots: [null, null, null], muted: false },
  load() {
    let d = null;
    try { d = JSON.parse(localStorage.getItem(this.KEY) || 'null'); } catch (e) { d = null; }
    // Old schema (or corrupt) → wipe (effectively deletes all previous games).
    if (d && d.v === SAVE_VERSION && Array.isArray(d.slots)) this.data = { v: SAVE_VERSION, activeSlot: null, slots: [d.slots[0] || null, d.slots[1] || null, d.slots[2] || null], muted: !!d.muted };
    else this.data = { v: SAVE_VERSION, activeSlot: null, slots: [null, null, null], muted: false };
    Audio.muted = this.data.muted;
  },
  slot(i) { return this.data.slots[i]; },
  // Activate slot i (creating it if empty) and copy its PERSISTENT progress into Game.
  select(i) {
    if (!this.data.slots[i]) this.data.slots[i] = freshSlot();
    this.data.activeSlot = i;
    const s = this.data.slots[i];
    Game.owned = blankOwned();
    for (const k of PERSISTENT_ITEMS) Game.owned[k] = !!(s.owned && s.owned[k]);
    Game.points = 0; Game.heartsBought = 0;          // per-game — start fresh
    Game.rainbowUnlocked = !!s.rainbowUnlocked;
    Game.best = s.best | 0;
    Game.mode = MODES[s.mode] ? s.mode : 'normal';
    Game.hero.colorIdx = Number.isInteger(s.colorIdx) ? s.colorIdx : 0;
    if (PALETTE[Game.hero.colorIdx] && PALETTE[Game.hero.colorIdx].rainbow && !Game.rainbowUnlocked) Game.hero.colorIdx = 0;
    this.save();
  },
  // Write only PERSISTENT progress back into the active slot + persist.
  save() {
    const i = this.data.activeSlot;
    if (i != null) {
      const owned = {}; for (const k of PERSISTENT_ITEMS) owned[k] = !!(Game.owned && Game.owned[k]);
      this.data.slots[i] = {
        owned, rainbowUnlocked: !!Game.rainbowUnlocked, colorIdx: Game.hero.colorIdx, mode: Game.mode, best: Game.best | 0,
      };
    }
    this.data.muted = Audio.muted;
    try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); } catch (e) { /* private mode / quota */ }
  },
  del(i) { this.data.slots[i] = null; if (this.data.activeSlot === i) this.data.activeSlot = null; this.save(); },
};

function reseed(seed) {
  Game.seed = seed >>> 0; Game.rand = mulberry32(Game.seed);
  // Per-run theme assignment: distinct worlds + skies across the levels.
  const trng = mulberry32(Game.seed ^ 0x5bd1e995);
  Game.themeOrder = { worlds: shuffled(WORLD_KEYS, trng), skies: shuffled(SKY_KEYS, trng) };
  buildLevel();
}
function buildLevel() {
  Game.terrain = genTerrain(Game.level, Game.seed);
  // Assign this level's look (debug override: ?theme=world,sky).
  const o = Game.themeOrder || { worlds: WORLD_KEYS, skies: SKY_KEYS };
  const i = (Game.level - 1);
  let world = o.worlds[i % o.worlds.length], sky = o.skies[i % o.skies.length];
  if (Game.level === 5) { world = 'classic'; sky = 'thunder'; }   // the volcano finale is always stormy
  const q = new URLSearchParams(location.search).get('theme');
  if (q) { const [w, s] = q.split(','); if (WORLDS[w]) world = w; if (SKY_KEYS.includes(s)) sky = s; }
  Game.theme = { world, sky };
  Game.hitThisLevel = false;
  Game.enemies = [];
  Game.boss = null;
  Game.bossActive = false;
  Game.spawnT = (LEVELS[Game.level] || LEVELS[1]).spawnEvery * 0.5 / (MODES[Game.mode].spawnMul || 1);   // first wave comes a touch early
  const sx = findSafeX(Game.terrain);
  Object.assign(Game.hero, {
    x: sx, y: surfaceAt(Game.terrain, sx) ?? CONFIG.PLAT_Y, vx: 0, vy: 0,
    onGround: true, coyote: 0, jumpBuf: 0, jumping: false, hurt: 0, knock: 0, ghost: 0, dead: false,
    airJumps: 0, shieldT: 0, shieldCd: 0, dodgeT: 0, dodgeCd: 0, strong: false, frozen: 0,
  });
}
function respawnHero() {
  const t = Game.terrain, sx = findSafeX(t);
  Object.assign(Game.hero, {
    x: sx, y: surfaceAt(t, sx) ?? CONFIG.PLAT_Y, vx: 0, vy: 0,
    onGround: true, coyote: 0, jumpBuf: 0, jumping: false, hurt: 0, knock: 0, dead: false, strong: false, frozen: 0,
    ghost: CONFIG.RESPAWN_GHOST,        // 2s ghostly invincibility — enemies pass through
  });
}

// ══════════════════════════════════════════════════════════════════
//  INPUT — arrow keys / WASD / space  +  on-screen touch buttons
// ══════════════════════════════════════════════════════════════════
const Input = {
  left: false, right: false, jumpHeld: false, down: false,
  _jumpQueued: false,          // rising-edge latch, consumed by hero
  _downQueued: false,          // rising-edge latch for the shield
  _sources: { kb: {}, touch: {} },
  press(action, on) {
    if (action === 'jump') {
      if (on && !this.jumpHeld) this._jumpQueued = true;
      this.jumpHeld = on;
    } else if (action === 'left') this.left = on;
    else if (action === 'right') this.right = on;
    else if (action === 'down') { if (on && !this.down) this._downQueued = true; this.down = on; }
  },
  consumeJump() { const q = this._jumpQueued; this._jumpQueued = false; return q; },
  consumeDown() { const q = this._downQueued; this._downQueued = false; return q; },
  reset() { this.left = this.right = this.jumpHeld = this.down = false; this._jumpQueued = this._downQueued = false; },
};

const KEYMAP = {
  ArrowLeft: 'left', KeyA: 'left',
  ArrowRight: 'right', KeyD: 'right',
  ArrowUp: 'jump', KeyW: 'jump', Space: 'jump',
  ArrowDown: 'down', KeyS: 'down',
};

function initInput() {
  addEventListener('keydown', (e) => {
    if (e.repeat) return;
    onFirstGesture();
    if (e.code === 'KeyP') { togglePause(); return; }
    if (e.code === 'KeyM') { Audio.toggleMute(); return; }
    if (e.code === 'Enter' && Game.scene === 'TITLE') { startGame(); return; }
    if (Game.scene === 'INTRO' || Game.scene === 'CLEAR' || Game.scene === 'GAMEOVER' || Game.scene === 'VICTORY') {
      if (e.code === 'Space' || e.code === 'Enter' || e.code === 'ArrowUp') { e.preventDefault(); tapAdvance(); return; }
    }
    const a = KEYMAP[e.code];
    if (a) { e.preventDefault(); Input.press(a, true); }
  });
  addEventListener('keyup', (e) => {
    const a = KEYMAP[e.code];
    if (a) { e.preventDefault(); Input.press(a, false); }
  });

  const bind = (id, action) => {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); onFirstGesture(); el.classList.add('pressed'); Input.press(action, true); };
    const up   = (e) => { e.preventDefault(); el.classList.remove('pressed'); Input.press(action, false); };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('pointerleave', up);
    el.addEventListener('contextmenu', (e) => e.preventDefault());
  };
  bind('btn-left', 'left'); bind('btn-right', 'right'); bind('btn-jump', 'jump'); bind('btn-shield', 'down');

  // Title / pause / HUD buttons
  const on = (id, fn) => document.getElementById(id).addEventListener('click', (e) => { e.preventDefault(); onFirstGesture(); fn(); });
  on('play-btn', () => startGame());
  on('shop-leave', () => closeShop());
  on('resume-btn', () => togglePause(false));
  on('quit-btn', () => quitToTitle());
  on('pause-btn', () => { if (Game.scene === 'PLAY') togglePause(); });
  on('mute-btn', () => Audio.toggleMute());

  // Tap on the canvas advances transient screens (INTRO/CLEAR/GAMEOVER/VICTORY).
  canvas.addEventListener('pointerdown', (e) => {
    onFirstGesture();
    if (Game.scene === 'INTRO' || Game.scene === 'CLEAR' || Game.scene === 'GAMEOVER' || Game.scene === 'VICTORY') { e.preventDefault(); tapAdvance(); }
  });

  showTitlePanel();
  updateHudButtons();
  const v = document.getElementById('version'); if (v) v.textContent = VERSION;
}

let _gestured = false;
function onFirstGesture() {
  firstGesture();                         // unlock audio
  if (!_gestured) { _gestured = true; if (Game.scene === 'TITLE') Audio.playMusic('title'); }
}

function buildSwatches() {
  for (const containerId of ['swatches', 'swatches-pause']) {
    const box = document.getElementById(containerId); if (!box) continue;
    box.innerHTML = '';
    PALETTE.forEach((p, i) => {
      const b = document.createElement('button');
      b.className = 'swatch' + (p.rainbow ? ' rainbow' : '') + (i === Game.hero.colorIdx ? ' sel' : '');
      if (!p.rainbow) b.style.background = p.css;
      const locked = p.rainbow && !Game.rainbowUnlocked;
      if (locked) b.classList.add('locked');
      b.setAttribute('aria-label', p.name);
      b.addEventListener('click', (e) => {
        e.preventDefault(); onFirstGesture();
        if (p.rainbow && !Game.rainbowUnlocked) return;   // locked until level 4
        Game.hero.colorIdx = i; Save.save(); buildSwatches(); drawHeroPreview();
      });
      box.appendChild(b);
    });
  }
}

function buildModes() {
  const box = document.getElementById('modes'); if (!box) return;
  box.innerHTML = '';
  for (const key of ['easy', 'normal', 'rage']) {
    const b = document.createElement('button');
    b.className = 'mode-btn ' + key + (key === Game.mode ? ' sel' : '');
    b.textContent = MODES[key].name;
    b.addEventListener('click', (e) => { e.preventDefault(); onFirstGesture(); Game.mode = key; Save.save(); buildModes(); drawHeroPreview(); });
    box.appendChild(b);
  }

// ── Save-slot menu ──
// A small row of icons for the acquired (persistent) items in a slot.
function acquiredIcons(owned) {
  const row = document.createElement('div'); row.className = 'acq';
  let any = false;
  for (const k of PERSISTENT_ITEMS) {
    if (owned && owned[k]) { any = true; const cv = document.createElement('canvas'); cv.width = 32; cv.height = 32; drawShopIcon(cv.getContext('2d'), k); row.appendChild(cv); }
  }
  if (!any) { const em = document.createElement('span'); em.className = 'acq-none'; em.textContent = 'no items yet'; row.appendChild(em); }
  return row;
}
function buildSlots() {
  const box = document.getElementById('slots'); if (!box) return;
  box.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const s = Save.slot(i);
    const card = document.createElement('div'); card.className = 'slot-card' + (Save.data.activeSlot === i ? ' sel' : '');
    const name = document.createElement('div'); name.className = 'slot-name'; name.textContent = 'SLOT ' + (i + 1);
    const sum = document.createElement('div'); sum.className = 'slot-sum';
    sum.textContent = s ? ('Best: LV' + (s.best || 0) + '  ·  ' + (MODES[s.mode] ? MODES[s.mode].name : 'NORMAL')) : 'Empty · New Game';
    card.appendChild(name); card.appendChild(sum);
    if (s) card.appendChild(acquiredIcons(s.owned));         // show what's been acquired
    if (s) {
      const del = document.createElement('button'); del.className = 'slot-del'; del.textContent = '✕'; del.setAttribute('aria-label', 'delete slot ' + (i + 1));
      let armed = false, armT = null;
      del.addEventListener('click', (e) => {
        e.stopPropagation(); e.preventDefault();
        if (!armed) {                            // first click arms — ask before wiping the save
          armed = true; del.textContent = 'Delete?'; del.classList.add('confirm'); del.setAttribute('aria-label', 'confirm delete slot ' + (i + 1));
          clearTimeout(armT); armT = setTimeout(() => { armed = false; del.textContent = '✕'; del.classList.remove('confirm'); }, 3000);
          return;
        }
        clearTimeout(armT); Save.del(i); buildSlots();   // second click confirms
      });
      card.appendChild(del);
    }
    card.addEventListener('click', (e) => { e.preventDefault(); onFirstGesture(); selectSlot(i); });
    box.appendChild(card);
  }
}
// Select a slot: load it and refresh the whole single-screen loadout.
function selectSlot(i) {
  Save.select(i);
  buildSlots(); buildSwatches(); buildModes(); drawHeroPreview();
}
// Title is one screen now: ensure a slot is active, then draw everything.
function showTitlePanel() {
  if (Save.data.activeSlot == null) Save.select(0);
  buildSlots(); buildSwatches(); buildModes(); drawHeroPreview();
}

function drawHeroPreview() {
  const cv = document.getElementById('hero-preview'); if (!cv) return;
  const c = cv.getContext('2d'); c.clearRect(0, 0, cv.width, cv.height);
  c.imageSmoothingEnabled = false;
  c.save(); c.scale(4, 4);                        // large so colour + costume + arms read clearly
  const p = PALETTE[Game.hero.colorIdx];
  const col = (p && p.rainbow) ? 'hsl(200 90% 62%)' : (p && p.css) || '#39a0ed';
  const x = 9, y = 6, w = 12, h = 16;
  c.fillStyle = '#0a0a0a'; c.fillRect(x + 1, y + h - 2, 3, 4); c.fillRect(x + w - 4, y + h - 2, 3, 4);   // legs
  c.fillRect(x, y, w, h - 2);                     // body
  if (Game.owned && Game.owned.costume) {          // striped suit
    for (let sx = 2; sx < w - 2; sx += 3) { c.fillStyle = ((sx >> 1) & 1) ? col : '#eee8d5'; c.fillRect(x + sx, y + 2, 2, h - 6); }
  } else {
    c.fillStyle = col; c.fillRect(x + 2, y + 2, w - 4, 3); c.fillRect(x + (w >> 1) - 1, y + 2, 3, h - 8);
  }
  c.fillStyle = 'rgba(255,255,255,0.22)'; c.fillRect(x + 2, y + 2, w - 4, 1);
  c.fillStyle = '#fff'; c.fillRect(x + w - 4, y + 6, 2, 2);   // eye
  const my = y + (h >> 1);                         // per-mode arms + knives
  if (Game.mode === 'normal' || Game.mode === 'rage') drawArmKnife(c, x + w, my, 1);
  if (Game.mode === 'rage') drawArmKnife(c, x, my + 2, -1);
  c.restore();
  // thin white outline (drawn at native resolution so it doesn't scale up thick)
  c.strokeStyle = 'rgba(150,156,166,0.9)'; c.lineWidth = 1.5;
  c.strokeRect(x * 4 - 1, y * 4 - 1, w * 4 + 2, (h - 2) * 4 + 2);
}

// ── Merchant shop UI ──
function drawShopIcon(c, key) {
  c.clearRect(0, 0, 32, 32); c.lineWidth = 2; c.lineJoin = 'round';
  const heart = (cx, cy, s, col) => { c.fillStyle = col; c.fillRect(cx - 3 * s, cy - 2 * s, 2 * s, 1 * s); c.fillRect(cx + s, cy - 2 * s, 2 * s, 1 * s); c.fillRect(cx - 3 * s, cy - s, 6 * s, 2 * s); c.fillRect(cx - 2 * s, cy + s, 4 * s, 1 * s); c.fillRect(cx - s, cy + 2 * s, 2 * s, 1 * s); };

      c.fillStyle = '#8a909b'; c.beginPath(); c.moveTo(16, 4); c.lineTo(27, 9); c.lineTo(24, 24); c.lineTo(16, 29); c.lineTo(8, 24); c.lineTo(5, 9); c.closePath(); c.fill();
      c.fillStyle = '#c9d0da'; c.fillRect(14, 9, 4, 14);
      c.strokeStyle = '#e0e6ee'; for (let i = 0; i < 6; i++) { const a = (i / 6) * 6.283; c.strokeRect(16 + Math.cos(a) * 11 - 1, 15 + Math.sin(a) * 11 - 1, 2, 2); }
      break;
    case 'doubleJump':
      c.strokeStyle = '#39a0ed'; c.lineWidth = 3;
      c.beginPath(); c.moveTo(8, 18); c.lineTo(16, 10); c.lineTo(24, 18); c.stroke();
      c.beginPath(); c.moveTo(8, 26); c.lineTo(16, 18); c.lineTo(24, 26); c.stroke();
      break;
    case 'dodge':
      c.strokeStyle = '#b58ce0'; c.lineWidth = 3; c.beginPath(); c.arc(16, 16, 9, 0.6, 6.0); c.stroke();
      c.fillStyle = '#b58ce0'; c.beginPath(); c.moveTo(24, 10); c.lineTo(27, 15); c.lineTo(21, 15); c.closePath(); c.fill();
      c.fillStyle = '#2a2320'; c.fillRect(12, 12, 8, 3);   // ninja mask band
      break;
    case 'strongHit':   // hero + big down arrow + impact spikes
      c.fillStyle = '#e8912a'; c.beginPath(); c.moveTo(16, 26); c.lineTo(9, 15); c.lineTo(13, 15); c.lineTo(13, 5); c.lineTo(19, 5); c.lineTo(19, 15); c.lineTo(23, 15); c.closePath(); c.fill();
      c.strokeStyle = '#ffca6b'; c.lineWidth = 2; c.beginPath(); c.moveTo(4, 28); c.lineTo(8, 24); c.moveTo(28, 28); c.lineTo(24, 24); c.moveTo(16, 30); c.lineTo(16, 27); c.stroke();
      break;
    case 'heart': heart(16, 15, 2, '#e0392f'); break;
    case 'halfHeart':   // heart with the right half greyed
      heart(16, 15, 2, '#e0392f');
      c.save(); c.beginPath(); c.rect(16, 6, 12, 20); c.clip(); heart(16, 15, 2, 'rgba(255,255,255,0.22)'); c.restore();
      break;
    case 'twoHearts': heart(11, 13, 1.6, '#e0392f'); heart(21, 18, 1.6, '#e0392f'); break;
    case 'costume':
      c.fillStyle = '#3a3f48'; c.fillRect(8, 8, 16, 18);
      c.fillStyle = '#f4d03f'; for (let sx = 9; sx < 24; sx += 4) c.fillRect(sx, 8, 2, 18);
      c.fillStyle = '#3a3f48'; c.fillRect(5, 8, 5, 6); c.fillRect(22, 8, 5, 6);   // sleeves
      break;
  }
}
function buyItem(key) {
  const item = SHOP_ITEMS.find((i) => i.key === key); if (!item) return;
  if (Game.owned[key] || Game.points < item.price) return;
  Game.points -= item.price; Game.owned[key] = true;
  // A bought heart raises the max AND heals by that same amount only (not a full refill).
  if (key === 'halfHeart') { Game.heartsBought += 0.5; Game.hp = Math.min(maxHearts(), Game.hp + 0.5); }
  if (key === 'heart') { Game.heartsBought += 1; Game.hp = Math.min(maxHearts(), Game.hp + 1); }
  if (key === 'twoHearts') { Game.heartsBought += 2; Game.hp = Math.min(maxHearts(), Game.hp + 2); }
  if (Game.merchant) Game.merchant.bought = true;
  Audio.sfx('buy'); Save.save(); buildShop();
}
function buildShop() {
  const grid = document.getElementById('shop-grid'); if (!grid) return;
  const pts = document.getElementById('shop-points'); if (pts) pts.textContent = Game.points + ' pts';
  grid.innerHTML = '';
  for (const item of SHOP_ITEMS) {
    const owned = !!Game.owned[item.key], poor = !owned && Game.points < item.price;
    const cell = document.createElement('div');
    cell.className = 'shop-item' + (owned ? ' owned' : '') + (poor ? ' poor' : '');
    cell.dataset.key = item.key;
    const cv = document.createElement('canvas'); cv.width = 32; cv.height = 32; drawShopIcon(cv.getContext('2d'), item.key);
    const nm = document.createElement('div'); nm.className = 'it-name'; nm.textContent = item.name;
    const pr = document.createElement('div'); pr.className = 'it-price'; pr.textContent = owned ? 'OWNED' : (item.price + ' pts');
    cell.title = item.blurb; cell.appendChild(cv); cell.appendChild(nm); cell.appendChild(pr);
    if (!owned && !poor) cell.addEventListener('click', (e) => { e.preventDefault(); onFirstGesture(); buyItem(item.key); });
    grid.appendChild(cell);
  }
}

function updateHudButtons() {
  const m = document.getElementById('mute-btn');
  if (m) { m.textContent = '♪'; m.classList.toggle('off', Audio.muted); }
}

// ══════════════════════════════════════════════════════════════════
//  AUDIO — persistent WebAudio context (ported+extended from the
//  Tic-Tac-Toe engine). Music layer arrives in P6; here: unlock + SFX.
// ══════════════════════════════════════════════════════════════════
const Audio = {
  ctx: null, master: null, sfxGain: null, musicGain: null, muted: false, unlocked: false,

      this.musicGain = this.ctx.createGain(); this.musicGain.gain.value = 0.7;
      this.sfxGain.connect(this.master); this.musicGain.connect(this.master);
      this.master.connect(this.ctx.destination);

      const n = (this.ctx.sampleRate * 0.3) | 0, buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate), d = buf.getChannelData(0);
      for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;

  },

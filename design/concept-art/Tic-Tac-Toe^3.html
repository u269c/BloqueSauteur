    let audioCtx=null, masterGain=null, isPlaying=false, loopTimeout=null, currentTrackIdx=0;
    function ensureAudio() {
      if (!audioCtx) {
        audioCtx=new(window.AudioContext||window.webkitAudioContext)();
        masterGain=audioCtx.createGain();
        masterGain.gain.value=+document.getElementById('vol-slider').value/100;
        masterGain.connect(audioCtx.destination);
      }
      if (audioCtx.state==='suspended') audioCtx.resume();
    }
    function scheduleNote(freq,t,dur,wave) {
      if(!freq) return;
      const osc=audioCtx.createOscillator(), g=audioCtx.createGain();
      osc.type=wave; osc.frequency.value=freq;
      osc.connect(g); g.connect(masterGain);
      g.gain.setValueAtTime(0.55,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+dur*0.88);
      osc.start(t); osc.stop(t+dur+0.04);
    }
    function scheduleLoop(t0) {
      const track=TRACKS[currentTrackIdx], beat=60/track.bpm;
      let t=t0;
      for(const [note,beats] of track.notes) { const dur=beats*beat; if(note!=='R') scheduleNote(noteToFreq(note),t,dur,track.wave); t+=dur; }
      const ms=(t-audioCtx.currentTime)*1000;
      loopTimeout=setTimeout(()=>{ if(isPlaying) scheduleLoop(t); }, ms-300);
    }
    function playTrack(idx) {
      stopMusic(false); ensureAudio(); currentTrackIdx=idx; isPlaying=true;
      scheduleLoop(audioCtx.currentTime+0.05);
      document.getElementById('music-toggle').textContent='⏸';
      document.getElementById('music-btn').classList.add('playing');
    }
    function stopMusic(btn=true) {
      isPlaying=false; clearTimeout(loopTimeout);
      if(audioCtx) { try { masterGain.gain.setTargetAtTime(0,audioCtx.currentTime,0.03); const d=audioCtx; setTimeout(()=>d.close().catch(()=>{}),150); } catch(_){} audioCtx=null; masterGain=null; }
      if(btn) document.getElementById('music-toggle').textContent='▶';
      document.getElementById('music-btn').classList.remove('playing');
    }

    // ─── Player names ─────────────────────────────────────────────────
    function playerName(p) { return p==='X'?'Xerces':'Octavius'; }

    // ─── Game history (localStorage) ─────────────────────────────────
    const HISTORY_KEY='uttt3-history';
    let completedGames=(()=>{ try{return JSON.parse(localStorage.getItem(HISTORY_KEY)||'[]');}catch(e){return[];} })();
    function saveHistory() { try{localStorage.setItem(HISTORY_KEY,JSON.stringify(completedGames));}catch(e){} }

    function startNewSession() {
      const liveHistory = readOnlyMode && savedGameState ? savedGameState.moveHistory : moveHistory;
      const hasAnything=completedGames.length>0||liveHistory.length>0;
      const doIt=()=>{
        completedGames=[]; saveHistory();
        innerBoards=Array.from({length:27},makeInnerBoard);
        outerBoard=Array(27).fill(null);
        currentPlayer='X'; gameWinner=null; moveHistory=[]; stateHistory=[];
        gameMode='sudden-death'; focusedLayer=null; cubeRotX=-28; cubeRotY=22;
        readOnlyMode=false; savedGameState=null; viewingGameIdx=-1;
        const url=new URL(window.location.href);
        if(url.searchParams.has('g')){url.searchParams.delete('g');history.replaceState(null,'',url.toString());}
        render();
      };
      if(hasAnything) showConfirm('This will erase all game history and scores for this session.',doIt,'Start new session?');
      else doIt();
    }

    // ─── 3D game state ────────────────────────────────────────────────
    let innerBoards, outerBoard, currentPlayer, gameWinner;
    let gameMode='sudden-death', moveHistory=[], stateHistory=[];
    let focusedLayer=null;
    let cubeRotX=-28, cubeRotY=22;
    let clickHighlight=null; // {oi,row,col} — persistent highlight from history click
    let readOnlyMode=false;
    let savedGameState=null; // stashed live game when viewing a past game
    let viewingGameIdx=-1;   // index into completedGames, or -1 if not viewing

    function makeInnerBoard() {
      return {size:3,grid:Array.from({length:3},()=>Array(3).fill(null)),winner:null,winCells:null,justWon:false,flash:false,animStartTime:0};
    }

    function init() {
      // If viewing history, use the stashed live game's winner for the history save
      const liveOuter = readOnlyMode && savedGameState ? savedGameState.outerBoard : outerBoard;
      const liveWinner = readOnlyMode && savedGameState ? savedGameState.gameWinner : gameWinner;
      if(liveWinner&&innerBoards) {
        completedGames.push({outerBoard:[...liveOuter],winner:liveWinner});
        if(completedGames.length>32) completedGames.splice(0,completedGames.length-32);
        saveHistory();
      }
      innerBoards=Array.from({length:27},makeInnerBoard);
      outerBoard=Array(27).fill(null);
      currentPlayer='X'; gameWinner=null; moveHistory=[]; stateHistory=[];
      focusedLayer=null;
      readOnlyMode=false; savedGameState=null; viewingGameIdx=-1;
      const url=new URL(window.location.href);
      if(url.searchParams.has('g')){url.searchParams.delete('g');history.replaceState(null,'',url.toString());}
      render();
    }

    // ─── Past-game viewer ─────────────────────────────────────────────
    function viewGame(idx) {
      if(viewingGameIdx===idx) { returnToLiveGame(); return; }
      // Stash live game on first entry
      if(!readOnlyMode) {
        savedGameState={
          innerBoards: JSON.parse(JSON.stringify(innerBoards)),
          outerBoard: [...outerBoard],
          currentPlayer, gameWinner,
          moveHistory: JSON.parse(JSON.stringify(moveHistory)),
          stateHistory: [...stateHistory]
        };
      }
      const g=completedGames[idx];
      // Build synthetic boards: each outer cell's winner fills as its own board.winner
      innerBoards=Array.from({length:27},(_,oi)=>({
        size:3, grid:Array.from({length:3},()=>Array(3).fill(null)),
        winner:g.outerBoard[oi]||null, winCells:null,
        justWon:false, flash:false, animStartTime:0
      }));
      outerBoard=[...g.outerBoard];
      gameWinner=g.winner; currentPlayer='X';
      moveHistory=[]; stateHistory=[];
      // If layers were in focus mode, snap them back to the cube instantly
      document.querySelectorAll('.slot-number').forEach(el=>{ el.style.display='none'; });
      if(focusedLayer!==null) {
        const scene=document.getElementById('cube-scene');
        const cube=document.getElementById('cube');
        scene.classList.remove('focus-active');
        cube.classList.remove('focused');
        for(let i=0;i<3;i++) {
          const lay=document.querySelector(`.layer[data-l="${i}"]`);
          if(lay) {
            lay.classList.remove('is-focused','side-panel','layer-hovered');
            cube.appendChild(lay);
            Object.assign(lay.style,{position:'absolute',left:'0',top:'0',
              transformStyle:'preserve-3d',transformOrigin:'',
              transform:`translateZ(${LAYER_Z[i]}px)`,opacity:'1',zIndex:'',transition:'none'});
          }
        }
      }
      readOnlyMode=true; viewingGameIdx=idx;
      focusedLayer=null; clickHighlight=null;
      render();
    }

    function returnToLiveGame() {
      // Snap any focused layer back into the cube first
      document.querySelectorAll('.slot-number').forEach(el=>{ el.style.display='none'; });
      if(focusedLayer!==null) {
        const scene=document.getElementById('cube-scene');
        const cube=document.getElementById('cube');
        scene.classList.remove('focus-active');
        cube.classList.remove('focused');
        for(let i=0;i<3;i++) {
          const lay=document.querySelector(`.layer[data-l="${i}"]`);
          if(lay) {
            lay.classList.remove('is-focused','side-panel','layer-hovered');
            cube.appendChild(lay);
            Object.assign(lay.style,{position:'absolute',left:'0',top:'0',
              transformStyle:'preserve-3d',transformOrigin:'',
              transform:`translateZ(${LAYER_Z[i]}px)`,opacity:'1',zIndex:'',transition:'none'});
          }
        }
      }
      if(savedGameState) {
        innerBoards=savedGameState.innerBoards;
        outerBoard=savedGameState.outerBoard;
        currentPlayer=savedGameState.currentPlayer;
        gameWinner=savedGameState.gameWinner;
        moveHistory=savedGameState.moveHistory;
        stateHistory=savedGameState.stateHistory;
        savedGameState=null;
      }
      readOnlyMode=false; viewingGameIdx=-1;
      focusedLayer=null; clickHighlight=null;
      render();
    }

    // ─── Index helper ─────────────────────────────────────────────────
    function oi3(l,r,c) { return l*9+r*3+c; }

    // ─── Win checking ─────────────────────────────────────────────────
    const WIN_LEN={3:3,5:4,7:5};
    function checkBoardWinner(grid,size) {
      const w=WIN_LEN[size]||3;
      const check=(v,cells)=>v&&cells.every(c=>c===v);
      for(let r=0;r<size;r++) for(let c=0;c<=size-w;c++){const v=grid[r][c];if(check(v,Array.from({length:w},(_,k)=>grid[r][c+k])))return v;}
      for(let c=0;c<size;c++) for(let r=0;r<=size-w;r++){const v=grid[r][c];if(check(v,Array.from({length:w},(_,k)=>grid[r+k][c])))return v;}
      for(let r=0;r<=size-w;r++) for(let c=0;c<=size-w;c++){const v=grid[r][c];if(check(v,Array.from({length:w},(_,k)=>grid[r+k][c+k])))return v;}
      for(let r=0;r<=size-w;r++) for(let c=w-1;c<size;c++){const v=grid[r][c];if(check(v,Array.from({length:w},(_,k)=>grid[r+k][c-k])))return v;}
      for(let r=0;r<size;r++) for(let c=0;c<size;c++) if(!grid[r][c]) return null;
      return 'draw';
    }
    function findWinningCells(grid,size) {
      const w=WIN_LEN[size]||3;
      const vals=(line)=>line.map(([r,c])=>grid[r][c]);
      const wins=(line)=>{const v=vals(line);return v[0]&&v.every(x=>x===v[0])?line:null;};
      for(let r=0;r<size;r++) for(let c=0;c<=size-w;c++){const h=wins(Array.from({length:w},(_,k)=>[r,c+k]));if(h)return h;}
      for(let c=0;c<size;c++) for(let r=0;r<=size-w;r++){const h=wins(Array.from({length:w},(_,k)=>[r+k,c]));if(h)return h;}
      for(let r=0;r<=size-w;r++) for(let c=0;c<=size-w;c++){const h=wins(Array.from({length:w},(_,k)=>[r+k,c+k]));if(h)return h;}
      for(let r=0;r<=size-w;r++) for(let c=w-1;c<size;c++){const h=wins(Array.from({length:w},(_,k)=>[r+k,c-k]));if(h)return h;}
      return null;
    }
    function expandGrid(size) { const n=size+2; return Array.from({length:n},()=>Array(n).fill(null)); }

    // ─── 3D outer lines (49 total) ────────────────────────────────────
    const OUTER_LINES_3D=(()=>{
      const lines=[], idx=(l,r,c)=>l*9+r*3+c;
      for(let r=0;r<3;r++) for(let c=0;c<3;c++) lines.push([idx(0,r,c),idx(1,r,c),idx(2,r,c)]);
      for(let l=0;l<3;l++) for(let r=0;r<3;r++) lines.push([idx(l,r,0),idx(l,r,1),idx(l,r,2)]);
      for(let l=0;l<3;l++) for(let c=0;c<3;c++) lines.push([idx(l,0,c),idx(l,1,c),idx(l,2,c)]);
      for(let l=0;l<3;l++){lines.push([idx(l,0,0),idx(l,1,1),idx(l,2,2)]);lines.push([idx(l,0,2),idx(l,1,1),idx(l,2,0)]);}
      for(let r=0;r<3;r++){lines.push([idx(0,r,0),idx(1,r,1),idx(2,r,2)]);lines.push([idx(0,r,2),idx(1,r,1),idx(2,r,0)]);}
      for(let c=0;c<3;c++){lines.push([idx(0,0,c),idx(1,1,c),idx(2,2,c)]);lines.push([idx(0,2,c),idx(1,1,c),idx(2,0,c)]);}
      lines.push([idx(0,0,0),idx(1,1,1),idx(2,2,2)]);
      lines.push([idx(0,0,2),idx(1,1,1),idx(2,2,0)]);
      lines.push([idx(0,2,0),idx(1,1,1),idx(2,0,2)]);
      lines.push([idx(0,2,2),idx(1,1,1),idx(2,0,0)]);
      return lines;
    })();

    function checkOuterWinner() {
      for(const [a,b,c] of OUTER_LINES_3D) {
        const vals=[outerBoard[a],outerBoard[b],outerBoard[c]];
        if(vals.includes('dead')) continue;
        const ps=vals.filter(v=>v&&v!=='wild');
        const uniq=[...new Set(ps)];
        if(uniq.length===1&&vals.every(v=>v===uniq[0]||v==='wild')) return uniq[0];
      }
      if(outerBoard.every(v=>v!==null)) return 'draw';
      return null;
    }

    // Returns set of outer indices that are part of a winning line
    function getWinningOuterCells() {
      if(!gameWinner||gameWinner==='draw') return new Set();
      const cells=new Set();
      for(const [a,b,c] of OUTER_LINES_3D) {
        const vals=[outerBoard[a],outerBoard[b],outerBoard[c]];
        if(vals.includes('dead')) continue;
        const ps=vals.filter(v=>v&&v!=='wild');
        const uniq=[...new Set(ps)];
        if(uniq.length===1&&vals.every(v=>v===uniq[0]||v==='wild')) { cells.add(a);cells.add(b);cells.add(c); }
      }
      return cells;
    }

    // ─── Notation ─────────────────────────────────────────────────────
    function outerNota3(oi) {
      const l=Math.floor(oi/9), r=Math.floor((oi%9)/3), c=oi%3;
      return 'L'+(l+1)+String.fromCharCode(65+c)+(r+1);
    }
    function innerNota(row,col) { return String.fromCharCode(97+col)+(row+1); }

    // ─── Undo ─────────────────────────────────────────────────────────
    function takeSnapshot() {
      return {
        innerBoards:innerBoards.map(b=>({size:b.size,grid:b.grid.map(r=>[...r]),winner:b.winner,flash:false,animStartTime:0})),
        outerBoard:[...outerBoard], currentPlayer, gameWinner,
        moveHistory:moveHistory.map(m=>({...m})),
      };
    }
    function undo() {
      if(!stateHistory.length) return;
      const s=stateHistory.pop();
      innerBoards=s.innerBoards; outerBoard=s.outerBoard;
      currentPlayer=s.currentPlayer; gameWinner=s.gameWinner;
      moveHistory=s.moveHistory;
      render();
    }

    // ─── Click ────────────────────────────────────────────────────────
    function handleClick(oi,row,col) {
      if(readOnlyMode) return;
      if(gameWinner) return;
      if(outerBoard[oi]) return;
      const board=innerBoards[oi];
      if(board.grid[row][col]) return;

      stateHistory.push(takeSnapshot());
      board.grid[row][col]=currentPlayer;

      const moveEntry={
        type:'move', num:moveHistory.filter(m=>m.type==='move').length+1,
        player:currentPlayer, name:playerName(currentPlayer),
        nota:outerNota3(oi)+'›'+innerNota(row,col)+(board.size>3?`[${board.size}²]`:''),
        oi, row, col,
        win:null,
      };
      clickHighlight=null; // clear any history highlight when a new move is made
      moveHistory.push(moveEntry);

      const result=checkBoardWinner(board.grid,board.size);
      if(result==='draw') {
        if(gameMode==='both-claim')      { board.winner='wild';board.justWon=true;outerBoard[oi]='wild';moveEntry.win='wild'; }
        else if(gameMode==='nobody-gets-it') { board.winner='dead';board.justWon=true;board.flash=true;outerBoard[oi]='dead';moveEntry.win='dead'; }
        else if(board.size>=7)           { board.winner='wild';board.justWon=true;outerBoard[oi]='wild';moveEntry.win='wild'; }
        else {
          const oldSize=board.size; board.size+=2; board.grid=expandGrid(oldSize); board.flash=true;
          moveHistory.push({type:'expand',label:`Board ${outerNota3(oi)}: ${oldSize}×${oldSize} → ${board.size}×${board.size}`});
        }
      } else if(result) {
        board.winner=result;board.justWon=true;outerBoard[oi]=result;
        board.winCells=findWinningCells(board.grid,board.size);
        moveEntry.win=result;
      }

      if(outerBoard[oi]) { const ow=checkOuterWinner(); if(ow) gameWinner=ow; }
      if(!gameWinner) currentPlayer=currentPlayer==='X'?'O':'X';
      render();
    }

    // ─── Size config ──────────────────────────────────────────────────
    const CFG={
      3:{cell:38,font:'1.1rem',oFont:'2rem'},
      5:{cell:24,font:'0.75rem',oFont:'1.4rem'},
      7:{cell:17,font:'0.55rem',oFont:'1rem'},
    };

    // ─── Cube rendering ───────────────────────────────────────────────
    // Layer Z positions (in the cube's local 3D space)
    const LAYER_Z=[-160,0,160];
    // Sizes: inner-grid = 3 cells + 2 gaps(3px); inner-board adds padding(4px)+border(2px) per side
    const INNER_BOARD_SIZE = 3*CFG[3].cell + 2*3 + 2*(4+2); // 132px for cell=38
    // Outer face: 3 boards + 2 inter-board gaps(6px) + 2 side padding(6px) = 420px
    const FACE_SIZE = 3*INNER_BOARD_SIZE + 2*6 + 2*6;

    function buildCubeLayers() {
      const cube=document.getElementById('cube');
      cube.innerHTML='';
      for(let l=0;l<3;l++) {
        const layer=document.createElement('div');
        layer.className='layer'; layer.dataset.l=l;
        layer.style.setProperty('--lz', LAYER_Z[l]+'px');
        layer.style.transform=`translateZ(${LAYER_Z[l]}px)`;
        layer.style.width=FACE_SIZE+'px';
        layer.style.height=FACE_SIZE+'px';

        // Label
        const lbl=document.createElement('div');
        lbl.className='layer-label';
        lbl.textContent='Layer '+(l+1);
        layer.appendChild(lbl);

        // Close button
        const closeBtn=document.createElement('button');
        closeBtn.className='layer-close';
        closeBtn.textContent='✕ close';
        closeBtn.addEventListener('click', e=>{ e.stopPropagation(); unfocusLayer(); });
        layer.appendChild(closeBtn);

        // Face (3×3 outer grid)
        const face=document.createElement('div');
        face.className='layer-face';
        layer.appendChild(face);

        // Hit-zone: transparent overlay that reliably captures hover + click on the whole layer
        const hitZone=document.createElement('div');
        hitZone.className='layer-hit-zone';
        hitZone.addEventListener('mouseenter', ()=>{ if(focusedLayer===null) layer.classList.add('layer-hovered'); });
        hitZone.addEventListener('mouseleave', ()=>{ layer.classList.remove('layer-hovered'); });
        hitZone.addEventListener('click', e=>{ e.stopPropagation(); if(focusedLayer!==l) focusLayer(l); });
        layer.appendChild(hitZone);

        cube.appendChild(layer);
      }
    }

    function renderBoard() {
      const winCells=getWinningOuterCells();
      for(let l=0;l<3;l++) {
        const layerEl=document.querySelector(`.layer[data-l="${l}"]`);
        if(!layerEl) return;
        const face=layerEl.querySelector('.layer-face');
        face.innerHTML='';

        for(let ri=0;ri<3;ri++) {
          for(let ci=0;ci<3;ci++) {
            const oi=oi3(l,ri,ci);
            const board=innerBoards[oi];
            const cfg=CFG[board.size];
            const playable=focusedLayer===l&&!outerBoard[oi]&&!gameWinner;

            if(board.flash) { board.animStartTime=Date.now(); board.flash=false; }
            const elapsed=board.animStartTime?Date.now()-board.animStartTime:Infinity;
            const animating=elapsed<3000;

            const wrap=document.createElement('div');
            wrap.className='outer-cell-wrap';
            wrap.dataset.oi=oi;
            if(winCells.has(oi)) {
              wrap.classList.add('outer-win');
              wrap.style.color=gameWinner==='X'?'var(--x-color)':'var(--o-color)';
            }
            if(clickHighlight&&clickHighlight.oi===oi) wrap.classList.add('move-click-board');

            const innerWrap=document.createElement('div');
            innerWrap.className='inner-board'+(playable&&!animating?' playable':'');
            if(animating) {
              innerWrap.classList.add('just-expanded');
              innerWrap.style.animationDelay=`-${elapsed}ms`;
              innerWrap.style.animationDuration='3s';
            }
            // Scale expanded boards (5×5, 7×7) down to fit the fixed INNER_BOARD_SIZE slot
            if(board.size>3) {
              const innerBoardPx = board.size * cfg.cell + (board.size-1)*3 + 2*(4+2);
              if(innerBoardPx > INNER_BOARD_SIZE) {
                innerWrap.style.zoom = (INNER_BOARD_SIZE / innerBoardPx).toFixed(4);
              }
            }
            if(board.size>3) {
              const badge=document.createElement('div');
              badge.className='size-badge'; badge.textContent=board.size+'×'+board.size;
              innerWrap.appendChild(badge);
            }

            const gridEl=document.createElement('div');
            gridEl.className='inner-grid';
            gridEl.style.gridTemplateColumns=`repeat(${board.size},${cfg.cell}px)`;
            gridEl.style.gridTemplateRows=`repeat(${board.size},${cfg.cell}px)`;

            for(let r=0;r<board.size;r++) {
              for(let c=0;c<board.size;c++) {
                const btn=document.createElement('button');
                btn.className='cell';
                btn.dataset.r=r; btn.dataset.c=c;
                btn.style.width=btn.style.height=cfg.cell+'px';
                btn.style.fontSize=cfg.font;
                const ci2=r*board.size+c;
                btn.style.setProperty('--ci',ci2);
                if(clickHighlight&&clickHighlight.oi===oi&&r===clickHighlight.row&&c===clickHighlight.col) btn.classList.add('move-click-cell');
                if(animating) {
                  const delay=1400+ci2*25, rem=delay-elapsed;
                  if(rem<=0) btn.classList.add('vis');
                  else btn.style.animationDelay=`${rem}ms`;
                }
                const val=board.grid[r][c];
                if(val)          { btn.textContent=val; btn.classList.add(val.toLowerCase()); btn.disabled=true; }
                else if(!playable) { btn.disabled=true; }
                else             { btn.addEventListener('click', e=>{ e.stopPropagation(); handleClick(oi,r,c); }); }
                if(board.winCells&&board.winCells.some(([wr,wc])=>wr===r&&wc===c)) btn.classList.add('win-cell');
                gridEl.appendChild(btn);
              }
            }
            innerWrap.appendChild(gridEl);

            if(board.winner) {
              const ov=document.createElement('div');
              const justWon=board.justWon;
              if(justWon) board.justWon=false;
              if(board.winner==='dead') {
                ov.className='win-overlay dead';
                const el2=board.animStartTime?Date.now()-board.animStartTime:0;
                ov.style.setProperty('--dead-delay',`-${Math.min(el2,4500)}ms`);
                ov.innerHTML='<span class="overlay-letter">☠</span>';
              } else {
                ov.className='win-overlay '+(board.winner==='wild'?'wild':board.winner.toLowerCase())+(justWon?' just-won':'');
                ov.style.fontSize=cfg.oFont;
                ov.innerHTML=board.winner==='wild'
                  ?'<span class="overlay-letter">★</span><span class="overlay-sub">wild</span>'
                  :'<span class="overlay-letter">'+board.winner+'</span>';
              }
              innerWrap.appendChild(ov);
            }
            wrap.appendChild(innerWrap);
            face.appendChild(wrap);
          }
        }
      }
    }

    // ─── Focus / unfocus layer ────────────────────────────────────────
    function focusLayer(l) {
      if(focusedLayer === l) return;

      const scene = document.getElementById('cube-scene');
      const cube  = document.getElementById('cube');
      const ease  = 'cubic-bezier(.4,0,.2,1)';

      // ── Step 1: Capture 2D projected rects BEFORE any DOM changes ──
      const initRects = [0,1,2].map(i => {
        const lay = document.querySelector(`.layer[data-l="${i}"]`);
        return lay.getBoundingClientRect();
      });

      // ── Step 2: Switch focus state & expand scene (instant — no CSS transition on width) ──
      focusedLayer = l;
      scene.classList.add('focus-active');
      cube.classList.add('focused');
      cubeEl.classList.remove('spinning'); // pause spin while zoomed in

      // ── Step 3: Get new scene rect ──
      const sceneRect = scene.getBoundingClientRect();
      const sceneW = sceneRect.width  || 560;
      const sceneH = sceneRect.height || 660;

      // ── Step 4: Reparent all layers to scene, set initial visual positions (no transition) ──
      for(let i = 0; i < 3; i++) {
        const lay = document.querySelector(`.layer[data-l="${i}"]`);
        lay.classList.remove('layer-hovered', 'is-focused', 'side-panel');
        if(lay.parentElement !== scene) scene.appendChild(lay);
        const ir = initRects[i];
        const sx = ir.width  / FACE_SIZE;
        const sy = ir.height / FACE_SIZE;
        Object.assign(lay.style, {
          position: 'absolute',
          transformStyle: 'flat',
          transformOrigin: 'top left',
          left: (ir.left - sceneRect.left) + 'px',
          top:  (ir.top  - sceneRect.top)  + 'px',
          transform: `scale(${sx.toFixed(4)},${sy.toFixed(4)})`,
          opacity: '1',
          transition: 'none',
          zIndex: ''
        });
      }

      // ── Step 5: Force reflow so initial positions are painted ──
      void scene.offsetWidth;

      // ── Step 6: Compute final sidebar layout ──
      // Left sidebar: mini layers stacked vertically (slot for focused layer is empty)
      // Right area: big focused board
      // Values chosen to fit within the unchanged 560px scene width:
      // totalW = miniSz(113) + sbGap(20) + FACE_SIZE(420) = 553 → centred in 560 with 3.5px margin each side
      const MINI   = 0.27;
      const miniSz = Math.round(FACE_SIZE * MINI);   // ~113px
      const miniGap = 16;
      const sbGap  = 20;
      const totalW = miniSz + sbGap + FACE_SIZE;
      const sbX    = Math.round((sceneW - totalW) / 2);
      const mainL  = sbX + miniSz + sbGap;
      const mainT  = Math.round((sceneH - FACE_SIZE) / 2);
      // Three fixed slot tops (one per layer index), focused layer slot stays empty
      const totalStackH = 3 * miniSz + 2 * miniGap;
      const stackY  = Math.round((sceneH - totalStackH) / 2);
      const slotTops = [0,1,2].map(i => stackY + i * (miniSz + miniGap));

      // ── Step 7: Apply transitions and animate to final positions ──
      const tr = `left .48s ${ease}, top .48s ${ease}, transform .48s ${ease}, opacity .35s ${ease}`;
      for(let i = 0; i < 3; i++) {
        const lay = document.querySelector(`.layer[data-l="${i}"]`);
        lay.style.transition = tr;
        if(i === l) {
          lay.classList.add('is-focused');
          Object.assign(lay.style, {
            left: mainL + 'px',
            top:  mainT + 'px',
            transform: 'scale(1)',
            opacity: '1',
            zIndex: '5'
          });
        } else {
          lay.classList.add('side-panel');
          Object.assign(lay.style, {
            left: sbX + 'px',
            top:  slotTops[i] + 'px',
            transform: `scale(${MINI})`,
            opacity: '0.65',
            zIndex: '3'
          });
        }
      }

      // ── Step 8: Position and reveal slot numbers ──
      const numFontSz = Math.round(miniSz * 0.72);
      document.querySelectorAll('.slot-number').forEach(el => {
        const i = +el.dataset.sn;
        const isFocused = (i === l);
        el.style.cssText = `
          display: block; position: absolute;
          left: ${sbX}px; top: ${slotTops[i]}px;
          width: ${miniSz}px; height: ${miniSz}px;
          font-size: ${numFontSz}px; line-height: ${miniSz}px;
          text-align: center;
          z-index: ${isFocused ? 4 : 2};
          opacity: 0; transition: opacity .45s ${ease};
          pointer-events: none; font-weight: 900;
          color: var(--text-strong);
        `;
        // trigger transition after paint
        requestAnimationFrame(() => {
          el.style.opacity = isFocused ? '0.22' : '0.09';
        });
      });

      render();
    }

    function unfocusLayer() {
      const scene = document.getElementById('cube-scene');
      const cube  = document.getElementById('cube');
      const ease  = 'cubic-bezier(.4,0,.2,1)';

      // ── Phase 1: Animate layers + numbers out ──
      document.querySelectorAll('.slot-number').forEach(el => {
        el.style.transition = `opacity .18s ${ease}`;
        el.style.opacity = '0';
      });
      for(let i = 0; i < 3; i++) {
        const lay = document.querySelector(`.layer[data-l="${i}"]`);
        const isF = lay.classList.contains('is-focused');
        lay.style.transition = `transform .26s ${ease}, opacity .22s ${ease}`;
        lay.style.transform  = isF ? 'scale(0.88)' : 'scale(0.18)';
        lay.style.opacity    = '0';
      }

      // ── Phase 2: After fade-out, snap back to 3D and fade in ──
      setTimeout(() => {
        scene.classList.remove('focus-active');
        cube.classList.remove('focused');
        focusedLayer   = null;
        clickHighlight = null;

        // Hide slot numbers
        document.querySelectorAll('.slot-number').forEach(el => { el.style.display = 'none'; });

        // Restore cube transform instantly (no transition yet)
        cube.style.transition = 'none';
        cube.style.transform  = `rotateX(${cubeRotX}deg) rotateY(${cubeRotY}deg)`;

        // Reparent layers back to cube, invisible, in 3D positions
        for(let i = 0; i < 3; i++) {
          const lay = document.querySelector(`.layer[data-l="${i}"]`);
          lay.classList.remove('is-focused', 'side-panel', 'layer-hovered');
          cube.appendChild(lay);
          Object.assign(lay.style, {
            position: 'absolute',
            left: '0', top: '0',
            transformStyle: 'preserve-3d',
            transformOrigin: '',
            transform: `translateZ(${LAYER_Z[i]}px)`,
            opacity: '0',
            zIndex: '',
            transition: 'none'
          });
        }

        // Force reflow
        void cube.offsetWidth;

        // Fade layers back in
        for(let i = 0; i < 3; i++) {
          const lay = document.querySelector(`.layer[data-l="${i}"]`);
          lay.style.transition = `opacity .35s ${ease}`;
          lay.style.opacity    = '1';
        }

        // Allow cube rotation transitions again
        cube.style.transition = `transform 0.6s ${ease}`;

        // Restore spinning if game was won
        if(gameWinner && !readOnlyMode) cubeEl.classList.add('spinning');

        render();
      }, 260);
    }

    // ─── Drag to rotate ───────────────────────────────────────────────
    let drag=null;
    const cubeEl=document.getElementById('cube');

    cubeEl.addEventListener('pointerdown', e=>{
      if(focusedLayer!==null) return;
      drag={x:e.clientX,y:e.clientY,rx:cubeRotX,ry:cubeRotY,moved:false};
      cubeEl.setPointerCapture(e.pointerId);
      cubeEl.classList.add('dragging');
    });
    window.addEventListener('pointermove', e=>{
      if(!drag) return;
      const dx=e.clientX-drag.x, dy=e.clientY-drag.y;
      if(Math.abs(dx)>4||Math.abs(dy)>4) drag.moved=true;
      if(!drag.moved) return;
      cubeRotY=drag.ry+dx*0.45;
      cubeRotX=drag.rx-dy*0.35;
      cubeEl.style.transition='none';
      cubeEl.style.transform=`rotateX(${cubeRotX}deg) rotateY(${cubeRotY}deg)`;
    });
    window.addEventListener('pointerup', e=>{
      if(drag && !drag.moved && focusedLayer===null) {
        // Tap (no drag movement) — focus the layer under the pointer
        const el=document.elementFromPoint(e.clientX,e.clientY);
        const layerEl=el?.closest('.layer[data-l]');
        if(layerEl) focusLayer(+layerEl.dataset.l);
      }
      drag=null; cubeEl.classList.remove('dragging');
    });

    // Click anywhere outside the focused board (but not a side panel) → unfocus
    // Use document-level listener so it catches clicks anywhere on the page.
    // Move-entry clicks call e.stopPropagation() so they don't inadvertently unfocus.
    document.addEventListener('click', e=>{
      if(focusedLayer===null) return;
      if(e.target.closest('.layer.is-focused')) return; // interacting with the board
      if(e.target.closest('.layer.side-panel')) return; // switching layers
      unfocusLayer();
    });
    // Escape to unfocus
    window.addEventListener('keydown', e=>{ if(e.key==='Escape'&&focusedLayer!==null) unfocusLayer(); });

    // ─── Render ───────────────────────────────────────────────────────
    function render() {
      renderBoard();
      renderHistoryBar();
      renderMoves();
      document.getElementById('mode-both-claim').classList.toggle('active',gameMode==='both-claim');
      document.getElementById('mode-sudden-death').classList.toggle('active',gameMode==='sudden-death');
      document.getElementById('mode-nobody').classList.toggle('active',gameMode==='nobody-gets-it');
      updateConfigIcon();
      // Read-only mode visuals
      document.body.classList.toggle('readonly-view', readOnlyMode);
      document.getElementById('readonly-banner').classList.toggle('visible', readOnlyMode);
      // Player-turn hover tinting (only when a layer is focused and game is live)
      const canPlay = !readOnlyMode && !gameWinner && focusedLayer !== null;
      document.body.classList.toggle('turn-x', canPlay && currentPlayer === 'X');
      document.body.classList.toggle('turn-o', canPlay && currentPlayer === 'O');
      // Auto-spin when game won (but not in readonly)
      if(gameWinner && !readOnlyMode) cubeEl.classList.add('spinning');
      else cubeEl.classList.remove('spinning');
    }

    function makeGameCard(outerBoardSnap, winner, isCurrent, pastIdx) {
      const card=document.createElement('div');
      card.className='game-card '+(isCurrent?(winner?'finished':'live'):'past');
      if(!isCurrent && pastIdx===viewingGameIdx) card.classList.add('viewing');
      const cube3=document.createElement('div');
      cube3.className='game-mini-cube';
      for(let l=0;l<3;l++) {
        const mini=document.createElement('div');
        mini.className='game-mini-board';
        for(let i=0;i<9;i++) {
          const cell=document.createElement('div');
          cell.className='game-mini-cell';
          const v=outerBoardSnap[l*9+i];
          if(v==='wild')     { cell.textContent='★'; cell.classList.add('wild'); }
          else if(v==='dead'){ cell.textContent='☠'; cell.classList.add('dead'); }
          else if(v)         { cell.textContent=v;   cell.classList.add(v.toLowerCase()); }
          mini.appendChild(cell);
        }
        cube3.appendChild(mini);
      }
      card.appendChild(cube3);
      const lbl=document.createElement('div');
      lbl.className='game-label';
      if(winner==='X')    { lbl.textContent='Xerces';   lbl.classList.add('x'); }
      else if(winner==='O'){ lbl.textContent='Octavius'; lbl.classList.add('o'); }
      else if(winner==='draw'){ lbl.textContent='Draw'; lbl.classList.add('draw'); }
      else                 { lbl.textContent='live';    lbl.classList.add('live'); }
      card.appendChild(lbl);
      // Past games: click to view; live card: click to return when in readonly mode
      if(!isCurrent && pastIdx!=null) {
        card.addEventListener('click', ()=>viewGame(pastIdx));
      } else if(isCurrent) {
        card.style.cursor = readOnlyMode ? 'pointer' : '';
        if(readOnlyMode) card.addEventListener('click', returnToLiveGame);
      }
      return card;
    }

    function renderHistoryBar() {
      const counts={X:0,O:0,draw:0};
      completedGames.forEach(g=>{ if(g.winner==='X')counts.X++; else if(g.winner==='O')counts.O++; else counts.draw++; });
      // Only count the live game if it's finished (and not viewing a past game)
      const liveWinner = readOnlyMode && savedGameState ? savedGameState.gameWinner : (!readOnlyMode ? gameWinner : null);
      if(liveWinner==='X')counts.X++; else if(liveWinner==='O')counts.O++; else if(liveWinner==='draw')counts.draw++;
      document.getElementById('score-x').textContent=counts.X;
      document.getElementById('score-o').textContent=counts.O;
      document.getElementById('score-draws').textContent=counts.draw>0?`· ${counts.draw} draw${counts.draw!==1?'s':''}`:'';
      const scroll=document.getElementById('games-scroll');
      scroll.innerHTML='';
      if(completedGames.length>=32) {
        const maxEl=document.createElement('div');
        maxEl.className='game-card history-max';
        maxEl.innerHTML='<span>max<br>32</span>';
        scroll.appendChild(maxEl);
      }
      completedGames.forEach((g,idx)=>scroll.appendChild(makeGameCard(g.outerBoard,g.winner,false,idx)));
      scroll.appendChild(makeGameCard(readOnlyMode&&savedGameState?savedGameState.outerBoard:outerBoard, readOnlyMode&&savedGameState?savedGameState.gameWinner:gameWinner, true));
      if(gameWinner && !readOnlyMode) {
        const next=document.createElement('button');
        next.className='game-card next-game'; next.title='Start next game'; next.textContent='+';
        next.addEventListener('click',init); scroll.appendChild(next);
      }
      requestAnimationFrame(()=>{ scroll.scrollLeft=scroll.scrollWidth; });
    }


    function renderMoves() {
      const list=document.getElementById('moves-list');
      list.innerHTML='';
      const hasHistory=moveHistory.some(m=>m.type==='move');
      if(hasHistory&&stateHistory.length===0&&!gameWinner) {
        const el=document.createElement('div'); el.className='move-ellipsis'; el.textContent='… loaded from save'; list.appendChild(el);
      }
      let lastMoveIdx=-1;
      for(let i=moveHistory.length-1;i>=0;i--){if(moveHistory[i].type==='move'){lastMoveIdx=i;break;}}
      for(let i=0;i<moveHistory.length;i++) {
        const entry=moveHistory[i];
        if(entry.type==='expand') {
          const div=document.createElement('div'); div.className='move-expand'; div.textContent='↳ '+entry.label; list.appendChild(div);
        } else {
          const div=document.createElement('div'), p=entry.player.toLowerCase();
          const isActive=clickHighlight&&clickHighlight.oi===entry.oi;
          div.className=`move-entry p${p}`+(entry.win?` cap-${entry.win===entry.player?p:entry.win}`:'')+(isActive?' is-active':'');
          div.innerHTML=`<span class="move-num">${entry.num}.</span>`+
            `<span class="move-mark ${p}">${entry.player==='X'?'●':'○'}</span>`+
            `<span class="move-name">${entry.name}</span>`+
            `<span class="move-nota">${entry.nota}</span>`+
            (entry.win?`<span class="win-badge ${entry.win==='wild'?'wild':p}">${entry.win==='wild'?'★':'⊕'}</span>`:'');
          const undoBtn=document.createElement('button');
          undoBtn.className='move-undo'; undoBtn.textContent='↩';
          if(i===lastMoveIdx&&stateHistory.length>0) { undoBtn.title='Undo'; undoBtn.addEventListener('click',e=>{e.stopPropagation();undo();}); }
          else { undoBtn.setAttribute('aria-hidden','true'); undoBtn.tabIndex=-1; }
          div.appendChild(undoBtn);

          // A move is stale if the board was expanded after it — the cell is no longer present
          const boardAtOi = innerBoards[entry.oi];
          const isStale = !boardAtOi || boardAtOi.grid[entry.row]?.[entry.col] !== entry.player;
          if(isStale) {
            div.classList.add('stale');
          } else {
            // Hover: highlight the inner board in the cube (direct DOM, no re-render)
            div.addEventListener('mouseenter',()=>{
              document.querySelectorAll(`.outer-cell-wrap[data-oi="${entry.oi}"]`).forEach(w=>w.classList.add('move-hover-board'));
              document.querySelectorAll(`.outer-cell-wrap[data-oi="${entry.oi}"] [data-r="${entry.row}"][data-c="${entry.col}"]`).forEach(b=>b.classList.add('move-hover-cell'));
            });
            div.addEventListener('mouseleave',()=>{
              document.querySelectorAll('.move-hover-board').forEach(w=>w.classList.remove('move-hover-board'));
              document.querySelectorAll('.move-hover-cell').forEach(b=>b.classList.remove('move-hover-cell'));
            });

            // Click: zoom to the right layer and highlight the cell for 3 s
            div.addEventListener('click',e=>{
              if(e.target.closest('.move-undo')) return;
              e.stopPropagation(); // prevent bubbling to document which would immediately unfocus
              // Clear any existing highlight timer
              if(clickHighlight && clickHighlight._timer) clearTimeout(clickHighlight._timer);
              const timer = setTimeout(()=>{ clickHighlight=null; render(); }, 3000);
              clickHighlight={oi:entry.oi, row:entry.row, col:entry.col, _timer:timer};
              const l=Math.floor(entry.oi/9);
              if(focusedLayer!==l) focusLayer(l);
              else render();
            });
          }

          list.appendChild(div);
        }
      }
      list.scrollTop=list.scrollHeight;
    }

    // ─── Theme ────────────────────────────────────────────────────────
    let isDark=true;
    function updateThemeBtn() { document.getElementById('theme-btn').textContent=isDark?'☀\uFE0E':'☽'; }
    function toggleTheme() { isDark=!isDark; document.body.classList.toggle('light',!isDark); updateThemeBtn(); }

    // ─── Popovers ─────────────────────────────────────────────────────
    const POPOVER_MAP={'music-btn':'music-panel','config-btn':'config-panel'};
    function positionPopover(panel,btn) {
      const r=btn.getBoundingClientRect();
      panel.style.top=(r.bottom+8)+'px'; panel.style.right=(window.innerWidth-r.right)+'px'; panel.style.left='auto';
    }
    function togglePopover(btnId) {
      const panelId=POPOVER_MAP[btnId]; if(!panelId) return;
      const btn=document.getElementById(btnId), panel=document.getElementById(panelId);
      const opening=!panel.classList.contains('open');
      Object.values(POPOVER_MAP).forEach(id=>document.getElementById(id).classList.remove('open'));
      Object.keys(POPOVER_MAP).forEach(id=>document.getElementById(id).classList.remove('active'));
      if(opening){ panel.classList.add('open'); btn.classList.add('active'); positionPopover(panel,btn); }
    }
    function closeAllPopovers() {
      Object.values(POPOVER_MAP).forEach(id=>document.getElementById(id).classList.remove('open'));
      Object.keys(POPOVER_MAP).forEach(id=>document.getElementById(id).classList.remove('active'));
    }
    document.getElementById('readonly-return').addEventListener('click', returnToLiveGame);
    document.getElementById('music-btn').addEventListener('click', e=>{ e.stopPropagation(); togglePopover('music-btn'); });
    document.getElementById('config-btn').addEventListener('click', e=>{ e.stopPropagation(); togglePopover('config-btn'); });
    document.getElementById('theme-btn').addEventListener('click', toggleTheme);
    document.addEventListener('click', e=>{ if(!e.target.closest('.popover')&&!e.target.closest('.icon-btn')) closeAllPopovers(); });

    // ─── Audio events ─────────────────────────────────────────────────
    document.getElementById('music-toggle').addEventListener('click',()=>{ if(isPlaying)stopMusic();else playTrack(currentTrackIdx); });
    document.getElementById('track-select').addEventListener('change',e=>{ currentTrackIdx=+e.target.value; if(isPlaying)playTrack(currentTrackIdx); });
    document.getElementById('vol-slider').addEventListener('input',e=>{ if(masterGain)masterGain.gain.value=+e.target.value/100; document.getElementById('vol-label').textContent=e.target.value+'%'; });

    // ─── Export moves CSV ─────────────────────────────────────────────
    function buildMovesCSV() {
      const rows=['#,Player,Name,Layer,Board,Cell,Result'];
      moveHistory.forEach(e=>{
        if(e.type==='move') {
          const parts=e.nota.split('›');
          const full=parts[0]||''; const cell=(parts[1]||'').replace(/\[.*\]/,'');
          const layer=full.startsWith('L')?full.slice(0,2):''; const board=full.startsWith('L')?full.slice(2):'';
          const result=e.win===null?'':e.win==='wild'?'wild (★)':e.win+' wins board';
          rows.push([e.num,e.player,e.name,layer,board,cell,result].join(','));
        } else if(e.type==='expand') {
          rows.push(['','','','','','',e.label].join(','));
        }
      });
      return rows.join('\n');
    }
    function showExport() { document.getElementById('export-text').value=buildMovesCSV(); document.getElementById('export-overlay').classList.add('visible'); requestAnimationFrame(()=>document.getElementById('export-text').select()); }
    function hideExport() { document.getElementById('export-overlay').classList.remove('visible'); }
    document.getElementById('export-btn').addEventListener('click',showExport);
    document.getElementById('export-close-btn').addEventListener('click',hideExport);
    document.getElementById('export-copy-btn').addEventListener('click',()=>{
      navigator.clipboard.writeText(document.getElementById('export-text').value).then(()=>{
        const btn=document.getElementById('export-copy-btn'), orig=btn.textContent;
        btn.textContent='✓ Copied!'; setTimeout(()=>{btn.textContent=orig;},1800);
      });
    });
    document.getElementById('export-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('export-overlay'))hideExport(); });

    // ─── Confirm dialog ───────────────────────────────────────────────
    function isGameInProgress() { return moveHistory.length>0&&!gameWinner; }
    let confirmCallback=null;
    function showConfirm(msg,onYes,title) {
      document.getElementById('confirm-msg').textContent=msg;
      document.querySelector('#confirm-dialog strong').textContent=title||'Reset the game?';
      confirmCallback=onYes; document.getElementById('confirm-overlay').classList.add('visible');
    }
    function hideConfirm() { document.getElementById('confirm-overlay').classList.remove('visible'); confirmCallback=null; }
    document.getElementById('confirm-yes-btn').addEventListener('click',()=>{ const cb=confirmCallback; hideConfirm(); if(cb)cb(); });
    document.getElementById('confirm-no-btn').addEventListener('click',hideConfirm);
    document.getElementById('confirm-overlay').addEventListener('click',e=>{ if(e.target===document.getElementById('confirm-overlay'))hideConfirm(); });

    // ─── Mode + New Game ──────────────────────────────────────────────
    function setMode(mode) {
      if(gameMode===mode) return;
      if(isGameInProgress()) { showConfirm('Changing the draw mode will reset the current game.',()=>{gameMode=mode;init();}); return; }
      gameMode=mode; init();
    }
    document.getElementById('mode-both-claim').addEventListener('click',  ()=>setMode('both-claim'));
    document.getElementById('mode-sudden-death').addEventListener('click',()=>setMode('sudden-death'));
    document.getElementById('mode-nobody').addEventListener('click',      ()=>setMode('nobody-gets-it'));
    document.getElementById('new-game').addEventListener('click',startNewSession);
    function updateConfigIcon() {
      const icon=document.getElementById('config-mode-icon'); if(!icon) return;
      icon.textContent=gameMode==='both-claim'?'★':gameMode==='nobody-gets-it'?'☠':'⚔';
    }

    // ─── Save / Load (v2: 27-cell outer board) ────────────────────────
    function encodeMoveHistory(history,maxMoves=5) {
      let seen=0,startIdx=0;
      for(let i=history.length-1;i>=0;i--){ if(history[i].type==='move'){seen++;if(seen>=maxMoves){startIdx=i;break;}} }
      return history.slice(startIdx).map(e=>{
        if(e.type==='expand') { const m=e.label.match(/Board (L\d[A-C]\d): \d×\d → (\d)×/); return m?'E'+m[1]+m[2]:''; }
        const parts=e.nota.split('›'), outer=parts[0], inner=(parts[1]||'').replace(/\[.*\]/,'');
        const win=e.win===null?'.':e.win==='wild'?'W':e.win;
        return 'M'+e.player+outer+inner+win;
      }).filter(Boolean).join('');
    }
    function decodeMoveHistory(s) {
      const history=[]; let i=0,num=1;
      while(i<s.length) {
        if(s[i]==='M') {
          const player=s[i+1], outer=s.slice(i+2,i+6), inner=s.slice(i+6,i+8), wc=s[i+8];
          const win=wc==='.'?null:wc==='W'?'wild':wc;
          history.push({type:'move',num:num++,player,name:playerName(player),nota:outer+'›'+inner,win});
          i+=9;
        } else if(s[i]==='E') {
          const pos=s.slice(i+1,i+5), newSize=parseInt(s[i+5]), oldSize=newSize-2;
          history.push({type:'expand',label:`Board ${pos}: ${oldSize}×${oldSize} → ${newSize}×${newSize}`});
          i+=6;
        } else { break; }
      }
      return history;
    }
    function encodeState() {
      const mode=gameMode==='both-claim'?'b':gameMode==='nobody-gets-it'?'n':'d';
      const winner=gameWinner===null?'.':gameWinner==='draw'?'D':gameWinner;
      const outer=outerBoard.map(v=>v===null?'.':v==='wild'?'W':v==='dead'?'N':v).join('');
      const boards=innerBoards.map(b=>b.size+b.grid.flat().map(v=>v===null?'.':v).join('')).join('');
      const moves=encodeMoveHistory(moveHistory);
      return '2'+mode+currentPlayer+winner+outer+boards+(moves?'|'+moves:'');
    }
    function decodeState(s) {
      try {
        const pipe=s.indexOf('|'), board=pipe>=0?s.slice(0,pipe):s, moveSec=pipe>=0?s.slice(pipe+1):'';
        if(!board||board[0]!=='2') return null;
        let i=1;
        const modeChar=board[i++];
        const mode=modeChar==='b'?'both-claim':modeChar==='n'?'nobody-gets-it':'sudden-death';
        const player=board[i++], wc=board[i++];
        const winner=wc==='.'?null:wc==='D'?'draw':wc;
        const outer=[];
        for(let j=0;j<27;j++){const c=board[i++];outer.push(c==='.'?null:c==='W'?'wild':c==='N'?'dead':c);}
        const boards=[];
        for(let b=0;b<27;b++) {
          const size=parseInt(board[i++]); const grid=[];
          for(let r=0;r<size;r++){const row=[];for(let c=0;c<size;c++){const ch=board[i++];row.push(ch==='.'?null:ch);}grid.push(row);}
          boards.push({size,grid,winner:outer[b],flash:false,animStartTime:0});
        }
        const historyData=moveSec?decodeMoveHistory(moveSec):[];
        return {mode,player,winner,outer,boards,history:historyData};
      } catch(e){return null;}
    }
    function saveGame() {
      const url=new URL(window.location.href);
      url.searchParams.set('g',encodeState());
      history.replaceState(null,'',url.toString());
      navigator.clipboard.writeText(url.toString()).catch(()=>{});
      const btn=document.getElementById('save-btn');
      btn.textContent='Copied ✓'; btn.disabled=true;
      setTimeout(()=>{btn.textContent='Save';btn.disabled=false;},1800);
    }
    function loadFromURL() {
      const g=new URLSearchParams(window.location.search).get('g');
      if(!g) return false;
      const state=decodeState(g); if(!state) return false;
      gameMode=state.mode; currentPlayer=state.player; gameWinner=state.winner;
      outerBoard=state.outer; innerBoards=state.boards; moveHistory=state.history||[]; stateHistory=[];
      return true;
    }
    document.getElementById('save-btn').addEventListener('click',saveGame);

    // ─── Boot ─────────────────────────────────────────────────────────
    updateThemeBtn();
    buildCubeLayers();
    if(loadFromURL()){render();}else{init();}
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic-Tac-Toe³</title>
  <style>
    :root {
      --bg:          #002b36; --bg-panel:    #073642; --bg-deep:     #001e28;
      --bg-input:    #002030; --border:      #144f5e; --border-soft: #0d3e4c;
      --text:        #839496; --text-strong: #eee8d5; --text-dim:    #3d5c66;
      --text-muted:  #586e75; --x-color:     #dc322f; --o-color:     #2aa198;
      --wild-color:  #b58900; --x-rgb: 220,50,47;    --o-rgb: 42,161,152;
      --wild-rgb:    181,137,0; --btn-bg: #073642;    --btn-hover:   #0e4f60;
      --cell-bg:     #001e28; --cell-hover:  #0a3545; --overlay-bg:  rgba(0,10,15,0.7);
    }
    body.light {
      --bg:#fdf6e3; --bg-panel:#eee8d5; --bg-deep:#e4dcc8; --bg-input:#fdf6e3;
      --border:#b8b0a0; --border-soft:#cdc7b5; --text:#657b83; --text-strong:#073642;
      --text-dim:#aaa498; --text-muted:#93a1a1; --x-color:#dc322f; --o-color:#268bd2;
      --wild-color:#b58900; --o-rgb:38,139,210; --btn-bg:#ddd5c0; --btn-hover:#c8c0ab;
      --cell-bg:#fdf6e3; --cell-hover:#ece4cf; --overlay-bg:rgba(0,43,54,0.45);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column; align-items: center;
      min-height: 100vh; padding: 0 16px 32px; gap: 10px;
      transition: background 0.25s, color 0.25s;
    }

    /* ── Title + matchup (in left-col) ────────────────────────────── */
    h1 { font-size: 1.35rem; letter-spacing: 0.05em; color: var(--text-strong); }
    #matchup {
      font-size: 0.78rem; font-weight: 700; letter-spacing: 0.02em;
      display: flex; align-items: center; gap: 8px; padding: 2px 0;
      color: var(--text-muted);
    }
    #matchup .x  { color: var(--x-color); }
    #matchup .o  { color: var(--o-color); }
    #matchup .vs { color: var(--text-dim); font-size: 0.65rem; }

    /* ── Toolbar (row 1, col 2 — top-right, aligned with title) ───── */
    #toolbar {
      grid-column: 2; grid-row: 1;
      display: flex; align-items: center; gap: 6px;
      justify-self: end; align-self: center; padding: 14px 0 0; flex-shrink: 0;
    }
    #new-game, #save-btn {
      padding: 7px 16px; font-size: 0.85rem; background: var(--btn-bg);
      color: var(--text-strong); border: 1px solid var(--border);
      border-radius: 7px; cursor: pointer; transition: background 0.15s, color 0.15s;
    }
    #new-game:hover { background: var(--btn-hover); }
    #save-btn { color: var(--o-color); border-color: rgba(var(--o-rgb), 0.35); }
    #save-btn:hover  { background: rgba(var(--o-rgb), 0.12); }
    #save-btn:disabled { opacity: 0.6; cursor: default; }
    .icon-btn {
      width: 32px; height: 32px; background: var(--btn-bg); color: var(--text-muted);
      border: 1px solid var(--border-soft); border-radius: 7px; cursor: pointer;
      font-size: 1rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .icon-btn:hover  { background: var(--btn-hover); color: var(--text-strong); }
    .icon-btn.active { background: var(--btn-hover); color: var(--text-strong); border-color: var(--border); }
    #config-btn { position: relative; }
    #config-gear, #config-mode-icon {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
      transition: opacity 0.2s ease; line-height: 1;
    }
    #config-gear      { opacity: 1; }
    #config-mode-icon { opacity: 0; font-size: 0.85em; }
    #config-btn:hover #config-gear      { opacity: 0; }
    #config-btn:hover #config-mode-icon { opacity: 1; }
    @keyframes note-sway {
      0%   { transform: rotate(-12deg); }
      50%  { transform: rotate(12deg); }
      100% { transform: rotate(-12deg); }
    }
    #music-btn.playing { animation: note-sway 0.9s ease-in-out infinite; transform-origin: bottom center; }

    /* ── Popovers ──────────────────────────────────────────────────── */
    .popover {
      position: fixed; background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 16px; z-index: 50; min-width: 215px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.35); animation: pop 0.15s ease; display: none;
    }
    .popover.open { display: block; }
    .popover-title {
      font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--text-dim); font-weight: 700; margin-bottom: 10px;
    }
    .config-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .config-row:last-child { margin-bottom: 0; }
    .config-label { font-size: 0.72rem; color: var(--text-muted); white-space: nowrap; }
    #track-select {
      flex: 1; background: var(--bg-input); color: var(--text);
      border: 1px solid var(--border-soft); border-radius: 5px;
      padding: 3px 6px; font-size: 0.8rem; cursor: pointer;
    }
    #music-toggle {
      width: 26px; height: 26px; background: var(--bg-deep); color: var(--text-muted);
      border: 1px solid var(--border-soft); border-radius: 5px; cursor: pointer;
      font-size: 0.75rem; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    #music-toggle:hover { background: var(--btn-hover); color: var(--text-strong); }
    #vol-slider { flex: 1; accent-color: var(--o-color); cursor: pointer; }
    #vol-label  { font-size: 0.7rem; color: var(--text-dim); min-width: 30px; text-align: right; }
    .mode-btn {
      width: 100%; padding: 6px 12px; font-size: 0.78rem; font-weight: 600;
      border-radius: 5px; cursor: pointer; border: 1px solid var(--border-soft);
      background: transparent; color: var(--text-dim); transition: all 0.15s;
    }
    .mode-btn:hover:not(.active) { color: var(--text-muted); border-color: var(--border); }
    .mode-btn.active.mode-both   { background: rgba(var(--wild-rgb),0.12); color: var(--wild-color); border-color: rgba(var(--wild-rgb),0.3); }
    .mode-btn.active.mode-death  { background: rgba(var(--x-rgb),0.10);   color: var(--x-color);    border-color: rgba(var(--x-rgb),0.3); }
    .mode-btn.active.mode-nobody { background: rgba(88,110,117,0.12);     color: var(--text-muted); border-color: rgba(88,110,117,0.30); }

    .x    { color: var(--x-color); }
    .o    { color: var(--o-color); }
    .wild { color: var(--wild-color); }

    /* ── Main layout (CSS grid: 2 cols × 2 rows) ──────────────────── */
    /* Row 1: title/matchup | toolbar                                 */
    /* Row 2: moves panel   | cube scene                             */
    #main {
      display: grid;
      grid-template-columns: 248px auto;
      grid-template-rows: auto auto;
      column-gap: 24px;
      row-gap: 20px;
    }
    /* Row 1, col 1 — title + matchup */
    #left-header {
      grid-column: 1; grid-row: 1;
      display: flex; flex-direction: column; gap: 6px;
      width: 248px; padding-top: 14px; align-self: center;
    }
    /* Row 2, col 1 — moves panel + readonly banner */
    #left-col {
      grid-column: 1; grid-row: 2;
      display: flex; flex-direction: column; gap: 8px;
      width: 248px; align-self: start;
    }

    /* ── Moves panel ───────────────────────────────────────────────── */
    #moves-panel {
      width: 248px; height: 660px; display: flex; flex-direction: column;
      background: var(--bg-panel); border: 1px solid var(--border-soft);
      border-radius: 8px; overflow: hidden; flex-shrink: 0;
    }
    #moves-header {
      padding: 5px 6px 5px 12px; font-size: 0.68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim);
      border-bottom: 1px solid var(--border-soft); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    #export-btn {
      background: none; border: none; cursor: pointer; color: var(--text-dim);
      font-size: 0.8rem; padding: 2px 5px; border-radius: 4px; line-height: 1;
      transition: color 0.15s, background 0.15s;
    }
    #export-btn:hover { color: var(--text-muted); background: var(--btn-bg); }
    #moves-list { overflow-y: auto; flex: 1; padding: 4px 0; }
    .move-entry {
      display: flex; align-items: center; gap: 5px;
      padding: 3px 8px 3px 10px; font-size: 0.8rem;
      font-family: 'Courier New', monospace; transition: background 0.1s;
      border-left: 2px solid transparent;
    }
    .move-entry:hover { background: var(--bg-deep); }
    .move-entry.px { padding-left: 10px; }
    .move-entry.po { padding-left: 24px; }
    .move-entry.cap-x    { border-left-color: rgba(var(--x-rgb),0.5);    background: rgba(var(--x-rgb),0.04); }
    .move-entry.cap-o    { border-left-color: rgba(var(--o-rgb),0.5);    background: rgba(var(--o-rgb),0.04); }
    .move-entry.cap-wild { border-left-color: rgba(var(--wild-rgb),0.5); background: rgba(var(--wild-rgb),0.04); }
    .move-num  { color: var(--text-dim); min-width: 22px; text-align: right; font-size: 0.7rem; }
    .move-mark { font-size: 0.85rem; }
    .move-mark.x { color: var(--x-color); }
    .move-mark.o { color: var(--o-color); }
    .move-name { color: var(--text-muted); min-width: 62px; }
    .move-nota { color: var(--text-strong); font-weight: 600; flex: 1; font-size: 0.72rem; }
    .win-badge {
      font-size: 0.65rem; font-weight: 700; padding: 1px 4px;
      border-radius: 3px; flex-shrink: 0; letter-spacing: 0.03em;
    }
    .win-badge.x    { color: var(--x-color);   background: rgba(var(--x-rgb),0.15); }
    .win-badge.o    { color: var(--o-color);    background: rgba(var(--o-rgb),0.15); }
    .win-badge.wild { color: var(--wild-color); background: rgba(var(--wild-rgb),0.12); }
    .move-undo {
      margin-left: auto; background: none; border: 1px solid var(--border-soft);
      color: var(--text-dim); padding: 1px 5px; border-radius: 3px; cursor: pointer;
      font-size: 0.75rem; line-height: 1.4; flex-shrink: 0;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
      width: 26px; text-align: center;
    }
    .move-undo:hover { border-color: rgba(var(--x-rgb),0.4); color: var(--x-color); background: rgba(var(--x-rgb),0.08); }
    .move-undo[aria-hidden="true"] { visibility: hidden; pointer-events: none; }
    .move-ellipsis {
      padding: 3px 10px; font-size: 0.68rem; color: var(--text-dim);
      font-style: italic; letter-spacing: 0.04em;
      border-bottom: 1px solid var(--border-soft); margin-bottom: 2px;
    }
    .move-expand { padding: 2px 10px 2px 40px; font-size: 0.7rem; color: rgba(var(--wild-rgb),0.45); font-style: italic; }

    /* ── 3D Cube ────────────────────────────────────────────────────── */
    #cube-scene {
      perspective: 1100px;
      perspective-origin: 50% 42%;
      display: flex; align-items: center; justify-content: center;
      width: 560px; height: 660px;
      flex-shrink: 0;
      position: relative;
      overflow: visible;
      user-select: none; -webkit-user-select: none;
      margin-top: 0;
      margin-left: 20px;
      grid-column: 2; grid-row: 2;
    }
    #cube-scene.focus-active { width: 560px; perspective: none; }
    #cube {
      transform-style: preserve-3d;
      transform: rotateX(var(--rx, -28deg)) rotateY(var(--ry, 22deg));
      transition: transform 0.6s cubic-bezier(.4,0,.2,1);
      position: relative;
      width: 420px; height: 420px;
      cursor: grab;
      user-select: none; -webkit-user-select: none;
    }
    #cube.dragging { transition: none; cursor: grabbing; }
    #cube.focused  { cursor: default; }
    #cube.spinning { animation: cube-spin 22s linear infinite; }
    @keyframes cube-spin {
      from { transform: rotateX(-15deg) rotateY(0deg); }
      to   { transform: rotateX(-15deg) rotateY(360deg); }
    }

    .layer {
      transform-style: preserve-3d;
      position: absolute;
      top: 0; left: 0;
      transition: transform 0.55s cubic-bezier(.4,0,.2,1), opacity 0.45s;
    }
    .layer-face {
      display: grid; grid-template-columns: repeat(3, auto);
      gap: 6px; background: rgba(20,79,94,0.45); padding: 6px;
      border-radius: 7px; position: relative;
    }
    body.light .layer-face { background: rgba(184,176,160,0.45); }

    /* Transparent hit-zone sits on top of the whole layer, intercepts hover+click */
    .layer-hit-zone {
      position: absolute; inset: 0;
      z-index: 20; border-radius: 7px; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
    }
    .layer-hit-zone:hover { background: rgba(var(--o-rgb), 0.08); box-shadow: 0 0 0 2px rgba(var(--o-rgb),0.3); }
    .layer.is-focused .layer-hit-zone { display: none; }

    /* Whole-layer hover: tint all inner boards uniformly */
    .layer.layer-hovered:not(.is-focused) .inner-board {
      border-color: rgba(var(--o-rgb), 0.4) !important;
      background: rgba(var(--o-rgb), 0.07);
      transition: border-color 0.12s, background 0.12s;
    }

    /* Prevent inner content from swallowing pointer events when not focused */
    .layer:not(.is-focused) .inner-board  { pointer-events: none; }
    .layer:not(.is-focused) .cell         { pointer-events: none; }

    /* ── Focus mode ── */
    /* Side panels — stack vertically on the left; clickable to switch */
    .layer.side-panel {
      pointer-events: auto; cursor: pointer;
    }
    .layer.side-panel:hover { opacity: 0.80 !important; }
    .layer.side-panel .layer-label { opacity: 1 !important; font-size: 0.65rem; color: var(--text-muted); }
    .layer.side-panel .layer-face  { background: rgba(20,79,94,0.35); }
    .layer.is-focused .layer-face  { cursor: default; }

    /* Layer label */
    .layer-label {
      position: absolute; top: -18px; left: 50%; transform: translateX(-50%);
      font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em;
      color: var(--text-dim); pointer-events: none; white-space: nowrap;
      transition: opacity 0.3s;
    }
    .layer.is-focused .layer-label { opacity: 0; }

    /* Close button */
    .layer-close {
      position: absolute; top: -22px; right: 0;
      font-size: 0.7rem; color: var(--text-muted);
      background: var(--bg-panel); border: 1px solid var(--border-soft);
      border-radius: 4px; padding: 1px 6px; cursor: pointer;
      opacity: 0; pointer-events: none;
      transition: opacity 0.3s, color 0.15s, background 0.15s;
    }
    .layer-close:hover { color: var(--text-strong); background: var(--btn-hover); }
    .layer.is-focused .layer-close { opacity: 1; pointer-events: auto; }

    /* (slab edges removed — rendered as artifacts at this perspective) */

    /* Outer-board winning cell highlight (on the layer-face mini-grid) */
    .outer-cell-wrap {
      position: relative; border-radius: 5px;
      transition: box-shadow 0.3s;
    }
    .outer-cell-wrap.outer-win {
      box-shadow: 0 0 0 2px currentColor, 0 0 12px 2px currentColor;
      animation: outer-win-pulse 1.4s ease-in-out infinite;
    }
    @keyframes outer-win-pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.55; }
    }

    /* ── Inner board ───────────────────────────────────────────────── */
    .inner-board {
      position: relative; background: rgba(7,54,66,0.62); padding: 4px;
      border-radius: 5px; border: 2px solid transparent; transition: border-color 0.2s;
    }
    body.light .inner-board { background: rgba(238,232,213,0.62); }
    .inner-board.playable       { border-color: var(--border-soft); }
    .inner-board.playable:hover { border-color: var(--border); }
    .inner-board.just-expanded  { animation: board-reset-expand 3s ease both; }
    .inner-board.just-expanded .cell:not(.vis) {
      opacity: 0; animation: cell-appear-in 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
      animation-delay: calc(var(--ci,0) * 25ms + 1400ms);
    }
    .inner-board.just-expanded .cell.vis { opacity: 1; }
    @keyframes board-reset-expand {
      0%   { transform: scale(1);    filter: brightness(1); }
      20%  { transform: scale(0.82); filter: brightness(2) saturate(1.5); }
      42%  { transform: scale(0.62); filter: brightness(5) blur(1px); }
      52%  { transform: scale(0.62); filter: brightness(5) blur(1px); }
      68%  { transform: scale(1.07); filter: brightness(1.3); }
      82%  { transform: scale(0.97); filter: brightness(1); }
      100% { transform: scale(1);    filter: brightness(1); }
    }
    @keyframes cell-appear-in {
      from { opacity: 0; transform: scale(0.2) rotate(-8deg); }
      to   { opacity: 1; transform: scale(1)   rotate(0deg); }
    }
    .inner-grid { display: grid; gap: 3px; }
    .size-badge {
      position: absolute; top: 2px; right: 4px;
      font-size: 0.5rem; color: rgba(var(--wild-rgb),0.4); font-weight: 700;
      pointer-events: none;
    }

    /* ── Cells ─────────────────────────────────────────────────────── */
    .cell {
      background: rgba(0,30,40,0.55); border: none; border-radius: 3px;
      cursor: pointer; font-weight: 700; line-height: 1;
      transition: background 0.1s, transform 0.08s;
    }
    body.light .cell { background: rgba(253,246,227,0.55); }
    .cell:not(:disabled):hover { transform: scale(1.06); }
    body.turn-x .cell:not(:disabled):hover {
      background: rgba(var(--x-rgb),0.22);
      box-shadow: inset 0 0 0 1px rgba(var(--x-rgb),0.35);
    }
    body.turn-o .cell:not(:disabled):hover {
      background: rgba(var(--o-rgb),0.22);
      box-shadow: inset 0 0 0 1px rgba(var(--o-rgb),0.35);
    }
    .cell.x { color: var(--x-color); }
    .cell.o { color: var(--o-color); }
    .cell:disabled { cursor: default; transform: none; }

    /* ── Move history highlights ───────────────────────────────────── */
    .outer-cell-wrap.move-hover-board .inner-board {
      border-color: rgba(var(--o-rgb),0.7) !important;
      box-shadow: 0 0 0 1px rgba(var(--o-rgb),0.3), 0 0 10px rgba(var(--o-rgb),0.15);
    }
    .outer-cell-wrap.move-click-board .inner-board {
      border-color: rgba(var(--x-rgb),0.8) !important;
      box-shadow: 0 0 0 1px rgba(var(--x-rgb),0.4), 0 0 12px rgba(var(--x-rgb),0.2);
    }
    .cell.move-hover-cell {
      background: rgba(var(--o-rgb),0.28) !important;
      box-shadow: inset 0 0 0 1px rgba(var(--o-rgb),0.7);
    }
    .cell.move-click-cell {
      background: rgba(var(--x-rgb),0.28) !important;
      box-shadow: inset 0 0 0 2px var(--x-color);
      animation: cell-click-pulse 1.6s ease-in-out infinite;
    }
    @keyframes cell-click-pulse {
      0%,100% { box-shadow: inset 0 0 0 2px var(--x-color), 0 0 0 0 rgba(var(--x-rgb),0); }
      50%      { box-shadow: inset 0 0 0 2px var(--x-color), 0 0 8px 3px rgba(var(--x-rgb),0.3); }
    }
    .move-entry.is-active { background: rgba(var(--x-rgb),0.07) !important; border-left-color: rgba(var(--x-rgb),0.6) !important; }
    .move-entry { cursor: pointer; }

    /* ── Win overlay ───────────────────────────────────────────────── */
    .win-overlay {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; border-radius: 4px;
      font-weight: 800;
    }
    .win-overlay.just-won { animation: pop 0.25s ease; }
    .win-overlay.x    { background: rgba(var(--x-rgb),0.18);    color: var(--x-color); }
    .win-overlay.o    { background: rgba(var(--o-rgb),0.18);    color: var(--o-color); }
    .win-overlay.wild { background: rgba(var(--wild-rgb),0.15); color: var(--wild-color); }
    .win-overlay.dead {
      background: transparent; color: rgba(150,155,160,0.9);
      animation: dead-appear 4.5s ease-out var(--dead-delay,0ms) forwards;
    }
    .win-overlay.dead .overlay-letter {
      font-size: 2.8rem; background: none; padding: 0; border-radius: 0;
      opacity: 0; filter: blur(20px);
      animation: skull-rise 4.5s ease-out var(--dead-delay,0ms) forwards;
    }
    @keyframes dead-appear {
      0%   { background: rgba(30,32,34,0);    }
      30%  { background: rgba(30,32,34,0.18); }
      100% { background: rgba(30,32,34,0.42); }
    }
    body.light .win-overlay.dead { color: rgba(100,100,105,0.85); }
    @keyframes dead-appear-light {
      0%   { background: rgba(80,80,85,0);    }
      30%  { background: rgba(80,80,85,0.12); }
      100% { background: rgba(80,80,85,0.30); }
    }
    body.light .win-overlay.dead { animation-name: dead-appear-light; }
    @keyframes skull-rise {
      0%   { opacity: 0;    transform: scale(0.06) translateY(28%); filter: blur(18px); }
      20%  { opacity: 0.08; transform: scale(0.30) translateY(8%);  filter: blur(9px);  }
      55%  { opacity: 0.45; transform: scale(0.76) translateY(0);   filter: blur(3px);  }
      100% { opacity: 0.90; transform: scale(1)    translateY(0);   filter: blur(0);    }
    }
    .overlay-letter { background: rgba(0,0,0,0.18); border-radius: 6px; padding: 2px 6px; line-height: 1.1; }
    .overlay-sub { font-size: 0.55rem; font-weight: 600; opacity: 0.85; margin-top: 3px; }
    .cell.win-cell.x    { background: rgba(var(--x-rgb),0.32)    !important; }
    .cell.win-cell.o    { background: rgba(var(--o-rgb),0.32)    !important; }
    .cell.win-cell.wild { background: rgba(var(--wild-rgb),0.28) !important; }

    @keyframes pop {
      0%   { transform: scale(0.7); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }

    /* ── Sidebar slot numbers ───────────────────────────────────────── */
    .slot-number {
      position: absolute; pointer-events: none; z-index: 2;
      font-weight: 900; line-height: 1; text-align: center;
      color: var(--text-strong); opacity: 0;
      transition: opacity .4s cubic-bezier(.4,0,.2,1);
      display: none; /* shown via JS in focus mode */
    }

    /* ── Read-only / history view mode ──────────────────────────────── */
    #readonly-banner { display: none; width: 100%; flex-shrink: 0; padding: 6px 8px 8px; }
    #readonly-banner.visible { display: block; }
    #readonly-return {
      display: block; width: 100%; text-align: center;
      background: rgba(181,137,0,0.14); border: 1px solid rgba(181,137,0,0.35);
      color: rgba(181,137,0,0.92); border-radius: 6px; padding: 6px 10px;
      font-size: 0.70rem; font-weight: 600; cursor: pointer;
      transition: background 0.15s;
    }
    #readonly-return:hover { background: rgba(181,137,0,0.28); }

    /* Cube tint in read-only mode */
    body.readonly-view .layer-face {
      background: rgba(50,40,5,0.42) !important;
    }
    body.readonly-view .inner-board {
      background: rgba(38,30,0,0.60) !important;
      border-color: rgba(120,95,10,0.35) !important;
    }
    body.readonly-view .inner-board.playable {
      /* no playable state in readonly */
      background: rgba(38,30,0,0.60) !important;
    }
    body.readonly-view .cell {
      background: rgba(30,22,0,0.52) !important;
      pointer-events: none !important;
      cursor: default !important;
    }
    body.readonly-view .layer-hit-zone { pointer-events: none !important; }
    /* Light-mode readonly tint — warm parchment instead of dark amber */
    body.light.readonly-view .layer-face {
      background: rgba(180,140,20,0.06) !important;
    }
    body.light.readonly-view .inner-board {
      background: rgba(200,170,60,0.08) !important;
      border-color: rgba(160,120,0,0.25) !important;
    }
    body.light.readonly-view .inner-board.playable {
      background: rgba(200,170,60,0.08) !important;
    }
    body.light.readonly-view .cell {
      background: rgba(220,190,80,0.07) !important;
      pointer-events: none !important;
      cursor: default !important;
    }
    body.readonly-view #cube { cursor: grab; }
    body.readonly-view #cube.dragging { cursor: grabbing; }

    /* ── History bar (full-width, below main) ─────────────────────── */
    #history-bar {
      display: flex; flex-direction: column; align-items: flex-start; gap: 6px;
      width: 100%; max-width: 900px; padding: 8px 0 4px;
    }
    #score-strip {
      display: flex; align-items: center; gap: 7px;
      font-weight: 600; letter-spacing: 0.02em; width: 100%;
    }
    #new-session-btn {
      margin-left: auto; background: none; border: 1px solid var(--border-soft);
      border-radius: 5px; color: var(--text-dim); font-size: 0.65rem;
      padding: 2px 7px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s; white-space: nowrap;
    }
    #new-session-btn:hover { color: var(--text-muted); border-color: var(--border); background: var(--btn-bg); }
    .score-name   { font-size: 0.72rem; color: var(--text-muted); }
    .score-name.x { color: var(--x-color); } .score-name.o { color: var(--o-color); }
    .score-val    { font-size: 1.1rem; font-weight: 800; }
    .score-val.x  { color: var(--x-color); } .score-val.o  { color: var(--o-color); }
    .score-sep    { font-size: 0.8rem; color: var(--text-dim); }
    #score-draws  { font-size: 0.65rem; color: var(--text-dim); margin-left: 2px; }
    #games-scroll {
      display: flex; flex-direction: row; gap: 7px; overflow-x: auto;
      padding: 4px 8px 8px; width: 100%; scroll-behavior: smooth;
    }
    #games-scroll::-webkit-scrollbar       { height: 4px; }
    #games-scroll::-webkit-scrollbar-track { background: transparent; }
    #games-scroll::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 2px; }
    .game-card {
      display: flex; flex-direction: column; align-items: center; gap: 4px;
      flex-shrink: 0; padding: 6px 7px; border-radius: 7px; border: 1px solid transparent;
    }
    .game-card.past     { border-color: var(--border-soft); background: var(--bg-panel); opacity: 0.5; transition: opacity 0.15s; cursor: pointer; }
    .game-card.past:hover { opacity: 1; }
    .game-card.past.viewing { opacity: 1; border-color: rgba(181,137,0,0.55); box-shadow: 0 0 0 1px rgba(181,137,0,0.25); }
    .game-card.live     { border-color: rgba(var(--o-rgb),0.4); background: var(--bg-panel); animation: live-pulse 2.5s ease-in-out infinite; }
    .game-card.finished { border-color: var(--border); background: var(--bg-panel); }
    @keyframes live-pulse {
      0%,100% { box-shadow: 0 0 0 2px rgba(var(--o-rgb),0.08); }
      50%     { box-shadow: 0 0 0 2px rgba(var(--o-rgb),0.26); }
    }
    .game-mini-board {
      display: grid; grid-template-columns: repeat(3, 8px);
      gap: 1px; background: var(--border); padding: 1px; border-radius: 2px;
    }
    .game-mini-cell {
      width: 8px; height: 8px; background: var(--bg); border-radius: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.38rem; font-weight: 700;
    }
    .game-mini-cell.x    { color: var(--x-color);   background: rgba(var(--x-rgb),0.18); }
    .game-mini-cell.o    { color: var(--o-color);    background: rgba(var(--o-rgb),0.18); }
    .game-mini-cell.wild { color: var(--wild-color); background: rgba(var(--wild-rgb),0.14); }
    .game-mini-cell.dead { color: var(--text-dim);   background: rgba(88,110,117,0.14); opacity: 0.7; }
    /* 3 layers stacked mini preview */
    .game-mini-cube {
      display: flex; flex-direction: column; gap: 4px; align-items: center;
    }
    /* History overflow indicator */
    .game-card.history-max {
      opacity: 0.4; border-style: dashed !important; cursor: default !important;
      font-size: 0.55rem; color: var(--text-dim); text-align: center; line-height: 1.3;
      min-height: 50px; justify-content: center; min-width: 36px;
    }
    /* Stale move entries (board was expanded — cell no longer exists) */
    .move-entry.stale {
      opacity: 0.28; pointer-events: none; cursor: default;
    }
    .move-entry.stale .move-nota { text-decoration: line-through; }
    .game-label {
      font-size: 0.55rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    }
    .game-label.x    { color: var(--x-color); }
    .game-label.o    { color: var(--o-color); }
    .game-label.draw { color: var(--text-dim); }
    .game-label.live { color: rgba(var(--o-rgb),0.5); font-style: italic; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .game-card.next-game {
      border: 1px dashed var(--border); background: transparent; cursor: pointer;
      color: var(--text-dim); font-size: 1.6rem; line-height: 1;
      width: 46px; min-height: 60px; justify-content: center;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .game-card.next-game:hover { color: var(--text-muted); border-color: var(--border); background: var(--bg-panel); }

    /* ── Confirm dialog ────────────────────────────────────────────── */
    #confirm-overlay {
      display: none; position: fixed; inset: 0; background: var(--overlay-bg);
      backdrop-filter: blur(3px); z-index: 100; align-items: center; justify-content: center;
    }
    #confirm-overlay.visible { display: flex; }
    #confirm-dialog {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 22px 28px 20px; text-align: center; max-width: 290px; animation: pop 0.18s ease;
    }
    #confirm-dialog strong { display: block; font-size: 1rem; color: var(--text-strong); margin-bottom: 8px; }
    #confirm-msg { font-size: 0.82rem; color: var(--text-muted); margin-bottom: 18px; line-height: 1.45; }
    .confirm-btns { display: flex; gap: 10px; justify-content: center; }
    .confirm-yes {
      padding: 7px 20px; background: rgba(var(--x-rgb),0.13); color: var(--x-color);
      border: 1px solid rgba(var(--x-rgb),0.35); border-radius: 6px;
      font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.15s;
    }
    .confirm-yes:hover { background: rgba(var(--x-rgb),0.28); }
    .confirm-no {
      padding: 7px 20px; background: var(--bg-deep); color: var(--text-muted);
      border: 1px solid var(--border-soft); border-radius: 6px;
      font-size: 0.85rem; cursor: pointer; transition: all 0.15s;
    }
    .confirm-no:hover { background: var(--btn-hover); color: var(--text-strong); }

    /* ── Export overlay ────────────────────────────────────────────── */
    #export-overlay {
      display: none; position: fixed; inset: 0; background: var(--overlay-bg);
      backdrop-filter: blur(3px); z-index: 100; align-items: center; justify-content: center;
    }
    #export-overlay.visible { display: flex; }
    #export-dialog {
      background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
      padding: 22px 24px 20px; text-align: center; width: 340px; animation: pop 0.18s ease;
      display: flex; flex-direction: column; gap: 10px;
    }
    #export-dialog strong { display: block; font-size: 1rem; color: var(--text-strong); }
    #export-hint { font-size: 0.78rem; color: var(--text-dim); margin: 0; }
    #export-text {
      width: 100%; height: 160px; background: var(--bg-deep);
      border: 1px solid var(--border-soft); border-radius: 6px; color: var(--text);
      font-family: 'Courier New', monospace; font-size: 0.72rem;
      padding: 8px 10px; resize: none; outline: none; line-height: 1.5;
    }
